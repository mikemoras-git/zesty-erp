<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>KRE — Deal Pipeline</title>
<link rel="stylesheet" href="kre-style.css">
<style>
.comm-breakdown { border:1px solid var(--border); border-radius:8px; overflow:hidden; font-size:13px; }
.comm-row { display:flex; justify-content:space-between; padding:7px 12px; border-bottom:1px solid var(--border); }
.comm-row:last-child { border-bottom:none; }
.comm-row.net { background:rgba(28,138,140,.08); font-weight:700; font-size:14px; }
.comm-row.collab { background:rgba(201,168,76,.07); color:var(--text-muted); }
</style>
</head>
<body>
<div class="kre-page">

  <div class="page-header">
    <div class="page-title">
      <h1>Deal Pipeline</h1>
      <p>Active purchase transactions — from offer to final contract</p>
    </div>
    <div class="page-actions">
      <button class="btn btn-primary" onclick="openAdd()">+ New Deal</button>
    </div>
  </div>

  <div class="kpi-grid" style="margin-bottom:20px">
    <div class="kpi-card"><div class="kpi-label">Active Deals</div><div class="kpi-value" id="kpi-active">—</div></div>
    <div class="kpi-card gold"><div class="kpi-label">Total Deal Value</div><div class="kpi-value" id="kpi-value">—</div></div>
    <div class="kpi-card green"><div class="kpi-label">Expected Net Commission</div><div class="kpi-value" id="kpi-comm">—</div></div>
    <div class="kpi-card orange"><div class="kpi-label">Completed This Year</div><div class="kpi-value" id="kpi-done">—</div></div>
  </div>

  <div class="pipeline-wrap" id="deal-board">
    <div class="loading-row" style="width:100%"><div class="spinner"></div> Loading…</div>
  </div>

</div>

<!-- DEAL DETAIL PANEL -->
<div class="modal-overlay" id="dealPanel">
  <div class="modal modal-lg">
    <div class="modal-header">
      <h2 id="dp-title">Deal Details</h2>
      <button class="modal-close" onclick="closeModal('dealPanel')">✕</button>
    </div>
    <div class="modal-body">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
        <div>
          <div class="section-lbl">Deal Overview</div>
          <div id="dp-info" style="font-size:13px;line-height:2.2"></div>
          <div class="section-lbl" style="margin-top:16px">Commission Breakdown</div>
          <div id="dp-commission"></div>
          <div class="section-lbl" style="margin-top:16px">Move to Stage</div>
          <div id="dp-stage-btns" style="display:flex;gap:6px;flex-wrap:wrap"></div>
        </div>
        <div>
          <div class="section-lbl">Document Checklist</div>
          <div id="dp-checklist"></div>
          <div class="section-lbl" style="margin-top:16px">Notes</div>
          <div id="dp-notes-display" style="font-size:13px;color:var(--text-muted);font-style:italic"></div>
          <textarea id="dp-notes-edit" rows="3" placeholder="Add notes about this deal…" style="margin-top:8px;width:100%"></textarea>
          <button class="btn btn-ghost btn-sm" style="margin-top:8px" onclick="saveNotes()">Save Notes</button>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger btn-sm" id="dp-delete-btn" onclick="deleteDeal()" style="margin-right:auto">Delete Deal</button>
      <button class="btn btn-gold" onclick="markComplete()" id="dp-complete-btn">✓ Mark Complete &amp; Log Revenue</button>
      <button class="btn btn-ghost" onclick="closeModal('dealPanel')">Close</button>
    </div>
  </div>
</div>

<!-- ADD DEAL MODAL -->
<div class="modal-overlay" id="addDealModal">
  <div class="modal">
    <div class="modal-header">
      <h2>New Deal</h2>
      <button class="modal-close" onclick="closeModal('addDealModal')">✕</button>
    </div>
    <div class="modal-body">

      <div class="form-group">
        <label>Property *</label>
        <select id="nd_property"><option value="">Select property…</option></select>
      </div>

      <div class="form-group">
        <label>Buyer</label>
        <select id="nd_buyer" onchange="toggleBuyerNameField()">
          <option value="">— Select buyer —</option>
          <option value="collab_client">🤝 Collaborator's Client (name to be confirmed)</option>
        </select>
      </div>
      <div class="form-group" id="nd_buyer_name_wrap" style="display:none">
        <label>Buyer Name (collaborator's client)</label>
        <input id="nd_buyer_name" type="text" placeholder="Enter buyer name if known…">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Agreed Sale Price (€)</label>
          <div class="input-group"><span class="input-pfx">€</span><input id="nd_price" type="number" min="0" oninput="updateCommPreview()"></div>
        </div>
        <div class="form-group">
          <label>Target Close Date</label>
          <input id="nd_close_date" type="date">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Buyer Commission %</label>
          <div class="input-group"><span class="input-pfx">%</span><input id="nd_comm_buyer_pct" type="number" step="0.1" oninput="updateCommPreview()"></div>
        </div>
        <div class="form-group">
          <label>Seller Commission %</label>
          <div class="input-group"><span class="input-pfx">%</span><input id="nd_comm_seller_pct" type="number" step="0.1" oninput="updateCommPreview()"></div>
        </div>
      </div>

      <div class="form-group">
        <label>Collaborator (if involved)</label>
        <select id="nd_collab" onchange="toggleCollabCommSection()">
          <option value="">— None —</option>
        </select>
      </div>

      <!-- Collaborator commission — shown when a collaborator is selected -->
      <div id="nd_collab_comm_section" style="display:none;background:var(--surface,#f7f9fb);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:12px">
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--kre-gold);margin-bottom:10px">Collaborator Commission</div>
        <div class="form-row">
          <div class="form-group">
            <label>Commission Type</label>
            <select id="nd_collab_comm_type" onchange="updateCommPreview()">
              <option value="pct_buyer">% of buyer-side commission</option>
              <option value="pct_seller">% of seller-side commission</option>
              <option value="pct_total">% of total commission</option>
              <option value="fixed">Fixed amount (€)</option>
            </select>
          </div>
          <div class="form-group">
            <label id="nd_collab_comm_val_lbl">Amount (%)</label>
            <div class="input-group"><span class="input-pfx" id="nd_collab_comm_pfx">%</span><input id="nd_collab_comm_val" type="number" min="0" step="0.1" oninput="updateCommPreview()"></div>
          </div>
        </div>
      </div>

      <div id="comm-preview" style="background:var(--surface-alt,#f0f4f4);border:1px solid var(--border);border-radius:8px;padding:12px;font-size:13px;margin-bottom:8px"></div>

      <div class="form-group">
        <label>Notes</label>
        <textarea id="nd_notes" rows="2"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('addDealModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveDeal()">Create Deal</button>
    </div>
  </div>
</div>

<script src="kre-base.js"></script>
<script src="kre-nav.js"></script>
<script>
let allDeals     = [];
let allContacts  = [];
let allProps     = [];
let allCollabs   = [];
let settings     = {};
let currentDealId = null;

const DEAL_CHECKLIST = [
  'Offer letter signed',
  'Pre-agreement (Προσύμφωνο) signed',
  'Deposit paid',
  'Lawyer engaged',
  'Title deed search complete',
  'No-encumbrances certificate obtained',
  'Building permit verified',
  'Energy certificate (PEA) obtained',
  'Topographic plan verified',
  'Notary appointment scheduled',
  'Final contract (Συμβόλαιο) signed',
  'Keys handed over'
];

async function init() {
  settings = await SETTINGS.load();
  const [dr, cr, pr, colr] = await Promise.all([
    DB.loadAll('kre_deals'), DB.loadAll('kre_contacts'),
    DB.loadAll('kre_properties'), DB.loadAll('kre_collaborators')
  ]);
  allDeals    = dr.rows || [];
  allContacts = cr.rows || [];
  allProps    = pr.rows || [];
  allCollabs  = colr.rows || [];
  populateAddDropdowns();
  updateKPIs();
  renderBoard();
}

function populateAddDropdowns() {
  const b = settings.budget || KRE_DEFAULTS.budget;
  document.getElementById('nd_comm_buyer_pct').value  = b.commission_pct || 2.5;
  document.getElementById('nd_comm_seller_pct').value = 0;

  const pSel = document.getElementById('nd_property');
  allProps.filter(p=>p.available!==false).forEach(p => {
    const o = document.createElement('option');
    o.value = p.id;
    o.textContent = `#${p.property_num||'?'} ${p.type||''} – ${p.area||''} ${p.office_price?'('+fmtEur(p.office_price)+')':''}`;
    pSel.appendChild(o);
  });

  const bSel = document.getElementById('nd_buyer');
  allContacts.filter(c=>c.role==='buyer'||c.role==='both').forEach(c => {
    const o = document.createElement('option');
    o.value = c.id;
    o.textContent = ((c.first_name||'') + ' ' + (c.last_name||'')).trim();
    bSel.appendChild(o);
  });

  const cSel = document.getElementById('nd_collab');
  allCollabs.forEach(c => {
    const o = document.createElement('option');
    o.value = c.id;
    o.textContent = c.name + (c.agency ? ' ('+c.agency+')' : '');
    cSel.appendChild(o);
  });

  document.getElementById('nd_property').addEventListener('change', function() {
    const p = allProps.find(x=>x.id===this.value);
    if (p?.office_price) { document.getElementById('nd_price').value = p.office_price; updateCommPreview(); }
  });

  document.getElementById('nd_collab_comm_type').addEventListener('change', function() {
    const isFixed = this.value === 'fixed';
    document.getElementById('nd_collab_comm_val_lbl').textContent = isFixed ? 'Amount (€)' : 'Amount (%)';
    document.getElementById('nd_collab_comm_pfx').textContent     = isFixed ? '€' : '%';
  });
}

function toggleBuyerNameField() {
  const val = document.getElementById('nd_buyer').value;
  document.getElementById('nd_buyer_name_wrap').style.display = val === 'collab_client' ? '' : 'none';
}

function toggleCollabCommSection() {
  const val = document.getElementById('nd_collab').value;
  document.getElementById('nd_collab_comm_section').style.display = val ? '' : 'none';
  updateCommPreview();
}

function calcCollabCut(commB, commS, collabType, collabVal) {
  if (!collabVal) return 0;
  const total = commB + commS;
  switch (collabType) {
    case 'pct_buyer':  return commB  * collabVal / 100;
    case 'pct_seller': return commS  * collabVal / 100;
    case 'pct_total':  return total  * collabVal / 100;
    case 'fixed':      return Math.min(collabVal, total);
    default:           return 0;
  }
}

function updateCommPreview() {
  const price  = parseFloat(document.getElementById('nd_price').value) || 0;
  const bp     = parseFloat(document.getElementById('nd_comm_buyer_pct').value)  || 0;
  const sp     = parseFloat(document.getElementById('nd_comm_seller_pct').value) || 0;
  const commB  = price * bp / 100;
  const commS  = price * sp / 100;
  const gross  = commB + commS;

  const hasCollab   = !!document.getElementById('nd_collab').value;
  const collabType  = document.getElementById('nd_collab_comm_type').value;
  const collabVal   = parseFloat(document.getElementById('nd_collab_comm_val').value) || 0;
  const collabCut   = hasCollab ? calcCollabCut(commB, commS, collabType, collabVal) : 0;
  const net         = gross - collabCut;

  let html = `<div style="display:flex;justify-content:space-between;margin-bottom:4px"><span>Buyer side</span><strong>${fmtEur(commB)}</strong></div>
    <div style="display:flex;justify-content:space-between;margin-bottom:4px"><span>Seller side</span><strong>${fmtEur(commS)}</strong></div>
    <div style="display:flex;justify-content:space-between;padding-top:6px;border-top:1px solid var(--border)"><span><strong>Gross commission</strong></span><strong>${fmtEur(gross)}</strong></div>`;
  if (hasCollab && collabCut > 0) {
    html += `<div style="display:flex;justify-content:space-between;margin-top:4px;color:var(--text-muted)"><span>− Collaborator's share</span><span>−${fmtEur(collabCut)}</span></div>
      <div style="display:flex;justify-content:space-between;margin-top:6px;padding-top:6px;border-top:1px solid var(--border);color:var(--kre-teal)"><strong>Net to agency</strong><strong style="font-size:15px">${fmtEur(net)}</strong></div>`;
  }
  document.getElementById('comm-preview').innerHTML = html;
}

function buyerLabel(d) {
  if (d.buyer_id === 'collab_client' || d.buyer_is_collab_client) {
    return `🤝 ${esc(d.buyer_name_manual || 'Collaborator\'s Client')}`;
  }
  const c = allContacts.find(x => x.id === d.buyer_id);
  return c ? esc((c.first_name||'')+' '+(c.last_name||'')) : (d.buyer_name || '—');
}

function updateKPIs() {
  const thisYear = new Date().getFullYear();
  const active   = allDeals.filter(d => d.stage !== 'completed');
  const done     = allDeals.filter(d => d.stage === 'completed' && new Date(d._created||d.created_at).getFullYear() === thisYear);
  const totalVal = active.reduce((s,d) => s + (parseFloat(d.agreed_price)||0), 0);
  // Net commission = gross - collab cut
  const totalNet = active.reduce((s,d) => {
    const gross = (parseFloat(d.commission_buyer)||0) + (parseFloat(d.commission_seller)||0);
    return s + gross - (parseFloat(d.collab_commission_amount_eur)||0);
  }, 0);

  document.getElementById('kpi-active').textContent = active.length;
  document.getElementById('kpi-value').textContent  = fmtEur(totalVal);
  document.getElementById('kpi-comm').textContent   = fmtEur(totalNet);
  document.getElementById('kpi-done').textContent   = done.length;
}

function renderBoard() {
  const stages = settings.deal_stages || KRE_DEFAULTS.deal_stages;
  const board  = document.getElementById('deal-board');

  board.innerHTML = stages.map(stage => {
    const stageDeals = allDeals.filter(d => (d.stage || 'offer_made') === stage.id);
    const cards = stageDeals.map(d => {
      const prop = allProps.find(p => p.id === d.property_id);
      const gross = (parseFloat(d.commission_buyer)||0) + (parseFloat(d.commission_seller)||0);
      const net   = gross - (parseFloat(d.collab_commission_amount_eur)||0);
      return `<div class="pipeline-card" onclick="openPanel('${d.id}')">
        <div class="pipeline-card-name">${prop ? `#${prop.property_num} ${esc(prop.area||'')}` : 'Unknown Property'}</div>
        <div class="pipeline-card-sub">${buyerLabel(d)}</div>
        <div class="pipeline-card-meta">
          <span class="badge badge-teal" style="font-size:10px">${fmtEur(d.agreed_price)}</span>
          ${net ? `<span class="badge badge-gold" style="font-size:10px">Net ${fmtEur(net)}</span>` : ''}
        </div>
      </div>`;
    }).join('') || `<div style="font-size:12px;color:var(--text-light);text-align:center;padding:16px">No deals</div>`;

    return `<div class="pipeline-col">
      <div class="pipeline-col-hdr" style="background:${stage.color}">
        <span class="pipeline-col-hdr-name">${esc(stage.label)}</span>
        <span class="pipeline-col-count">${stageDeals.length}</span>
      </div>
      <div class="pipeline-col-body">${cards}</div>
    </div>`;
  }).join('');
}

function openPanel(dealId) {
  currentDealId = dealId;
  const d      = allDeals.find(x => x.id === dealId);
  if (!d) return;
  const prop   = allProps.find(p => p.id === d.property_id);
  const collab = allCollabs.find(c => c.id === d.collaborator_id);

  document.getElementById('dp-title').textContent =
    prop ? `Deal: #${prop.property_num} ${prop.area||''}` : 'Deal Details';

  const sourcedCollab = prop?.sourced_by_collab_id
    ? allCollabs.find(c => c.id === prop.sourced_by_collab_id)
    : null;

  document.getElementById('dp-info').innerHTML = `
    <div>🏠 <strong>Property:</strong> ${prop ? `#${prop.property_num} ${esc(prop.type||'')} in ${esc(prop.area||'')}` : '—'}</div>
    <div>👤 <strong>Buyer:</strong> ${buyerLabel(d)}</div>
    <div>💶 <strong>Agreed Price:</strong> ${fmtEur(d.agreed_price)}</div>
    <div>📅 <strong>Target Close:</strong> ${fmtDate(d.close_date)}</div>
    <div>📅 <strong>Deal Created:</strong> ${fmtDate(d._created||d.created_at)}</div>
    ${collab ? `<div>🤝 <strong>Collaborator:</strong> ${esc(collab.name)}</div>` : ''}
    ${sourcedCollab ? `<div>📥 <strong>Property sourced by:</strong> ${esc(sourcedCollab.name)}</div>` : ''}
  `;

  const commB      = parseFloat(d.commission_buyer)||0;
  const commS      = parseFloat(d.commission_seller)||0;
  const gross      = commB + commS;
  const collabCut  = parseFloat(d.collab_commission_amount_eur)||0;
  const net        = gross - collabCut;

  let commHtml = `<div class="comm-breakdown">
    <div class="comm-row"><span>Buyer side</span><strong>${fmtEur(commB)}</strong></div>
    <div class="comm-row"><span>Seller side</span><strong>${fmtEur(commS)}</strong></div>
    <div class="comm-row" style="font-weight:600"><span>Gross commission</span><strong>${fmtEur(gross)}</strong></div>`;
  if (collabCut > 0) {
    const collabTypeLabel = {
      pct_buyer:'% of buyer side', pct_seller:'% of seller side',
      pct_total:'% of total', fixed:'Fixed'
    }[d.collab_commission_type] || '';
    commHtml += `<div class="comm-row collab"><span>− Collaborator's share${collabTypeLabel?' ('+collabTypeLabel+')':''}</span><span>−${fmtEur(collabCut)}</span></div>
      <div class="comm-row net"><span>Net to agency</span><strong style="color:var(--kre-teal)">${fmtEur(net)}</strong></div>`;
  }
  commHtml += '</div>';
  document.getElementById('dp-commission').innerHTML = commHtml;

  // Stage buttons
  const stages = settings.deal_stages || KRE_DEFAULTS.deal_stages;
  document.getElementById('dp-stage-btns').innerHTML = stages.map(s =>
    `<button class="btn btn-sm ${d.stage===s.id?'btn-primary':'btn-ghost'}"
      style="${d.stage===s.id?`background:${s.color};border-color:${s.color};color:#fff`:`color:${s.color};border-color:${s.color}`}"
      onclick="moveDealStage('${dealId}','${s.id}')">${esc(s.label)}</button>`
  ).join('');

  // Checklist
  const checklist = d.deal_checklist || {};
  document.getElementById('dp-checklist').innerHTML = `<div class="checklist">` +
    DEAL_CHECKLIST.map(item => {
      const key  = item.toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,'');
      const done = !!checklist[key];
      return `<div class="checklist-item${done?' done':''}">
        <input type="checkbox" id="dc_${key}" ${done?'checked':''}
          onchange="toggleDealCheck('${dealId}','${key}',this.checked)">
        <span>${esc(item)}</span>
      </div>`;
    }).join('') + `</div>`;

  document.getElementById('dp-notes-edit').value    = d.notes || '';
  document.getElementById('dp-complete-btn').style.display = d.stage === 'completed' ? 'none' : '';
  openModal('dealPanel');
}

async function moveDealStage(dealId, stageId) {
  const d = allDeals.find(x => x.id === dealId);
  if (!d) return;
  const r = await DB.upsertOne('kre_deals', { ...d, stage: stageId });
  if (r.ok) { d.stage = stageId; toast('Stage updated','success'); renderBoard(); updateKPIs(); openPanel(dealId); }
  else toast('Error: '+r.err,'error');
}

async function toggleDealCheck(dealId, key, checked) {
  const d = allDeals.find(x => x.id === dealId);
  if (!d) return;
  const checklist = { ...(d.deal_checklist||{}), [key]: checked };
  const r = await DB.upsertOne('kre_deals', { ...d, deal_checklist: checklist });
  if (r.ok) d.deal_checklist = checklist;
}

async function saveNotes() {
  const d = allDeals.find(x => x.id === currentDealId);
  if (!d) return;
  const notes = document.getElementById('dp-notes-edit').value.trim();
  const r = await DB.upsertOne('kre_deals', { ...d, notes });
  if (r.ok) { d.notes = notes; toast('Notes saved','success'); }
  else toast('Error: '+r.err,'error');
}

async function markComplete() {
  const d = allDeals.find(x => x.id === currentDealId);
  if (!d) return;
  if (!confirm('Mark this deal as completed and log the net commission as revenue?')) return;

  const commB      = parseFloat(d.commission_buyer)  || 0;
  const commS      = parseFloat(d.commission_seller) || 0;
  const gross      = commB + commS;
  const collabCut  = parseFloat(d.collab_commission_amount_eur) || 0;
  const net        = gross - collabCut;

  await DB.upsertOne('kre_deals', { ...d, stage: 'completed', completed_at: new Date().toISOString() });
  d.stage = 'completed';

  if (net > 0) {
    await DB.upsertOne('kre_revenues', {
      deal_id:                  currentDealId,
      property_id:              d.property_id,
      buyer_id:                 d.buyer_is_collab_client ? null : d.buyer_id,
      buyer_name:               d.buyer_is_collab_client ? (d.buyer_name_manual||'Collaborator\'s Client') : null,
      date:                     new Date().toISOString().slice(0,10),
      amount_buyer_commission:  commB,
      amount_seller_commission: commS,
      amount_collab_commission: collabCut,
      amount_total:             net,
      type:                     'deal_commission',
      notes: `Deal completed: ${fmtEur(d.agreed_price)} sale${collabCut>0?' (collab share: '+fmtEur(collabCut)+')':''}`
    });
  }

  toast('Deal marked complete — revenue logged!','success');
  closeModal('dealPanel');
  updateKPIs();
  renderBoard();
}

async function deleteDeal() {
  if (!currentDealId) return;
  if (!confirm('Delete this deal? This cannot be undone.')) return;
  const r = await DB.deleteOne('kre_deals', currentDealId);
  if (r.ok) {
    allDeals = allDeals.filter(d => d.id !== currentDealId);
    toast('Deal deleted');
    closeModal('dealPanel');
    updateKPIs();
    renderBoard();
  } else toast('Error: '+r.err,'error');
}

function openAdd() {
  document.getElementById('nd_property').value = '';
  document.getElementById('nd_buyer').value    = '';
  document.getElementById('nd_price').value    = '';
  document.getElementById('nd_close_date').value = '';
  document.getElementById('nd_notes').value    = '';
  document.getElementById('nd_collab').value   = '';
  document.getElementById('nd_buyer_name').value = '';
  document.getElementById('nd_collab_comm_val').value = '';
  document.getElementById('nd_buyer_name_wrap').style.display    = 'none';
  document.getElementById('nd_collab_comm_section').style.display = 'none';
  document.getElementById('comm-preview').innerHTML = '';
  const b = settings.budget || KRE_DEFAULTS.budget;
  document.getElementById('nd_comm_buyer_pct').value  = b.commission_pct || 2.5;
  document.getElementById('nd_comm_seller_pct').value = 0;
  openModal('addDealModal');
}

async function saveDeal() {
  const propId  = document.getElementById('nd_property').value;
  const buyerVal = document.getElementById('nd_buyer').value;
  const price   = parseFloat(document.getElementById('nd_price').value) || 0;
  if (!propId) { toast('Property is required','error'); return; }

  const bp = parseFloat(document.getElementById('nd_comm_buyer_pct').value)  || 0;
  const sp = parseFloat(document.getElementById('nd_comm_seller_pct').value) || 0;
  const commB = price * bp / 100;
  const commS = price * sp / 100;

  const isCollabClient    = buyerVal === 'collab_client';
  const collabId          = document.getElementById('nd_collab').value || null;
  const collabCommType    = collabId ? document.getElementById('nd_collab_comm_type').value : null;
  const collabCommVal     = collabId ? (parseFloat(document.getElementById('nd_collab_comm_val').value)||0) : 0;
  const collabCutEur      = collabId ? calcCollabCut(commB, commS, collabCommType, collabCommVal) : 0;

  const deal = {
    property_id:              propId,
    buyer_id:                 isCollabClient ? null : (buyerVal || null),
    buyer_is_collab_client:   isCollabClient,
    buyer_name_manual:        isCollabClient ? document.getElementById('nd_buyer_name').value.trim() || null : null,
    agreed_price:             price,
    commission_buyer:         commB,
    commission_seller:        commS,
    commission_buyer_pct:     bp,
    commission_seller_pct:    sp,
    collaborator_id:          collabId,
    collab_commission_type:   collabCommType,
    collab_commission_value:  collabCommVal || null,
    collab_commission_amount_eur: collabCutEur || null,
    close_date:               document.getElementById('nd_close_date').value || null,
    notes:                    document.getElementById('nd_notes').value.trim() || null,
    stage:                    'offer_made',
    deal_checklist:           {}
  };

  syncStart();
  const r = await DB.upsertOne('kre_deals', deal);
  syncDone(r.ok);
  if (r.ok) {
    allDeals.push({ ...deal, id: r.id, _created: new Date().toISOString() });
    toast('Deal created','success');
    closeModal('addDealModal');
    updateKPIs();
    renderBoard();
  } else toast('Error: '+r.err,'error');
}

init();
</script>
</body>
</html>
