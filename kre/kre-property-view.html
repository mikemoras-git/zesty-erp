<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>KRE — Property Detail</title>
<link rel="stylesheet" href="kre-style.css">
<style>
.prop-hero { background:var(--kre-deep); color:#fff; border-radius:12px; padding:28px 32px; margin-bottom:24px; position:relative; overflow:hidden; }
.prop-hero::before { content:''; position:absolute; inset:0; background:linear-gradient(135deg,rgba(28,138,140,.15),transparent); pointer-events:none; }
.prop-hero h1 { font-family:'Cormorant Garamond',serif; font-size:28px; font-weight:500; margin:0 0 6px; }
.prop-hero .sub { font-size:14px; color:rgba(255,255,255,.6); margin:0 0 20px; }
.prop-hero-meta { display:flex; gap:24px; flex-wrap:wrap; }
.prop-hero-stat { }
.prop-hero-stat .lbl { font-size:11px; color:rgba(255,255,255,.5); text-transform:uppercase; letter-spacing:.08em; }
.prop-hero-stat .val { font-size:20px; font-weight:700; font-family:'DM Mono',monospace; color:#fff; }
.prop-hero-actions { position:absolute; top:24px; right:24px; display:flex; gap:8px; }
.detail-grid { display:grid; grid-template-columns:1fr 340px; gap:20px; align-items:start; }
@media(max-width:960px){ .detail-grid { grid-template-columns:1fr; } }
.spec-grid { display:grid; grid-template-columns:1fr 1fr; gap:0; }
.spec-row { display:flex; justify-content:space-between; padding:9px 0; border-bottom:1px solid var(--border); font-size:13px; }
.spec-row:last-child { border-bottom:none; }
.spec-lbl { color:var(--text-muted); }
.spec-val { font-weight:600; text-align:right; }
.checklist-item { display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid var(--border); font-size:13px; }
.checklist-item:last-child { border-bottom:none; }
.checklist-item input[type=checkbox] { width:16px;height:16px;cursor:pointer; }
.checklist-done { color:var(--text-muted); text-decoration:line-through; }
.section-title { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.1em; color:var(--text-muted); margin:20px 0 10px; }
.tab-bar { display:flex; gap:0; border-bottom:2px solid var(--border); margin-bottom:20px; }
.tab-btn { padding:10px 18px; font-size:13px; font-weight:500; cursor:pointer; border:none; background:none; color:var(--text-muted); border-bottom:2px solid transparent; margin-bottom:-2px; transition:color .15s; }
.tab-btn.active { color:var(--kre-teal); border-bottom-color:var(--kre-teal); }
.tab-panel { display:none; }
.tab-panel.active { display:block; }
.match-buyer-row { display:flex; align-items:center; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--border); font-size:13px; }
.match-buyer-row:last-child { border-bottom:none; }
</style>
</head>
<body>
<div class="kre-page">

  <div style="margin-bottom:16px">
    <a href="kre-properties.html" style="font-size:13px;color:var(--kre-teal)">← Back to Properties</a>
  </div>

  <div id="prop-hero" class="prop-hero">
    <div class="prop-hero-actions">
      <button class="btn btn-ghost" id="share-btn" onclick="sharePublic()" style="color:#fff;border-color:rgba(255,255,255,.3)">🔗 Share Link</button>
      <button class="btn btn-ghost" id="edit-btn" onclick="openEditModal()" style="color:#fff;border-color:rgba(255,255,255,.3)">✎ Edit</button>
    </div>
    <div class="spinner" id="hero-spinner"></div>
    <div id="hero-content" style="display:none">
      <h1 id="h-title">—</h1>
      <p class="sub" id="h-sub"></p>
      <div class="prop-hero-meta">
        <div class="prop-hero-stat">
          <div class="lbl">Owner Price</div>
          <div class="val" id="h-owner-price">—</div>
        </div>
        <div class="prop-hero-stat">
          <div class="lbl">Office Price</div>
          <div class="val" id="h-office-price">—</div>
        </div>
        <div class="prop-hero-stat">
          <div class="lbl">Plot</div>
          <div class="val" id="h-plot">—</div>
        </div>
        <div class="prop-hero-stat">
          <div class="lbl">Building Capacity</div>
          <div class="val" id="h-bld-cap">—</div>
        </div>
        <div class="prop-hero-stat">
          <div class="lbl">Sea View</div>
          <div class="val" id="h-sea">—</div>
        </div>
        <div class="prop-hero-stat" id="h-avail-wrap">
          <div class="lbl">Status</div>
          <div class="val" id="h-avail">—</div>
        </div>
      </div>
    </div>
  </div>

  <div class="detail-grid">

    <!-- LEFT: TABS -->
    <div>
      <div class="tab-bar">
        <button class="tab-btn active" onclick="showTab('details')">Details</button>
        <button class="tab-btn" onclick="showTab('checklist')">Checklist</button>
        <button class="tab-btn" onclick="showTab('matches')">Matched Buyers</button>
        <button class="tab-btn" onclick="showTab('tasks')">Tasks</button>
        <button class="tab-btn" onclick="showTab('deals')">Deals</button>
      </div>

      <!-- DETAILS TAB -->
      <div class="tab-panel active" id="tab-details">
        <div class="card">
          <div class="card-header"><h2>Specifications</h2></div>
          <div class="card-body" style="padding:0 22px">
            <div id="spec-rows"></div>
          </div>
        </div>
        <div class="card" style="margin-top:16px" id="desc-card">
          <div class="card-header"><h2>Description</h2></div>
          <div class="card-body">
            <p id="prop-desc" style="font-size:14px;line-height:1.7;color:var(--text);white-space:pre-wrap;margin:0"></p>
          </div>
        </div>
        <div class="card" style="margin-top:16px" id="links-card">
          <div class="card-header"><h2>Links & Media</h2></div>
          <div class="card-body" id="links-body"></div>
        </div>
      </div>

      <!-- CHECKLIST TAB -->
      <div class="tab-panel" id="tab-checklist">
        <div class="card">
          <div class="card-header">
            <h2>Document Checklist</h2>
            <div id="checklist-progress-text" style="font-size:13px;color:var(--text-muted)"></div>
          </div>
          <div class="card-body" style="padding:0 22px" id="checklist-body"></div>
        </div>
      </div>

      <!-- MATCHES TAB -->
      <div class="tab-panel" id="tab-matches">
        <div class="card">
          <div class="card-header">
            <h2>Matched Buyers</h2>
            <button class="btn btn-ghost btn-sm" onclick="runMatches()">Re-run Matches</button>
          </div>
          <div class="card-body" style="padding:0 22px" id="matches-body">
            <div class="spinner"></div>
          </div>
        </div>
      </div>

      <!-- TASKS TAB -->
      <div class="tab-panel" id="tab-tasks">
        <div class="card">
          <div class="card-header">
            <h2>Tasks</h2>
            <button class="btn btn-primary btn-sm" onclick="openAddTask()">+ Task</button>
          </div>
          <div class="card-body" style="padding:0 22px" id="tasks-body">
            <div class="spinner"></div>
          </div>
        </div>
      </div>

      <!-- DEALS TAB -->
      <div class="tab-panel" id="tab-deals">
        <div class="card">
          <div class="card-header">
            <h2>Linked Deals</h2>
            <a href="kre-pipeline-deals.html" class="btn btn-ghost btn-sm">Open Deal Pipeline</a>
          </div>
          <div class="card-body" style="padding:0 22px" id="deals-body">
            <div class="spinner"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- RIGHT SIDEBAR -->
    <div>
      <!-- OWNER INFO -->
      <div class="card" style="margin-bottom:16px" id="owner-card">
        <div class="card-header"><h2>Owner</h2></div>
        <div class="card-body" id="owner-body">
          <div class="spinner"></div>
        </div>
      </div>

      <!-- MAP -->
      <div class="card" style="margin-bottom:16px" id="map-card">
        <div class="card-header"><h2>Location</h2></div>
        <div class="card-body" id="map-body"></div>
      </div>

      <!-- QUICK ACTIONS -->
      <div class="card">
        <div class="card-header"><h2>Quick Actions</h2></div>
        <div class="card-body" style="display:flex;flex-direction:column;gap:8px">
          <a id="budget-link" href="kre-budget.html" class="btn btn-ghost" style="text-align:center">📊 Open Budget Calculator</a>
          <button class="btn btn-ghost" onclick="sharePublic()" id="public-link-btn">🔗 Copy Shareable Link</button>
          <button class="btn btn-ghost" onclick="openEditModal()" id="sidebar-edit-btn">✎ Edit Property</button>
        </div>
      </div>
    </div>

  </div>

</div>

<!-- QUICK TASK MODAL -->
<div class="modal-overlay" id="taskModal">
  <div class="modal">
    <div class="modal-header">
      <h2>Add Task</h2>
      <button class="modal-close" onclick="closeModal('taskModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group"><label>Task *</label><input id="qt_title" type="text" placeholder="What needs to be done?"></div>
      <div class="form-row">
        <div class="form-group">
          <label>Priority</label>
          <select id="qt_priority"><option value="medium">Medium</option><option value="high">High</option><option value="low">Low</option></select>
        </div>
        <div class="form-group"><label>Due Date</label><input id="qt_due" type="date"></div>
      </div>
      <div class="form-group"><label>Notes</label><textarea id="qt_notes" rows="2"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('taskModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveTask()">Add Task</button>
    </div>
  </div>
</div>

<script src="kre-base.js"></script>
<script src="kre-nav.js"></script>
<script>
let prop     = null;
let propId   = null;
let settings = {};
let allContacts = [];
let allMatches  = [];
let allTasks    = [];
let allDeals    = [];

async function init() {
  const params = new URLSearchParams(window.location.search);
  propId = params.get('id');
  if (!propId) { document.getElementById('prop-hero').innerHTML = '<p style="color:#fff">No property ID specified.</p>'; return; }

  settings = await SETTINGS.load();

  const [pr, cr, mr, tr, dr] = await Promise.all([
    DB.getById('kre_properties', propId),
    DB.loadAll('kre_contacts'),
    DB.loadAll('kre_matches'),
    DB.loadAll('kre_tasks'),
    DB.loadAll('kre_deals')
  ]);

  prop        = pr.row;
  allContacts = cr.rows || [];
  allMatches  = (mr.rows || []).filter(m => m.property_id === propId);
  allTasks    = (tr.rows || []).filter(t => t.link_type === 'property' && t.link_id === propId);
  allDeals    = (dr.rows || []).filter(d => d.property_id === propId);

  if (!prop) { document.getElementById('prop-hero').innerHTML = '<p style="color:#fff">Property not found.</p>'; return; }

  renderHero();
  renderSpecs();
  renderChecklist();
  renderOwner();
  renderMap();
  renderLinks();
  renderMatches();
  renderTasks();
  renderDeals();

  // update page title
  document.title = `KRE — #${prop.property_num||'?'} ${prop.area||''}`;
}

function renderHero() {
  document.getElementById('hero-spinner').style.display = 'none';
  document.getElementById('hero-content').style.display = '';
  const role = AUTH.getSession()?.role;
  document.getElementById('h-title').textContent     = `#${prop.property_num||'?'} — ${prop.type||''} in ${prop.area||''}`;
  document.getElementById('h-sub').textContent       = `${prop.plot ? prop.plot+'m² plot' : ''}${prop.house ? ' · '+prop.house+'m² house' : ''}`;
  document.getElementById('h-owner-price').textContent  = prop.owner_price  ? fmtEur(prop.owner_price)  : '—';
  document.getElementById('h-office-price').textContent = prop.office_price ? fmtEur(prop.office_price) : '—';
  document.getElementById('h-plot').textContent     = prop.plot    ? prop.plot+'m²'   : '—';
  document.getElementById('h-bld-cap').textContent  = prop.bld_cap ? prop.bld_cap+'m²': '—';
  document.getElementById('h-sea').textContent      = prop.sea_view ? (prop.sea_m ? prop.sea_m+'m' : 'Yes') : 'No';
  document.getElementById('h-avail').textContent    = prop.available === false ? 'Sold' : 'Available';
  if (role === 'collaborator') {
    document.getElementById('edit-btn').style.display = 'none';
    document.getElementById('sidebar-edit-btn').style.display = 'none';
  }
}

function renderSpecs() {
  const specs = [
    { lbl:'Property #',         val: prop.property_num || '—' },
    { lbl:'Type',               val: prop.type || '—' },
    { lbl:'Area',               val: prop.area || '—' },
    { lbl:'Plot Size',          val: prop.plot ? prop.plot+'m²' : '—' },
    { lbl:'House Size',         val: prop.house ? prop.house+'m²' : '—' },
    { lbl:'Building Capacity',  val: prop.bld_cap ? prop.bld_cap+'m²' : '—' },
    { lbl:'Sea View',           val: prop.sea_view ? 'Yes' : 'No' },
    { lbl:'Distance to Sea',    val: prop.sea_m ? prop.sea_m+'m' : '—' },
    { lbl:'Owner Price',        val: prop.owner_price  ? fmtEur(prop.owner_price)  : '—' },
    { lbl:'Office Price',       val: prop.office_price ? fmtEur(prop.office_price) : '—' },
    { lbl:'Markup',             val: (prop.owner_price && prop.office_price) ? fmtEur(prop.office_price - prop.owner_price) : '—' },
    { lbl:'Available',         val: prop.available === false ? 'Sold / Unavailable' : 'Available' },
    { lbl:'On Website',         val: prop.on_web ? 'Yes' : 'No' },
    { lbl:'New on Website',     val: prop.new_web ? 'Yes' : 'No' },
    { lbl:'Topographic',        val: prop.topo ? 'Yes' : 'No' }
  ];
  document.getElementById('spec-rows').innerHTML = specs.map(s =>
    `<div class="spec-row"><span class="spec-lbl">${s.lbl}</span><span class="spec-val">${s.val}</span></div>`
  ).join('');

  const desc = prop.desc || prop.notes || '';
  const descCard = document.getElementById('desc-card');
  if (desc) {
    document.getElementById('prop-desc').textContent = desc;
  } else {
    descCard.style.display = 'none';
  }
}

function renderChecklist() {
  const items    = settings.checklist_items || KRE_DEFAULTS.checklist_items;
  const checked  = prop.checklist || {};
  const done     = items.filter(i => checked[i]).length;
  document.getElementById('checklist-progress-text').textContent = `${done} / ${items.length} complete`;

  document.getElementById('checklist-body').innerHTML = items.map(item => {
    const isDone = !!checked[item];
    return `<div class="checklist-item">
      <input type="checkbox" ${isDone?'checked':''} onchange="toggleChecklist('${esc(item)}',this.checked)">
      <span class="${isDone?'checklist-done':''}">${esc(item)}</span>
    </div>`;
  }).join('');
}

async function toggleChecklist(item, val) {
  const checklist = { ...(prop.checklist||{}), [item]: val };
  const r = await DB.upsertOne('kre_properties', {...prop, checklist});
  if (r.ok) {
    prop.checklist = checklist;
    const items = settings.checklist_items || KRE_DEFAULTS.checklist_items;
    const done  = items.filter(i => checklist[i]).length;
    document.getElementById('checklist-progress-text').textContent = `${done} / ${items.length} complete`;
    // update strikethrough
    document.querySelectorAll('.checklist-item span').forEach((el,idx) => {
      if (items[idx]) {
        el.className = checklist[items[idx]] ? 'checklist-done' : '';
      }
    });
    toast(val ? 'Document marked complete' : 'Unchecked', 'success');
  } else {
    toast('Error: '+r.err,'error');
  }
}

function renderOwner() {
  const role = AUTH.getSession()?.role;
  const el   = document.getElementById('owner-body');
  if (!prop.owner) {
    el.innerHTML = '<span style="color:var(--text-muted);font-size:13px">No owner recorded</span>';
    return;
  }
  if (role === 'collaborator') {
    el.innerHTML = `<div style="font-size:14px;font-weight:600">${esc(prop.owner)}</div>
      <div style="font-size:12px;color:var(--text-muted);margin-top:4px">Contact details restricted</div>`;
  } else {
    el.innerHTML = `<div style="font-size:14px;font-weight:600">${esc(prop.owner)}</div>
      ${prop.owner_phone ? `<div style="margin-top:8px"><a href="tel:${esc(prop.owner_phone)}" style="color:var(--kre-teal)">📞 ${esc(prop.owner_phone)}</a></div>` : ''}
      ${prop.owner_email ? `<div style="margin-top:4px"><a href="mailto:${esc(prop.owner_email)}" style="color:var(--kre-teal)">✉ ${esc(prop.owner_email)}</a></div>` : ''}`;
  }
}

function renderMap() {
  const el = document.getElementById('map-body');
  if (prop.coords) {
    const [lat,lng] = prop.coords.split(',').map(s=>s.trim());
    if (lat && lng) {
      el.innerHTML = `
        <div style="margin-bottom:10px;font-size:13px;color:var(--text-muted)">📍 ${esc(prop.area||'')}</div>
        <a href="https://www.google.com/maps?q=${encodeURIComponent(prop.coords)}" target="_blank" class="btn btn-ghost" style="width:100%;text-align:center;display:block">Open in Google Maps</a>
        <div style="font-size:11px;color:var(--text-muted);margin-top:8px;text-align:center">${esc(prop.coords)}</div>`;
      return;
    }
  }
  document.getElementById('map-card').style.display = 'none';
}

function renderLinks() {
  const el = document.getElementById('links-body');
  const lines = [];
  if (prop.photos) lines.push(`<a href="${esc(prop.photos)}" target="_blank" class="btn btn-ghost" style="display:block;text-align:center;margin-bottom:8px">📁 Open Photos Folder (OneDrive)</a>`);
  if (!lines.length) { document.getElementById('links-card').style.display = 'none'; return; }
  el.innerHTML = lines.join('');
}

function renderMatches() {
  const el = document.getElementById('matches-body');
  if (!allMatches.length) {
    el.innerHTML = `<div style="color:var(--text-muted);font-size:13px;text-align:center;padding:16px">No matches yet. Click "Re-run Matches" to generate.</div>`;
    return;
  }
  const sorted = [...allMatches].sort((a,b)=>(b.score||0)-(a.score||0));
  el.innerHTML = sorted.map(m => {
    const c = allContacts.find(x=>x.id===m.contact_id);
    if (!c) return '';
    const name  = (c.first_name||'')+' '+(c.last_name||'');
    const score = m.score||0;
    const col   = score>=70?'var(--success)':score>=40?'var(--warning)':'var(--text-light)';
    const badge = { pending:'badge-gray', proposed:'badge-green', declined:'badge-red' }[m.status]||'badge-gray';
    return `<div class="match-buyer-row">
      <div>
        <strong>${esc(name)}</strong>
        <div style="font-size:11px;color:var(--text-muted)">${(m.reasons||[]).join(', ')}</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <span class="badge ${badge}">${m.status||'pending'}</span>
        <span style="font-family:'DM Mono',monospace;font-weight:700;color:${col};font-size:15px">${score}</span>
      </div>
    </div>`;
  }).join('');
}

async function runMatches() {
  const buyers = allContacts.filter(c=>c.role==='buyer'||c.role==='both');
  let created = 0;
  for (const buyer of buyers) {
    const existing = allMatches.find(m=>m.contact_id===buyer.id);
    if (existing) continue;
    const result = MATCHER.score(buyer, prop);
    if (result.score >= 40) {
      const r = await DB.upsertOne('kre_matches', {
        contact_id: buyer.id, property_id: propId,
        score: result.score, reasons: result.reasons, status: 'pending'
      });
      if (r.ok) { allMatches.push(r.row); created++; }
    }
  }
  renderMatches();
  toast(created ? `${created} new matches found` : 'No new matches', created ? 'success' : 'info');
}

function renderTasks() {
  const el    = document.getElementById('tasks-body');
  const today = new Date().toISOString().slice(0,10);
  if (!allTasks.length) {
    el.innerHTML = `<div style="color:var(--text-muted);font-size:13px;text-align:center;padding:16px">No tasks for this property</div>`;
    return;
  }
  const sorted = allTasks.sort((a,b) => a.done === b.done ? 0 : a.done ? 1 : -1);
  el.innerHTML = sorted.map(t => {
    const isOverdue = !t.done && t.due_date && t.due_date < today;
    const dotColor  = {high:'var(--danger)',medium:'var(--warning)',low:'var(--success)'}[t.priority||'medium'];
    return `<div class="task-mini" style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);${t.done?'opacity:.5':''}">
      <span style="width:8px;height:8px;border-radius:50%;background:${dotColor};flex-shrink:0;display:inline-block"></span>
      <span style="flex:1;font-size:13px;${t.done?'text-decoration:line-through':''}">${esc(t.title||'')}</span>
      ${t.due_date ? `<span style="font-size:11px;color:${isOverdue?'var(--danger)':'var(--text-muted)'}">${fmtDate(t.due_date)}</span>` : ''}
      <span class="badge ${t.done?'badge-green':'badge-gray'}">${t.done?'Done':'Open'}</span>
    </div>`;
  }).join('');
}

function renderDeals() {
  const el = document.getElementById('deals-body');
  if (!allDeals.length) {
    el.innerHTML = `<div style="color:var(--text-muted);font-size:13px;text-align:center;padding:16px">No deals linked to this property</div>`;
    return;
  }
  el.innerHTML = allDeals.map(d => {
    return `<div style="padding:10px 0;border-bottom:1px solid var(--border);font-size:13px">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <strong>${esc(d.buyer_name||'Deal')}</strong>
        <span class="badge badge-teal">${esc(d.stage||'')}</span>
      </div>
      <div style="color:var(--text-muted);margin-top:3px">${d.sale_price ? fmtEur(d.sale_price) : ''} · ${fmtDate(d.created_at)}</div>
    </div>`;
  }).join('');
}

function showTab(name) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    const tabs = ['details','checklist','matches','tasks','deals'];
    b.classList.toggle('active', tabs[i]===name);
  });
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
}

function sharePublic() {
  const url = location.origin + location.pathname.replace('kre-property-view.html','kre-property-public.html') + '?id=' + propId;
  navigator.clipboard.writeText(url).then(() => toast('Link copied to clipboard','success')).catch(() => {
    prompt('Copy this link:', url);
  });
}

function openEditModal() {
  window.location.href = 'kre-properties.html?edit=' + propId;
}

function openAddTask() {
  document.getElementById('qt_title').value    = '';
  document.getElementById('qt_priority').value = 'medium';
  document.getElementById('qt_due').value      = '';
  document.getElementById('qt_notes').value    = '';
  openModal('taskModal');
}

async function saveTask() {
  const title = document.getElementById('qt_title').value.trim();
  if (!title) { toast('Task description required','error'); return; }
  const r = await DB.upsertOne('kre_tasks', {
    title,
    priority:  document.getElementById('qt_priority').value,
    due_date:  document.getElementById('qt_due').value||null,
    notes:     document.getElementById('qt_notes').value.trim()||null,
    link_type: 'property',
    link_id:   propId,
    done:      false
  });
  if (r.ok) {
    allTasks.push(r.row);
    renderTasks();
    closeModal('taskModal');
    toast('Task added','success');
  } else {
    toast('Error: '+r.err,'error');
  }
}

init();
</script>
</body>
</html>
