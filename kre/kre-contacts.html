<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>KRE — Contacts</title>
<link rel="stylesheet" href="kre-style.css">
<style>
/* Multi-area tag input */
.tag-input-wrap { border:1px solid var(--border); border-radius:8px; padding:6px 8px; background:#fff; min-height:38px; display:flex; flex-wrap:wrap; gap:5px; align-items:center; cursor:text; }
.tag-pill { display:inline-flex; align-items:center; gap:4px; background:rgba(28,138,140,.12); color:var(--kre-teal); border:1px solid rgba(28,138,140,.25); border-radius:12px; padding:2px 8px; font-size:12px; font-weight:500; }
.tag-pill button { background:none; border:none; color:inherit; cursor:pointer; font-size:13px; line-height:1; padding:0; opacity:.6; }
.tag-pill button:hover { opacity:1; }
/* Contact view panel */
.cv-grid { display:grid; grid-template-columns:1fr 1fr; gap:0; }
.cv-field { padding:9px 0; border-bottom:1px solid var(--border); font-size:13px; display:flex; flex-direction:column; gap:2px; }
.cv-field:nth-last-child(-n+2) { border-bottom:none; }
.cv-lbl { font-size:10px; text-transform:uppercase; letter-spacing:.08em; color:var(--text-muted); font-weight:600; }
.cv-val { font-weight:500; color:var(--kre-deep); }
.cv-section { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.1em; color:var(--text-muted); padding:14px 0 4px; border-top:1px solid var(--border); margin-top:6px; }
.cv-section:first-child { border-top:none; margin-top:0; padding-top:0; }
</style>
</head>
<body>
<div class="kre-page">

  <div class="page-header">
    <div class="page-title">
      <h1>Contacts</h1>
      <p id="contact-sub">Buyers, sellers and both</p>
    </div>
    <div class="page-actions">
      <button class="btn btn-primary" onclick="openAdd()">+ Add Contact</button>
    </div>
  </div>

  <div class="filter-bar">
    <input class="search-input" id="f-search" type="text" placeholder="Search name, email, phone…" oninput="applyFilters()">
    <select id="f-role" onchange="applyFilters()">
      <option value="">All Roles</option>
      <option value="buyer">Buyers</option>
      <option value="seller">Sellers</option>
      <option value="both">Both</option>
    </select>
    <select id="f-active" onchange="applyFilters()">
      <option value="">All Status</option>
      <option value="true">Active</option>
      <option value="false">Inactive / Archived</option>
    </select>
    <select id="f-stage" onchange="applyFilters()">
      <option value="">All Stages</option>
    </select>
    <span class="filter-count" id="filter-count"></span>
  </div>

  <div class="card" style="overflow:hidden">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Name</th><th>Role</th><th>Phone</th><th>Email</th>
            <th>Preferred Areas</th><th>Budget</th><th>Stage</th>
            <th>Last Contact</th><th style="text-align:right">Actions</th>
          </tr>
        </thead>
        <tbody id="contact-table">
          <tr><td colspan="9" class="loading-row"><div class="spinner"></div> Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<!-- ── VIEW MODAL (read-only) ──────────────────────────────── -->
<div class="modal-overlay" id="contactViewModal">
  <div class="modal modal-lg">
    <div class="modal-header">
      <h2 id="cvModalTitle">Contact</h2>
      <button class="modal-close" onclick="closeModal('contactViewModal')">✕</button>
    </div>
    <div class="modal-body" id="cv-body"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('contactViewModal')">Close</button>
      <button class="btn btn-ghost btn-sm" id="cvArchiveBtn" onclick="archiveContact()" style="margin-right:auto">Archive</button>
      <button class="btn btn-danger btn-sm" id="cvDeleteBtn" onclick="deleteContactFromView()">Delete</button>
      <a id="cvBudgetLink" href="kre-budget.html" class="btn btn-ghost btn-sm" style="display:none">📊 Budget Calc</a>
      <button class="btn btn-primary" onclick="openEditFromView()">✎ Edit</button>
    </div>
  </div>
</div>

<!-- ── ADD / EDIT MODAL ──────────────────────────────────────── -->
<div class="modal-overlay" id="contactModal">
  <div class="modal modal-lg">
    <div class="modal-header">
      <h2 id="contactModalTitle">Add Contact</h2>
      <button class="modal-close" onclick="closeModal('contactModal')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="c_id">

      <div class="section-lbl">Personal Information</div>
      <div class="form-row">
        <div class="form-group"><label>First Name *</label><input id="c_fname" type="text"></div>
        <div class="form-group"><label>Last Name *</label><input id="c_lname" type="text"></div>
      </div>
      <div class="form-row-3">
        <div class="form-group">
          <label>Role *</label>
          <select id="c_role" onchange="toggleBuyerSection()">
            <option value="buyer">Buyer</option>
            <option value="seller">Seller</option>
            <option value="both">Both (Buyer &amp; Seller)</option>
          </select>
        </div>
        <div class="form-group"><label>Nationality</label><input id="c_nationality" type="text" placeholder="e.g. British, German…"></div>
        <div class="form-group">
          <label>Status</label>
          <select id="c_active">
            <option value="true">Active</option>
            <option value="false">Archived / Inactive</option>
          </select>
        </div>
      </div>

      <div class="section-lbl">Contact Details</div>
      <div class="form-row">
        <div class="form-group"><label>Phone 1</label><input id="c_phone1" type="tel"></div>
        <div class="form-group"><label>Phone 2</label><input id="c_phone2" type="tel"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Email</label><input id="c_email" type="email"></div>
        <div class="form-group"><label>Date of First Contact</label><input id="c_first_contact" type="date"></div>
      </div>

      <div id="buyerSection">
        <div class="section-lbl">Buyer Preferences</div>
        <div class="form-row-4">
          <div class="form-group"><label>Preference 1</label><select id="c_pref1"><option value="">—</option></select></div>
          <div class="form-group"><label>Preference 2</label><select id="c_pref2"><option value="">—</option></select></div>
          <div class="form-group"><label>Preference 3</label><select id="c_pref3"><option value="">—</option></select></div>
          <div class="form-group"><label>Preference 4</label><select id="c_pref4"><option value="">—</option></select></div>
        </div>

        <div class="form-group">
          <label>Preferred Areas / Locations <span style="font-weight:400;color:var(--text-muted)">(add as many as needed)</span></label>
          <div class="tag-input-wrap" id="c_areas_wrap" onclick="document.getElementById('c_areas_add').focus()"></div>
          <select id="c_areas_add" style="margin-top:6px;width:100%" onchange="addArea(this.value)">
            <option value="">+ Add an area…</option>
          </select>
        </div>

        <div class="form-row">
          <div class="form-group"><label>Minimum Plot Size (m²)</label><input id="c_min_plot" type="number" min="0"></div>
          <div class="form-group" style="display:flex;align-items:flex-end">
            <div class="check-row" style="padding-bottom:9px">
              <input type="checkbox" id="c_sea_view">
              <label for="c_sea_view">Requires Sea View</label>
            </div>
          </div>
        </div>
        <div class="form-row-3">
          <div class="form-group">
            <label>Min. Budget (€)</label>
            <div class="input-group"><span class="input-pfx">€</span><input id="c_budget_min" type="number" min="0"></div>
          </div>
          <div class="form-group">
            <label>Max. Budget (€)</label>
            <div class="input-group"><span class="input-pfx">€</span><input id="c_budget_max" type="number" min="0"></div>
          </div>
        </div>

        <div class="section-lbl">Client Pipeline Stage</div>
        <div class="form-row">
          <div class="form-group"><label>Current Stage</label><select id="c_stage"></select></div>
          <div class="form-group"><label>Last Contact Date</label><input id="c_last_contact" type="date"></div>
        </div>
      </div>

      <div class="section-lbl">Source &amp; Notes</div>
      <div class="form-row">
        <div class="form-group">
          <label>Source / Referred by</label>
          <input id="c_source" type="text" placeholder="e.g. Website, Referral, Collaborator name…">
        </div>
        <div class="form-group">
          <label>Newsletter</label>
          <select id="c_newsletter">
            <option value="false">No</option>
            <option value="true">Yes — subscribe</option>
          </select>
        </div>
      </div>
      <div class="form-group"><label>Notes / Comments</label><textarea id="c_notes" rows="3" placeholder="Any notes about this contact…"></textarea></div>
      <div class="form-group"><label>Likes</label><input id="c_likes" type="text" placeholder="What they like about properties…"></div>
      <div class="form-group"><label>Dislikes</label><input id="c_dislikes" type="text" placeholder="What they dislike…"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('contactModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveContact()">Save Contact</button>
    </div>
  </div>
</div>

<script src="kre-base.js"></script>
<script src="kre-nav.js"></script>
<script>
let allContacts    = [];
let settings       = {};
let editingId      = null;
let viewingId      = null;
let _selectedAreas = [];   // array of area strings for current edit

/* ── Areas of Interest tag system ─────────────────────── */
function renderAreaTags() {
  const wrap = document.getElementById('c_areas_wrap');
  wrap.innerHTML = _selectedAreas.map((a, i) =>
    `<span class="tag-pill">${esc(a)}<button type="button" onclick="removeArea(${i})">×</button></span>`
  ).join('');
}
function addArea(val) {
  if (!val) return;
  if (!_selectedAreas.includes(val)) {
    _selectedAreas.push(val);
    renderAreaTags();
  }
  document.getElementById('c_areas_add').value = '';
}
function removeArea(idx) {
  _selectedAreas.splice(idx, 1);
  renderAreaTags();
}

function toggleBuyerSection() {
  const role = document.getElementById('c_role').value;
  document.getElementById('buyerSection').style.display =
    (role === 'buyer' || role === 'both') ? '' : 'none';
}

/* ── Init ─────────────────────────────────────────────── */
async function init() {
  settings = await SETTINGS.load();
  populateDropdowns();
  await loadContacts();
}

function populateDropdowns() {
  const types  = settings.property_types || KRE_DEFAULTS.property_types;
  const areas  = settings.locations      || KRE_DEFAULTS.locations;
  const stages = settings.client_stages  || KRE_DEFAULTS.client_stages;

  ['c_pref1','c_pref2','c_pref3','c_pref4'].forEach(id => {
    const sel = document.getElementById(id);
    types.forEach(t => { const o=document.createElement('option'); o.value=t; o.textContent=t; sel.appendChild(o); });
  });

  const aSel = document.getElementById('c_areas_add');
  areas.forEach(a => { const o=document.createElement('option'); o.value=a; o.textContent=a; aSel.appendChild(o); });

  const stageSel = document.getElementById('c_stage');
  stages.forEach(s => { const o=document.createElement('option'); o.value=s.id; o.textContent=s.label; stageSel.appendChild(o); });

  const fStageSel = document.getElementById('f-stage');
  stages.forEach(s => { const o=document.createElement('option'); o.value=s.id; o.textContent=s.label; fStageSel.appendChild(o); });
}

async function loadContacts() {
  const r = await DB.loadAll('kre_contacts');
  allContacts = r.rows || [];
  document.getElementById('contact-sub').textContent =
    `${allContacts.filter(c=>c.role==='buyer'||c.role==='both').length} buyers · ${allContacts.filter(c=>c.role==='seller'||c.role==='both').length} sellers`;
  applyFilters();
}

function applyFilters() {
  const search = document.getElementById('f-search').value.toLowerCase();
  const role   = document.getElementById('f-role').value;
  const active = document.getElementById('f-active').value;
  const stage  = document.getElementById('f-stage').value;

  const filtered = allContacts.filter(c => {
    if (role   && c.role !== role) return false;
    if (active !== '' && String(c.active !== false) !== active) return false;
    if (stage  && c.stage !== stage) return false;
    if (search) {
      const areas = (c.areas_of_interest || (c.area_pref ? [c.area_pref] : [])).join(' ');
      const hay = [c.first_name,c.last_name,c.email,c.phone1,c.phone2,c.notes,c.nationality,areas].join(' ').toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });

  document.getElementById('filter-count').textContent = `${filtered.length} of ${allContacts.length} shown`;
  renderTable(filtered);
}

function stageLabel(id) {
  const stages = settings.client_stages || KRE_DEFAULTS.client_stages;
  const s = stages.find(x => x.id === id);
  return s ? `<span class="badge" style="background:${s.color}22;color:${s.color}">${esc(s.label)}</span>` : '—';
}

function renderTable(contacts) {
  const tbody   = document.getElementById('contact-table');
  const canEdit = AUTH.canEdit();
  if (!contacts.length) {
    tbody.innerHTML = `<tr><td colspan="9"><div class="empty-state"><div class="empty-icon">◉</div><div class="empty-title">No contacts found</div></div></td></tr>`;
    return;
  }
  tbody.innerHTML = contacts.map(c => {
    const prefs   = [c.pref1,c.pref2,c.pref3,c.pref4].filter(Boolean).join(', ');
    const areas   = (c.areas_of_interest && c.areas_of_interest.length)
      ? c.areas_of_interest.join(', ')
      : (c.area_pref || '—');
    const budg    = (c.budget_min||c.budget_max)
      ? `${c.budget_min?fmtEur(c.budget_min):'?'} – ${c.budget_max?fmtEur(c.budget_max):'?'}`
      : '—';
    const roleBg  = c.role==='buyer'?'badge-blue':c.role==='seller'?'badge-orange':'badge-purple';
    return `<tr style="cursor:pointer" onclick="openView('${c.id}')">
      <td>
        <strong>${esc(c.first_name||'')} ${esc(c.last_name||'')}</strong>
        ${c.nationality ? `<span style="font-size:11px;color:var(--text-muted);margin-left:6px">${esc(c.nationality)}</span>` : ''}
        ${c.active===false ? ' <span class="badge badge-gray" style="font-size:10px">Archived</span>' : ''}
      </td>
      <td><span class="badge ${roleBg}">${c.role||'—'}</span></td>
      <td>${esc(c.phone1||'—')}</td>
      <td><a href="mailto:${esc(c.email||'')}" style="color:var(--kre-teal)" onclick="event.stopPropagation()">${esc(c.email||'—')}</a></td>
      <td style="font-size:12px">${esc(areas)}</td>
      <td style="font-size:12px">${budg}</td>
      <td>${stageLabel(c.stage)}</td>
      <td style="font-size:12px">${c.last_contact ? fmtDate(c.last_contact) : c.first_contact ? fmtDate(c.first_contact) : '—'}</td>
      <td class="td-actions" onclick="event.stopPropagation()">
        <a href="kre-budget.html?contact=${c.id}" class="btn btn-ghost btn-sm" title="Open budget calculator">📊</a>
        ${canEdit ? `<button class="btn btn-ghost btn-sm" onclick="openEdit('${c.id}')">Edit</button>` : ''}
      </td>
    </tr>`;
  }).join('');
}

/* ── VIEW mode ────────────────────────────────────────── */
function openView(id) {
  const c = allContacts.find(x => x.id === id);
  if (!c) return;
  viewingId = id;

  const stages = settings.client_stages || KRE_DEFAULTS.client_stages;
  const stageLbl = stages.find(s=>s.id===c.stage)?.label || '—';
  const areas = (c.areas_of_interest && c.areas_of_interest.length)
    ? c.areas_of_interest.join(', ')
    : (c.area_pref || '—');
  const prefs = [c.pref1,c.pref2,c.pref3,c.pref4].filter(Boolean).join(', ') || '—';
  const budget = (c.budget_min||c.budget_max)
    ? `${c.budget_min?fmtEur(c.budget_min):'?'} – ${c.budget_max?fmtEur(c.budget_max):'?'}`
    : '—';
  const roleMap = { buyer:'Buyer', seller:'Seller', both:'Buyer & Seller' };

  let html = `<div class="cv-section">Personal</div>
    <div class="cv-grid">
      <div class="cv-field"><span class="cv-lbl">Name</span><span class="cv-val">${esc((c.first_name||'')+' '+(c.last_name||''))}</span></div>
      <div class="cv-field"><span class="cv-lbl">Role</span><span class="cv-val">${roleMap[c.role]||c.role||'—'}</span></div>
      <div class="cv-field"><span class="cv-lbl">Nationality</span><span class="cv-val">${esc(c.nationality||'—')}</span></div>
      <div class="cv-field"><span class="cv-lbl">Status</span><span class="cv-val">${c.active===false?'<span class="badge badge-gray">Archived</span>':'<span class="badge badge-green">Active</span>'}</span></div>
    </div>
    <div class="cv-section">Contact Details</div>
    <div class="cv-grid">
      <div class="cv-field"><span class="cv-lbl">Phone 1</span><span class="cv-val">${c.phone1?`<a href="tel:${esc(c.phone1)}" style="color:var(--kre-teal)">${esc(c.phone1)}</a>`:'—'}</span></div>
      <div class="cv-field"><span class="cv-lbl">Phone 2</span><span class="cv-val">${c.phone2?`<a href="tel:${esc(c.phone2)}" style="color:var(--kre-teal)">${esc(c.phone2)}</a>`:'—'}</span></div>
      <div class="cv-field"><span class="cv-lbl">Email</span><span class="cv-val">${c.email?`<a href="mailto:${esc(c.email)}" style="color:var(--kre-teal)">${esc(c.email)}</a>`:'—'}</span></div>
      <div class="cv-field"><span class="cv-lbl">Source</span><span class="cv-val">${esc(c.source||'—')}</span></div>
      <div class="cv-field"><span class="cv-lbl">First Contact</span><span class="cv-val">${c.first_contact?fmtDate(c.first_contact):'—'}</span></div>
      <div class="cv-field"><span class="cv-lbl">Last Contact</span><span class="cv-val">${c.last_contact?fmtDate(c.last_contact):'—'}</span></div>
    </div>`;

  if (c.role === 'buyer' || c.role === 'both') {
    html += `<div class="cv-section">Buyer Preferences</div>
      <div class="cv-grid">
        <div class="cv-field"><span class="cv-lbl">Property Types</span><span class="cv-val">${esc(prefs)}</span></div>
        <div class="cv-field"><span class="cv-lbl">Preferred Areas</span><span class="cv-val">${esc(areas)}</span></div>
        <div class="cv-field"><span class="cv-lbl">Budget Range</span><span class="cv-val">${budget}</span></div>
        <div class="cv-field"><span class="cv-lbl">Min Plot Size</span><span class="cv-val">${c.min_plot?c.min_plot+'m²':'—'}</span></div>
        <div class="cv-field"><span class="cv-lbl">Sea View Required</span><span class="cv-val">${c.needs_sea_view?'Yes':'No'}</span></div>
        <div class="cv-field"><span class="cv-lbl">Pipeline Stage</span><span class="cv-val">${esc(stageLbl)}</span></div>
      </div>`;
  }

  if (c.notes || c.likes || c.dislikes) {
    html += `<div class="cv-section">Notes</div>`;
    if (c.notes)    html += `<div class="cv-field" style="grid-column:span 2"><span class="cv-lbl">Notes</span><span class="cv-val">${esc(c.notes)}</span></div>`;
    if (c.likes)    html += `<div class="cv-field" style="grid-column:span 2"><span class="cv-lbl">Likes</span><span class="cv-val">${esc(c.likes)}</span></div>`;
    if (c.dislikes) html += `<div class="cv-field" style="grid-column:span 2"><span class="cv-lbl">Dislikes</span><span class="cv-val">${esc(c.dislikes)}</span></div>`;
  }

  document.getElementById('cv-body').innerHTML = html;
  document.getElementById('cvModalTitle').textContent = ((c.first_name||'')+' '+(c.last_name||'')).trim();
  document.getElementById('cvArchiveBtn').textContent = c.active === false ? '↑ Restore' : 'Archive';
  document.getElementById('cvBudgetLink').href        = `kre-budget.html?contact=${id}`;
  document.getElementById('cvBudgetLink').style.display = (c.role==='buyer'||c.role==='both') ? '' : 'none';
  document.getElementById('cvDeleteBtn').style.display  = AUTH.canEdit() ? '' : 'none';
  document.getElementById('cvArchiveBtn').style.display = AUTH.canEdit() ? '' : 'none';
  document.getElementById('contactViewModal').querySelector('.btn-primary').style.display = AUTH.canEdit() ? '' : 'none';
  openModal('contactViewModal');
}

function openEditFromView() {
  closeModal('contactViewModal');
  openEdit(viewingId);
}

async function archiveContact() {
  const c = allContacts.find(x => x.id === viewingId);
  if (!c) return;
  const nowActive = c.active !== false;
  const label = nowActive ? 'Archive' : 'Restore';
  if (!confirm(`${label} "${c.name || ((c.first_name||'')+' '+(c.last_name||'')).trim()}"?`)) return;
  const r = await DB.upsertOne('kre_contacts', { ...c, active: !nowActive });
  if (r.ok) {
    toast(nowActive ? 'Contact archived' : 'Contact restored', 'success');
    closeModal('contactViewModal');
    await loadContacts();
  } else toast('Error: '+r.err,'error');
}

async function deleteContactFromView() {
  const c = allContacts.find(x => x.id === viewingId);
  if (!c) return;
  if (!confirm(`Delete "${c.name || ((c.first_name||'')+' '+(c.last_name||'')).trim()}"? This cannot be undone.`)) return;
  const r = await DB.deleteOne('kre_contacts', viewingId);
  if (r.ok) { toast('Contact deleted'); closeModal('contactViewModal'); await loadContacts(); }
  else toast('Error: '+r.err,'error');
}

/* ── EDIT mode ────────────────────────────────────────── */
function openAdd() {
  editingId = null;
  document.getElementById('contactModalTitle').textContent = 'Add Contact';
  clearForm();
  openModal('contactModal');
}

function openEdit(id) {
  const c = allContacts.find(x => x.id === id);
  if (!c) return;
  editingId = id;
  document.getElementById('contactModalTitle').textContent = 'Edit Contact';
  fillForm(c);
  openModal('contactModal');
}

function clearForm() {
  ['c_id','c_fname','c_lname','c_nationality','c_phone1','c_phone2','c_email',
   'c_first_contact','c_last_contact','c_source','c_notes','c_likes','c_dislikes',
   'c_min_plot','c_budget_min','c_budget_max'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  document.getElementById('c_role').value      = 'buyer';
  document.getElementById('c_active').value    = 'true';
  document.getElementById('c_sea_view').checked = false;
  document.getElementById('c_newsletter').value = 'false';
  ['c_pref1','c_pref2','c_pref3','c_pref4','c_stage'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  _selectedAreas = [];
  renderAreaTags();
  toggleBuyerSection();
}

function fillForm(c) {
  document.getElementById('c_id').value           = c.id;
  document.getElementById('c_fname').value        = c.first_name || '';
  document.getElementById('c_lname').value        = c.last_name  || '';
  document.getElementById('c_role').value         = c.role || 'buyer';
  document.getElementById('c_nationality').value  = c.nationality || '';
  document.getElementById('c_active').value       = c.active === false ? 'false' : 'true';
  document.getElementById('c_phone1').value       = c.phone1 || '';
  document.getElementById('c_phone2').value       = c.phone2 || '';
  document.getElementById('c_email').value        = c.email  || '';
  document.getElementById('c_first_contact').value= c.first_contact ? c.first_contact.slice(0,10) : '';
  document.getElementById('c_last_contact').value = c.last_contact  ? c.last_contact.slice(0,10)  : '';
  document.getElementById('c_pref1').value        = c.pref1 || '';
  document.getElementById('c_pref2').value        = c.pref2 || '';
  document.getElementById('c_pref3').value        = c.pref3 || '';
  document.getElementById('c_pref4').value        = c.pref4 || '';
  // Multi-area: migrate old single area_pref to array if needed
  _selectedAreas = c.areas_of_interest && c.areas_of_interest.length
    ? [...c.areas_of_interest]
    : (c.area_pref ? [c.area_pref] : []);
  renderAreaTags();
  document.getElementById('c_min_plot').value     = c.min_plot || '';
  document.getElementById('c_budget_min').value   = c.budget_min || '';
  document.getElementById('c_budget_max').value   = c.budget_max || '';
  document.getElementById('c_sea_view').checked   = !!c.needs_sea_view;
  document.getElementById('c_stage').value        = c.stage || '';
  document.getElementById('c_source').value       = c.source || '';
  document.getElementById('c_newsletter').value   = c.newsletter ? 'true' : 'false';
  document.getElementById('c_notes').value        = c.notes    || '';
  document.getElementById('c_likes').value        = c.likes    || '';
  document.getElementById('c_dislikes').value     = c.dislikes || '';
  toggleBuyerSection();
}

async function saveContact() {
  const fname = document.getElementById('c_fname').value.trim();
  const lname = document.getElementById('c_lname').value.trim();
  if (!fname && !lname) { toast('Name is required','error'); return; }

  const contact = {
    id:               editingId || undefined,
    first_name:       fname,
    last_name:        lname,
    name:             (fname + ' ' + lname).trim(),
    role:             document.getElementById('c_role').value,
    nationality:      document.getElementById('c_nationality').value.trim() || null,
    active:           document.getElementById('c_active').value !== 'false',
    phone1:           document.getElementById('c_phone1').value.trim() || null,
    phone2:           document.getElementById('c_phone2').value.trim() || null,
    email:            document.getElementById('c_email').value.trim()  || null,
    first_contact:    document.getElementById('c_first_contact').value || null,
    last_contact:     document.getElementById('c_last_contact').value  || null,
    pref1:            document.getElementById('c_pref1').value || null,
    pref2:            document.getElementById('c_pref2').value || null,
    pref3:            document.getElementById('c_pref3').value || null,
    pref4:            document.getElementById('c_pref4').value || null,
    areas_of_interest: _selectedAreas.length ? _selectedAreas : null,
    area_pref:        _selectedAreas[0] || null,  // keep for backward compat
    min_plot:         parseFloat(document.getElementById('c_min_plot').value) || null,
    budget_min:       parseFloat(document.getElementById('c_budget_min').value) || null,
    budget_max:       parseFloat(document.getElementById('c_budget_max').value) || null,
    needs_sea_view:   document.getElementById('c_sea_view').checked,
    stage:            document.getElementById('c_stage').value || null,
    source:           document.getElementById('c_source').value.trim()    || null,
    newsletter:       document.getElementById('c_newsletter').value === 'true',
    notes:            document.getElementById('c_notes').value.trim()     || null,
    likes:            document.getElementById('c_likes').value.trim()     || null,
    dislikes:         document.getElementById('c_dislikes').value.trim()  || null
  };

  syncStart();
  const r = await DB.upsertOne('kre_contacts', contact);
  syncDone(r.ok);
  if (r.ok) {
    toast(editingId ? 'Contact updated' : 'Contact added', 'success');
    closeModal('contactModal');
    await loadContacts();
  } else toast('Error: '+r.err,'error');
}

init();
</script>
</body>
</html>
