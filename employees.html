<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Zesty ERP — Staff</title>
<link rel="stylesheet" href="erp-style.css">
<style>
.avatar-colors { --c0:#1a7a6e;--c1:#c9a84c;--c2:#8e44ad;--c3:#e67e22;--c4:#2980b9;--c5:#27ae60; }
</style>
</head>
<body>
<div class="container avatar-colors">
  <div class="page-title-bar">
    <div><h1>Staff & Employees</h1><p>Manage employees, departments, contact info and status</p></div>
    <div class="page-actions">
      <div class="sync-status"><span class="sync-dot" id="syncDot"></span><span>Connected</span></div>
      <button class="btn btn-outline btn-sm" onclick="exportCSV()">↓ Export</button>
      <button class="btn btn-primary" onclick="openAdd()">+ Add Staff</button>
    </div>
  </div>

  <div class="stats-bar">
    <div class="stat-card"><div class="stat-label">Total Staff</div><div class="stat-value" id="st-total">—</div></div>
    <div class="stat-card"><div class="stat-label">Active</div><div class="stat-value success" id="st-active">—</div></div>
    <div class="stat-card"><div class="stat-label">On Leave</div><div class="stat-value gold" id="st-leave">—</div></div>
    <div class="stat-card"><div class="stat-label">Inactive</div><div class="stat-value danger" id="st-inactive">—</div></div>
    <div class="stat-card"><div class="stat-label">Departments</div><div class="stat-value" id="st-depts">—</div></div>
  </div>

  <div class="filter-bar">
    <input type="search" id="q" placeholder="Search name, email, department…" oninput="render()">
    <select id="fStatus" onchange="render()">
      <option value="">All statuses</option>
      <option value="Active">Active</option>
      <option value="On Leave">On Leave</option>
      <option value="Inactive">Inactive</option>
    </select>
    <select id="fDept" onchange="render()"><option value="">All departments</option></select>
    <select id="fType" onchange="render()">
      <option value="">All types</option>
      <option value="Full-Time">Full-Time</option>
      <option value="Part-Time">Part-Time</option>
      <option value="Contract">Contract</option>
    </select>
    <div class="filter-spacer"></div>
    <label style="font-size:12px;color:var(--text-muted)"><input type="checkbox" id="showArch" onchange="render()"> Archived</label>
  </div>

  <div class="table-wrap">
    <div class="table-header"><h3 id="tableCount">Staff</h3></div>
    <table>
      <thead><tr>
        <th onclick="sortBy('firstName')">Name <span class="sa" id="sa-firstName">↕</span></th>
        <th onclick="sortBy('department')">Department <span class="sa" id="sa-department">↕</span></th>
        <th onclick="sortBy('role')">Role <span class="sa" id="sa-role">↕</span></th>
        <th>Contact</th>
        <th onclick="sortBy('employmentType')">Type <span class="sa" id="sa-employmentType">↕</span></th>
        <th onclick="sortBy('startDate')">Start Date <span class="sa" id="sa-startDate">↕</span></th>
        <th onclick="sortBy('status')">Status <span class="sa" id="sa-status">↕</span></th>
        <th style="width:100px"></th>
      </tr></thead>
      <tbody id="tBody"><tr class="empty-row"><td colspan="8"><div class="empty-icon">👥</div><p>Loading staff…</p></td></tr></tbody>
    </table>
    <div class="pagination" id="pagination"></div>
  </div>
</div>

<!-- FORM MODAL -->
<div class="modal-overlay" id="formModal">
  <div class="modal" style="max-width:680px">
    <div class="modal-header">
      <h2 id="formTitle">Add Staff</h2>
      <button class="modal-close" onclick="closeModal('formModal')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="f_id">
      <div class="form-grid">
        <div class="form-group">
          <label>First Name *</label>
          <input id="f_firstName" placeholder="First name">
        </div>
        <div class="form-group">
          <label>Last Name *</label>
          <input id="f_lastName" placeholder="Last name">
        </div>
        <div class="form-group">
          <label>Department</label>
          <input id="f_department" placeholder="e.g. Cleaning, Maintenance">
        </div>
        <div class="form-group">
          <label>Role / Position</label>
          <input id="f_role" placeholder="e.g. Supervisor">
        </div>
        <div class="form-group">
          <label>Employment Type</label>
          <select id="f_employmentType">
            <option value="Full-Time">Full-Time</option>
            <option value="Part-Time">Part-Time</option>
            <option value="Contract">Contract</option>
          </select>
        </div>
        <div class="form-group">
          <label>Status</label>
          <select id="f_status">
            <option value="Active">Active</option>
            <option value="On Leave">On Leave</option>
            <option value="Inactive">Inactive</option>
          </select>
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input id="f_phone" type="tel" placeholder="+30 69...">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input id="f_email" type="email" placeholder="email@example.com">
        </div>
        <div class="form-group">
          <label>Start Date</label>
          <input type="date" id="f_startDate">
        </div>
        <div class="form-group">
          <label>Date of Birth</label>
          <input type="date" id="f_dob">
        </div>
        <div class="form-group form-span-2">
          <label>Address</label>
          <input id="f_address" placeholder="Home address">
        </div>
        <div class="form-group">
          <label>IBAN</label>
          <input id="f_iban" placeholder="GR00...">
        </div>
        <div class="form-group">
          <label>Tax Number (AFM)</label>
          <input id="f_taxNumber" placeholder="000000000">
        </div>
        <div class="form-group">
          <label>AMKA</label>
          <input id="f_amka" placeholder="Social security number">
        </div>
        <div class="form-group">
          <label>Zone / Area</label>
          <input id="f_zone" placeholder="e.g. North Athens">
        </div>
        <div class="form-group form-span-2">
          <label>Notes</label>
          <textarea id="f_notes" rows="3" placeholder="Any notes…"></textarea>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger btn-sm" id="fDeleteBtn" onclick="deleteCurrent()" style="display:none;margin-right:auto">🗑 Delete</button>
      <button class="btn btn-outline" onclick="closeModal('formModal')">Cancel</button>
      <button class="btn btn-primary" onclick="save()">Save</button>
    </div>
  </div>
</div>

<!-- VIEW MODAL -->
<div class="modal-overlay" id="viewModal">
  <div class="modal" style="max-width:620px">
    <div class="modal-header">
      <h2 id="viewName">Staff Member</h2>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="btn btn-outline btn-sm" id="viewEditBtn">✏️ Edit</button>
        <button class="modal-close" onclick="closeModal('viewModal')">✕</button>
      </div>
    </div>
    <div class="modal-body" id="viewBody"></div>
  </div>
</div>

<script src="erp-base.js"></script>
<script>
let staff = [];
let sort = { field: 'firstName', dir: 1 };
let page = 1;
const PAGE = 20;
const AVATAR_COLORS = ['#1a7a6e','#c9a84c','#8e44ad','#e67e22','#2980b9','#27ae60','#c0392b','#16a085'];

async function init() {
  const res = await SyncStore.load('zesty_employees', 'employees');
  staff = res.data;
  populateDepts();
  render();
  startPoll('employees', 'zesty_employees', 30000, rows => { staff = rows; populateDepts(); render(); });
}
init();

function populateDepts() {
  const sel = document.getElementById('fDept');
  const cur = sel.value;
  const depts = [...new Set(staff.map(s => s.department).filter(Boolean))].sort();
  sel.innerHTML = '<option value="">All departments</option>' + depts.map(d => `<option value="${d}">${d}</option>`).join('');
  sel.value = cur;
}

function avatarColor(name) {
  let h = 0;
  for (const c of (name || 'X')) h = (h << 5) - h + c.charCodeAt(0);
  return AVATAR_COLORS[Math.abs(h) % AVATAR_COLORS.length];
}
function initials(s) {
  return ((s.firstName || '?')[0] + (s.lastName || '')[0]).toUpperCase();
}

function render() {
  const q = (document.getElementById('q').value || '').toLowerCase();
  const fStatus = document.getElementById('fStatus').value;
  const fDept = document.getElementById('fDept').value;
  const fType = document.getElementById('fType').value;
  const showArch = document.getElementById('showArch').checked;

  let list = staff.filter(s => {
    if (!showArch && s.archived) return false;
    if (fStatus && s.status !== fStatus) return false;
    if (fDept && s.department !== fDept) return false;
    if (fType && s.employmentType !== fType) return false;
    if (q) {
      const hay = ((s.firstName || '') + ' ' + (s.lastName || '') + ' ' + (s.email || '') + ' ' + (s.department || '') + ' ' + (s.role || '')).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });

  list.sort((a, b) => {
    let av = (a[sort.field] || '').toLowerCase();
    let bv = (b[sort.field] || '').toLowerCase();
    return av < bv ? -sort.dir : av > bv ? sort.dir : 0;
  });

  const total = list.length;
  const pages = Math.ceil(total / PAGE) || 1;
  if (page > pages) page = 1;
  const slice = list.slice((page - 1) * PAGE, page * PAGE);

  // Stats
  document.getElementById('st-total').textContent = staff.filter(s => !s.archived).length;
  document.getElementById('st-active').textContent = staff.filter(s => !s.archived && s.status === 'Active').length;
  document.getElementById('st-leave').textContent = staff.filter(s => !s.archived && s.status === 'On Leave').length;
  document.getElementById('st-inactive').textContent = staff.filter(s => !s.archived && s.status === 'Inactive').length;
  document.getElementById('st-depts').textContent = new Set(staff.filter(s => !s.archived).map(s => s.department).filter(Boolean)).size;
  document.getElementById('tableCount').textContent = `${total} Staff Member${total !== 1 ? 's' : ''}`;

  const tbody = document.getElementById('tBody');
  if (!slice.length) {
    tbody.innerHTML = `<tr class="empty-row"><td colspan="8"><div class="empty-icon">👥</div><p>No staff found</p></td></tr>`;
  } else {
    tbody.innerHTML = slice.map(s => {
      const name = ((s.firstName || '') + ' ' + (s.lastName || '')).trim();
      const color = avatarColor(name);
      const ini = initials(s);
      const stBadge = s.status === 'Active' ? `<span class="badge b-active">Active</span>`
        : s.status === 'On Leave' ? `<span class="badge b-progress">On Leave</span>`
        : `<span class="badge b-inactive">Inactive</span>`;
      return `<tr class="${s.archived ? 'archived' : ''}">
        <td>
          <div style="display:flex;align-items:center;gap:10px">
            <div class="avatar" style="background:${color}">${ini}</div>
            <div><strong>${name}</strong></div>
          </div>
        </td>
        <td>${s.department ? `<span class="badge b-company">${s.department}</span>` : '—'}</td>
        <td style="font-size:12px">${s.role || '—'}</td>
        <td>
          ${s.email ? `<div style="font-size:12px">${s.email}</div>` : ''}
          ${s.phone ? `<div style="font-size:12px;color:var(--text-muted)">${s.phone}</div>` : '—'}
        </td>
        <td>${s.employmentType ? `<span class="badge b-individual">${s.employmentType}</span>` : '—'}</td>
        <td style="font-size:12px">${fmtDate(s.startDate)}</td>
        <td>${stBadge}</td>
        <td>
          <div class="table-actions">
            <button class="btn btn-outline btn-xs" onclick="viewStaff('${s.id}')">👁</button>
            <button class="btn btn-teal btn-xs" onclick="editStaff('${s.id}')">✏️</button>
            <button class="btn btn-danger btn-xs" onclick="confirmDelete('${s.id}')">🗑</button>
          </div>
        </td>
      </tr>`;
    }).join('');
  }

  // Pagination
  const pg = document.getElementById('pagination');
  if (pages <= 1) { pg.innerHTML = ''; return; }
  let h = `<span>${total} total</span><div class="pagination-spacer"></div>`;
  for (let i = 1; i <= pages; i++) {
    if (i===1||i===pages||Math.abs(i-page)<=1) h += `<button class="page-btn ${i===page?'active':''}" onclick="page=${i};render()">${i}</button>`;
    else if (Math.abs(i-page)===2) h += '<span>…</span>';
  }
  pg.innerHTML = h;
}

function sortBy(f) {
  if (sort.field === f) sort.dir *= -1; else { sort.field = f; sort.dir = 1; }
  render();
}

function openAdd() {
  document.getElementById('formTitle').textContent = 'Add Staff';
  document.getElementById('fDeleteBtn').style.display = 'none';
  clearForm();
  openModal('formModal');
}

function editStaff(id) {
  const s = staff.find(x => x.id === id);
  if (!s) return;
  closeModal('viewModal');
  document.getElementById('formTitle').textContent = 'Edit Staff';
  document.getElementById('fDeleteBtn').style.display = '';
  const fields = ['id','firstName','lastName','department','role','employmentType','status','phone','email','startDate','dob','address','iban','taxNumber','amka','zone','notes'];
  fields.forEach(f => { const el = document.getElementById('f_' + f); if (el) el.value = s[f] || ''; });
  openModal('formModal');
}

function clearForm() {
  const fields = ['id','firstName','lastName','department','role','phone','email','startDate','dob','address','iban','taxNumber','amka','zone','notes'];
  fields.forEach(f => { const el = document.getElementById('f_' + f); if (el) el.value = ''; });
  document.getElementById('f_employmentType').value = 'Full-Time';
  document.getElementById('f_status').value = 'Active';
}

async function save() {
  const firstName = document.getElementById('f_firstName').value.trim();
  const lastName = document.getElementById('f_lastName').value.trim();
  if (!firstName && !lastName) { showToast('Name is required', 'error'); return; }
  const id = document.getElementById('f_id').value || genId('emp');
  const record = { id };
  const fields = ['firstName','lastName','department','role','employmentType','status','phone','email','startDate','dob','address','iban','taxNumber','amka','zone','notes'];
  fields.forEach(f => { record[f] = document.getElementById('f_' + f)?.value || ''; });
  const existing = staff.find(s => s.id === id);
  if (existing) Object.assign(existing, record); else staff.push(record);
  closeModal('formModal');
  populateDepts();
  render();
  await SyncStore.saveOne('zesty_employees', 'employees', record, staff);
  showToast(existing ? '✓ Staff updated' : '✓ Staff added', 'success');
}

function deleteCurrent() {
  const id = document.getElementById('f_id').value;
  if (!id) return;
  closeModal('formModal');
  confirmDelete(id);
}

function confirmDelete(id) {
  const s = staff.find(x => x.id === id);
  if (!s) return;
  const name = ((s.firstName || '') + ' ' + (s.lastName || '')).trim();
  showConfirm('🗑️','Delete Staff?',`Delete "${name}"? This cannot be undone.`,'btn-danger','Delete', async () => {
    staff = staff.filter(x => x.id !== id);
    await SyncStore.deleteOne('zesty_employees', 'employees', id, staff);
    render();
    showToast('Staff member deleted', 'error');
  });
}

function viewStaff(id) {
  const s = staff.find(x => x.id === id);
  if (!s) return;
  const name = ((s.firstName || '') + ' ' + (s.lastName || '')).trim();
  document.getElementById('viewName').textContent = name;
  document.getElementById('viewEditBtn').onclick = () => editStaff(id);
  const f = (l, v) => v ? `<div class="view-field"><div class="view-label">${l}</div><div class="view-value">${v}</div></div>` : '';
  document.getElementById('viewBody').innerHTML = `
    <div class="view-section"><div class="view-section-title">Employment</div>
      <div class="view-grid">
        ${f('Department', s.department)} ${f('Role', s.role)} ${f('Type', s.employmentType)}
        ${f('Status', `<span class="badge ${s.status==='Active'?'b-active':s.status==='On Leave'?'b-progress':'b-inactive'}">${s.status||'—'}</span>`)}
        ${f('Start Date', fmtDate(s.startDate))} ${f('Zone', s.zone)}
      </div>
    </div>
    <div class="view-section"><div class="view-section-title">Contact</div>
      <div class="view-grid">
        ${f('Phone', s.phone)} ${f('Email', s.email)} ${f('Address', s.address)}
      </div>
    </div>
    <div class="view-section"><div class="view-section-title">Payroll</div>
      <div class="view-grid">
        ${f('AFM', s.taxNumber)} ${f('AMKA', s.amka)} ${f('IBAN', `<span style="font-family:monospace;font-size:12px">${s.iban||'—'}</span>`)}
        ${f('Date of Birth', fmtDate(s.dob))}
      </div>
    </div>
    ${s.notes ? `<div class="view-section"><div class="view-section-title">Notes</div><div style="background:var(--cream);border-radius:8px;padding:12px;font-size:13px;line-height:1.6">${s.notes}</div></div>` : ''}
  `;
  openModal('viewModal');
}

function exportCSV() {
  const rows = [['First Name','Last Name','Department','Role','Type','Status','Phone','Email','Start Date']];
  staff.forEach(s => rows.push([s.firstName||'',s.lastName||'',s.department||'',s.role||'',s.employmentType||'',s.status||'',s.phone||'',s.email||'',s.startDate||'']));
  const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = 'staff_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
}
</script>
<script src="erp-nav.js"></script>
</body>
</html>
