<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Zesty ERP — Leave</title>
<link rel="stylesheet" href="erp-style.css">
<style>
.leave-card{background:#fff;border-radius:12px;border:1px solid var(--border);padding:16px 20px;margin-bottom:12px;display:flex;align-items:flex-start;gap:16px}
.leave-avatar{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#fff;flex-shrink:0}
.leave-days{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:600;color:var(--teal-dark);line-height:1}
.leave-type-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700}
.lt-annual{background:#e8f4f8;color:var(--info)}
.lt-sick{background:#fdf0ef;color:var(--danger)}
.lt-unpaid{background:#fff8e0;color:var(--archive)}
.lt-other{background:#f0e8ff;color:#8e44ad}
</style>
</head>
<body>
<div class="container">
  <div class="page-title-bar">
    <div><h1>Leave Management</h1><p>Staff leave requests, approvals and balances</p></div>
    <div class="page-actions">
      <div class="sync-status"><span class="sync-dot" id="syncDot"></span><span>Connected</span></div>
      <button class="btn btn-primary" onclick="openAdd()">+ New Request</button>
    </div>
  </div>

  <div class="stats-bar">
    <div class="stat-card"><div class="stat-label">Pending</div><div class="stat-value" style="color:var(--warning)" id="st-pending">—</div></div>
    <div class="stat-card"><div class="stat-label">Approved</div><div class="stat-value success" id="st-approved">—</div></div>
    <div class="stat-card"><div class="stat-label">Declined</div><div class="stat-value danger" id="st-declined">—</div></div>
    <div class="stat-card"><div class="stat-label">Total Days (approved)</div><div class="stat-value gold" id="st-days">—</div></div>
  </div>

  <div class="filter-bar">
    <input type="search" id="q" placeholder="Search employee, type…" oninput="render()">
    <select id="fStatus" onchange="render()">
      <option value="">All statuses</option>
      <option value="Pending">Pending</option>
      <option value="Approved">Approved</option>
      <option value="Declined">Declined</option>
    </select>
    <select id="fType" onchange="render()">
      <option value="">All types</option>
      <option value="Annual">Annual</option>
      <option value="Sick">Sick</option>
      <option value="Unpaid">Unpaid</option>
      <option value="Other">Other</option>
    </select>
    <div class="filter-spacer"></div>
  </div>

  <div class="table-wrap">
    <div class="table-header"><h3 id="tableCount">Leave Requests</h3></div>
    <table>
      <thead><tr>
        <th onclick="sortBy('employeeName')">Employee</th>
        <th onclick="sortBy('leaveType')">Type</th>
        <th onclick="sortBy('startDate')">From</th>
        <th onclick="sortBy('endDate')">To</th>
        <th>Days</th>
        <th>Reason</th>
        <th onclick="sortBy('status')">Status</th>
        <th style="width:120px"></th>
      </tr></thead>
      <tbody id="tBody"><tr class="empty-row"><td colspan="8"><div class="empty-icon">🏖️</div><p>No leave requests yet</p></td></tr></tbody>
    </table>
  </div>
</div>

<!-- FORM MODAL -->
<div class="modal-overlay" id="formModal">
  <div class="modal" style="max-width:580px">
    <div class="modal-header">
      <h2 id="formTitle">New Leave Request</h2>
      <button class="modal-close" onclick="closeModal('formModal')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="f_id">
      <div class="form-grid">
        <div class="form-group form-span-2"><label>Employee Name *</label><input id="f_employeeName" placeholder="Full name"></div>
        <div class="form-group"><label>Leave Type</label>
          <select id="f_leaveType">
            <option value="Annual">Annual Leave</option>
            <option value="Sick">Sick Leave</option>
            <option value="Unpaid">Unpaid Leave</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="form-group"><label>Status</label>
          <select id="f_status">
            <option value="Pending">Pending</option>
            <option value="Approved">Approved</option>
            <option value="Declined">Declined</option>
          </select>
        </div>
        <div class="form-group"><label>Start Date *</label><input type="date" id="f_startDate" oninput="calcDays()"></div>
        <div class="form-group"><label>End Date *</label><input type="date" id="f_endDate" oninput="calcDays()"></div>
        <div class="form-group"><label>Working Days</label><input type="number" id="f_days" min="0.5" step="0.5" placeholder="Auto-calculated"></div>
        <div class="form-group form-span-2"><label>Reason / Notes</label><textarea id="f_reason" rows="3"></textarea></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger btn-sm" id="fDeleteBtn" onclick="deleteCurrent()" style="display:none;margin-right:auto">🗑</button>
      <button class="btn btn-outline" onclick="closeModal('formModal')">Cancel</button>
      <button class="btn btn-primary" onclick="save()">Save</button>
    </div>
  </div>
</div>

<script src="erp-base.js"></script>
<script>
let leaves = [];
let sort = { field: 'startDate', dir: -1 };

async function init() {
  const res = await SyncStore.load('zesty_leave', 'leave');
  leaves = res.data;
  render();
}
init();

function calcDays() {
  const s = document.getElementById('f_startDate').value;
  const e = document.getElementById('f_endDate').value;
  if (s && e) {
    const days = Math.max(0, Math.round((new Date(e) - new Date(s)) / 86400000) + 1);
    // rough weekdays
    let wd = 0, d = new Date(s);
    while (d <= new Date(e)) { if (d.getDay() !== 0 && d.getDay() !== 6) wd++; d.setDate(d.getDate()+1); }
    document.getElementById('f_days').value = wd;
  }
}

function statusBadge(s) {
  if (s==='Approved') return '<span class="badge b-active">Approved</span>';
  if (s==='Declined') return '<span class="badge b-inactive">Declined</span>';
  return '<span class="badge b-pending">Pending</span>';
}

const LT_BADGE = { Annual:'lt-annual', Sick:'lt-sick', Unpaid:'lt-unpaid', Other:'lt-other' };

function render() {
  const q = (document.getElementById('q').value||'').toLowerCase();
  const fStatus = document.getElementById('fStatus').value;
  const fType = document.getElementById('fType').value;
  let list = leaves.filter(l => {
    if (fStatus && l.status !== fStatus) return false;
    if (fType && l.leaveType !== fType) return false;
    if (q && !((l.employeeName||'')+(l.leaveType||'')).toLowerCase().includes(q)) return false;
    return true;
  });
  list.sort((a,b)=>((a[sort.field]||'')<(b[sort.field]||'')?-sort.dir:sort.dir));

  document.getElementById('st-pending').textContent = leaves.filter(l=>l.status==='Pending').length;
  document.getElementById('st-approved').textContent = leaves.filter(l=>l.status==='Approved').length;
  document.getElementById('st-declined').textContent = leaves.filter(l=>l.status==='Declined').length;
  document.getElementById('st-days').textContent = leaves.filter(l=>l.status==='Approved').reduce((s,l)=>s+(parseFloat(l.days)||0),0);
  document.getElementById('tableCount').textContent = `${list.length} Requests`;

  document.getElementById('tBody').innerHTML = !list.length
    ? `<tr class="empty-row"><td colspan="8"><div class="empty-icon">🏖️</div><p>No leave requests</p></td></tr>`
    : list.map(l => `<tr>
        <td><strong>${l.employeeName||'—'}</strong></td>
        <td><span class="badge leave-type-badge ${LT_BADGE[l.leaveType]||'lt-other'}">${l.leaveType||'—'}</span></td>
        <td style="font-size:12px">${fmtDate(l.startDate)}</td>
        <td style="font-size:12px">${fmtDate(l.endDate)}</td>
        <td style="text-align:center;font-weight:600">${l.days||'—'}</td>
        <td style="font-size:12px;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${l.reason||'—'}</td>
        <td>${statusBadge(l.status)}</td>
        <td>
          <div class="table-actions">
            ${l.status==='Pending'?`<button class="btn btn-success btn-xs" onclick="approve('${l.id}')">✓</button><button class="btn btn-danger btn-xs" onclick="decline('${l.id}')">✕</button>`:''}
            <button class="btn btn-teal btn-xs" onclick="editLeave('${l.id}')">✏️</button>
            <button class="btn btn-danger btn-xs" onclick="confirmDel('${l.id}')">🗑</button>
          </div>
        </td>
      </tr>`).join('');
}

function sortBy(f) { if(sort.field===f)sort.dir*=-1;else{sort.field=f;sort.dir=1;} render(); }

function openAdd() { document.getElementById('formTitle').textContent='New Request'; document.getElementById('fDeleteBtn').style.display='none'; clearForm(); openModal('formModal'); }
function editLeave(id) {
  const l=leaves.find(x=>x.id===id); if(!l)return;
  document.getElementById('formTitle').textContent='Edit Request'; document.getElementById('fDeleteBtn').style.display='';
  ['id','employeeName','leaveType','status','startDate','endDate','days','reason'].forEach(f=>{const el=document.getElementById('f_'+f);if(el)el.value=l[f]||'';});
  openModal('formModal');
}
function clearForm() {
  ['id','employeeName','startDate','endDate','days','reason'].forEach(f=>{const el=document.getElementById('f_'+f);if(el)el.value='';});
  document.getElementById('f_leaveType').value='Annual'; document.getElementById('f_status').value='Pending';
}

async function save() {
  const name=document.getElementById('f_employeeName').value.trim();
  if(!name){showToast('Employee name required','error');return;}
  const id=document.getElementById('f_id').value||genId('leave');
  const record={id};
  ['employeeName','leaveType','status','startDate','endDate','days','reason'].forEach(f=>{record[f]=document.getElementById('f_'+f)?.value||'';});
  const existing=leaves.find(l=>l.id===id);
  if(existing)Object.assign(existing,record);else leaves.push(record);
  closeModal('formModal'); render();
  await SyncStore.saveOne('zesty_leave','leave',record,leaves);
  showToast('✓ Saved','success');
}

async function approve(id) { const l=leaves.find(x=>x.id===id); if(!l)return; l.status='Approved'; render(); await SyncStore.saveOne('zesty_leave','leave',l,leaves); showToast('✓ Approved','success'); }
async function decline(id) { const l=leaves.find(x=>x.id===id); if(!l)return; l.status='Declined'; render(); await SyncStore.saveOne('zesty_leave','leave',l,leaves); showToast('Declined','error'); }

function deleteCurrent() { const id=document.getElementById('f_id').value; if(!id)return; closeModal('formModal'); confirmDel(id); }
function confirmDel(id) {
  const l=leaves.find(x=>x.id===id); if(!l)return;
  showConfirm('🗑️','Delete?',`Delete this leave request?`,'btn-danger','Delete',async()=>{
    leaves=leaves.filter(x=>x.id!==id); await SyncStore.deleteOne('zesty_leave','leave',id,leaves); render(); showToast('Deleted','error');
  });
}
</script>
<script src="erp-nav.js"></script>
</body>
</html>
