<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zesty ERP — Tickets & Changelog</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
:root {
  --teal:#1a7a6e;--teal-dark:#115950;--teal-deep:#0a3d36;
  --gold:#c9a84c;--gold-light:#e8c97a;
  --cream:#f8f5f0;--white:#fff;
  --text:#1e2a28;--text-muted:#6b7e7b;
  --border:#d4e0de;
  --danger:#c0392b;--danger-bg:#fdf0ef;
  --success:#27ae60;--success-bg:#eafaf1;
  --warning:#e67e22;--warning-bg:#fef9ec;
  --purple:#8e44ad;--purple-bg:#f5eefb;
  --radius:12px;--shadow:0 2px 16px rgba(26,122,110,.1);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);min-height:100vh}
.container{max-width:1100px;margin:0 auto;padding:32px 24px 80px}

/* PAGE HEADER */
.page-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:32px;flex-wrap:wrap;gap:16px}
.page-title{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:400;color:var(--teal-dark)}
.page-sub{font-size:13px;color:var(--text-muted);margin-top:4px}

/* TABS */
.tabs{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:28px}
.tab{padding:10px 20px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text-muted);border-bottom:2px solid transparent;margin-bottom:-2px;background:transparent;border-top:none;border-left:none;border-right:none;font-family:'DM Sans',sans-serif;transition:all .2s}
.tab.active{color:var(--teal);border-bottom-color:var(--teal);font-weight:600}
.tab:hover{color:var(--teal)}

/* STATS ROW */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px}
.stat{background:var(--white);border-radius:var(--radius);padding:16px 20px;box-shadow:var(--shadow);border-left:4px solid var(--teal)}
.stat.danger{border-color:var(--danger)}.stat.success{border-color:var(--success)}.stat.warning{border-color:var(--warning)}.stat.purple{border-color:var(--purple)}
.stat-val{font-size:28px;font-weight:700;color:var(--teal);line-height:1}
.stat.danger .stat-val{color:var(--danger)}.stat.success .stat-val{color:var(--success)}.stat.warning .stat-val{color:var(--warning)}.stat.purple .stat-val{color:var(--purple)}
.stat-lbl{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--text-muted);margin-top:5px}

/* FILTERS */
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;align-items:center}
.filter-btn{padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:var(--white);font-size:12px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;color:var(--text-muted)}
.filter-btn.active,.filter-btn:hover{border-color:var(--teal);color:var(--teal);background:#f0faf8}
.filter-btn.active{font-weight:700}

/* TICKET CARDS */
.ticket{background:var(--white);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow);margin-bottom:12px;display:grid;grid-template-columns:auto 1fr auto;gap:16px;align-items:start;border-left:4px solid var(--border);transition:box-shadow .2s}
.ticket:hover{box-shadow:0 4px 24px rgba(26,122,110,.15)}
.ticket.bug{border-left-color:var(--danger)}
.ticket.improvement{border-left-color:var(--warning)}
.ticket.idea{border-left-color:var(--success)}
.ticket.fixed{border-left-color:var(--teal);opacity:.7}
.ticket-icon{font-size:22px;margin-top:2px}
.ticket-id{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted);margin-bottom:4px}
.ticket-text{font-size:14px;font-weight:500;color:var(--text);margin-bottom:6px;line-height:1.4}
.ticket-meta{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.ticket-page{font-size:11px;color:var(--text-muted);background:var(--cream);padding:2px 8px;border-radius:4px}
.ticket-date{font-size:11px;color:var(--text-muted)}
.ticket-version{font-size:10px;font-family:'DM Mono',monospace;color:var(--text-muted);background:var(--cream);padding:1px 6px;border-radius:3px}
.badge{display:inline-flex;align-items:center;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:600}
.badge-open{background:var(--danger-bg);color:var(--danger)}
.badge-fixed{background:var(--success-bg);color:var(--success)}
.badge-wip{background:var(--warning-bg);color:var(--warning)}
.ticket-actions{display:flex;gap:6px;flex-direction:column;align-items:flex-end}
.btn{padding:6px 14px;border-radius:7px;border:none;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all .2s;white-space:nowrap}
.btn-teal{background:var(--teal);color:#fff}.btn-teal:hover{background:var(--teal-dark)}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text-muted)}.btn-outline:hover{border-color:var(--teal);color:var(--teal)}
.btn-danger{background:var(--danger-bg);color:var(--danger);border:1px solid #f5c6c2}.btn-danger:hover{background:var(--danger);color:#fff}
.btn-gold{background:var(--gold);color:var(--teal-deep);font-weight:700}.btn-gold:hover{background:var(--gold-light)}
.empty{text-align:center;padding:60px 20px;color:var(--text-muted);font-size:14px}
.empty-icon{font-size:48px;margin-bottom:12px}

/* CHANGELOG */
.version-block{background:var(--white);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);margin-bottom:20px}
.version-hdr{display:flex;align-items:center;gap:14px;margin-bottom:16px;flex-wrap:wrap}
.version-tag{font-family:'DM Mono',monospace;font-size:18px;font-weight:700;color:var(--teal);background:#f0faf8;padding:4px 14px;border-radius:8px}
.version-date{font-size:12px;color:var(--text-muted)}
.version-count{font-size:12px;font-weight:600;color:var(--teal);background:#e0f5f2;padding:2px 10px;border-radius:10px;margin-left:auto}
.version-item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.version-item:last-child{border-bottom:none}
.vi-icon{font-size:14px;flex-shrink:0;margin-top:1px}
.vi-text{font-size:13px;color:var(--text);line-height:1.4}
.vi-page{font-size:11px;color:var(--text-muted);margin-left:6px;background:var(--cream);padding:1px 6px;border-radius:3px}

/* NEW VERSION FORM */
.new-version-form{background:var(--white);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);margin-bottom:24px;border:2px dashed var(--border)}
.new-version-form h3{font-size:16px;font-weight:600;color:var(--teal-dark);margin-bottom:16px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.form-group label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);display:block;margin-bottom:5px}
.form-group input,.form-group textarea,.form-group select{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:7px;font-family:'DM Sans',sans-serif;font-size:13px;outline:none}
.form-group input:focus,.form-group textarea:focus{border-color:var(--teal)}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--white);border-radius:16px;padding:28px;width:90%;max-width:500px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal h2{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--teal-dark);margin-bottom:16px}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}

@media(max-width:700px){
  .stats{grid-template-columns:1fr 1fr}
  .form-row{grid-template-columns:1fr}
  .ticket{grid-template-columns:auto 1fr}
  .ticket-actions{flex-direction:row;grid-column:1/-1}
}
</style>
</head>
<body>
<div class="container">
  <div class="page-hdr">
    <div>
      <div class="page-title">🎫 Tickets & Changelog</div>
      <div class="page-sub">Track issues, ideas and system improvements</div>
    </div>
    <button class="btn btn-gold" onclick="openVersionModal()">📦 Create Version</button>
  </div>

  <!-- STATS -->
  <div class="stats">
    <div class="stat danger"><div class="stat-val" id="st-open">0</div><div class="stat-lbl">🐛 Open Bugs</div></div>
    <div class="stat warning"><div class="stat-val" id="st-improvements">0</div><div class="stat-lbl">⚡ Improvements</div></div>
    <div class="stat purple"><div class="stat-val" id="st-ideas">0</div><div class="stat-lbl">💡 Ideas</div></div>
    <div class="stat success"><div class="stat-val" id="st-fixed">0</div><div class="stat-lbl">✅ Fixed</div></div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab active" onclick="showTab('tickets',this)">🎫 Open Tickets</button>
    <button class="tab" onclick="showTab('all',this)">📋 All Tickets</button>
    <button class="tab" onclick="showTab('changelog',this)">📦 Changelog</button>
  </div>

  <!-- TICKETS TAB -->
  <div id="tab-tickets">
    <div class="filters">
      <span style="font-size:12px;color:var(--text-muted);font-weight:600">Filter:</span>
      <button class="filter-btn active" onclick="filterTickets('all',this)">All</button>
      <button class="filter-btn" onclick="filterTickets('bug',this)">🐛 Bugs</button>
      <button class="filter-btn" onclick="filterTickets('improvement',this)">⚡ Improvements</button>
      <button class="filter-btn" onclick="filterTickets('idea',this)">💡 Ideas</button>
      <span style="flex:1"></span>
      <button class="btn btn-outline" onclick="clearAllFixed()">🗑 Clear Fixed</button>
    </div>
    <div id="tickets-list"></div>
  </div>

  <!-- ALL TICKETS TAB -->
  <div id="tab-all" style="display:none">
    <div id="all-tickets-list"></div>
  </div>

  <!-- CHANGELOG TAB -->
  <div id="tab-changelog" style="display:none">
    <div id="changelog-list"></div>
  </div>
</div>

<!-- VERSION MODAL -->
<div class="modal-overlay" id="modal-version">
  <div class="modal">
    <h2>📦 Create New Version</h2>
    <div class="form-row">
      <div class="form-group">
        <label>Version Number</label>
        <input type="text" id="v-number" placeholder="e.g. v2.1" />
      </div>
      <div class="form-group">
        <label>Date</label>
        <input type="date" id="v-date" />
      </div>
    </div>
    <div class="form-group" style="margin-bottom:14px">
      <label>Notes (optional)</label>
      <textarea id="v-notes" rows="3" placeholder="What changed in this version..."></textarea>
    </div>
    <p style="font-size:12px;color:var(--text-muted)">All currently open tickets marked as "fixed" will be included in this version.</p>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeVersionModal()">Cancel</button>
      <button class="btn btn-gold" onclick="saveVersion()">Create Version</button>
    </div>
  </div>
</div>

<script>
let tickets = JSON.parse(localStorage.getItem('zesty_tickets') || '[]');
let changelog = JSON.parse(localStorage.getItem('zesty_changelog') || '[]');
let currentFilter = 'all';

function saveData() {
  localStorage.setItem('zesty_tickets', JSON.stringify(tickets));
  localStorage.setItem('zesty_changelog', JSON.stringify(changelog));
}

function showTab(tab, btn) {
  ['tickets','all','changelog'].forEach(t => {
    document.getElementById('tab-'+t).style.display = t===tab ? '' : 'none';
  });
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (tab==='tickets') renderTickets('open');
  else if (tab==='all') renderAllTickets();
  else renderChangelog();
}

function filterTickets(type, btn) {
  currentFilter = type;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTickets('open');
}

const TYPE_ICONS = { bug: '🐛', improvement: '⚡', idea: '💡' };
const TYPE_LABELS = { bug: 'Bug', improvement: 'Improvement', idea: 'Idea' };

function renderTickets(statusFilter) {
  updateStats();
  let list = tickets.filter(t => statusFilter==='open' ? t.status!=='fixed' : true);
  if (currentFilter !== 'all') list = list.filter(t => t.type === currentFilter);
  list.sort((a,b) => new Date(b.created) - new Date(a.created));

  const container = document.getElementById('tickets-list');
  if (!list.length) {
    container.innerHTML = `<div class="empty"><div class="empty-icon">🎉</div>No open tickets. All clear!</div>`;
    return;
  }
  container.innerHTML = list.map(t => `
    <div class="ticket ${t.type}" id="ticket-${t.id}">
      <div class="ticket-icon">${TYPE_ICONS[t.type]||'📋'}</div>
      <div>
        <div class="ticket-id">${t.id}</div>
        <div class="ticket-text">${t.text}</div>
        <div class="ticket-meta">
          <span class="ticket-page">📍 ${t.page}</span>
          <span class="ticket-date">${new Date(t.created).toLocaleDateString('en-GB')}</span>
          ${t.version ? `<span class="ticket-version">${t.version}</span>` : ''}
          <span class="badge badge-${t.status==='fixed'?'fixed':t.status==='wip'?'wip':'open'}">${t.status==='fixed'?'✅ Fixed':t.status==='wip'?'🔄 In Progress':'🔴 Open'}</span>
        </div>
      </div>
      <div class="ticket-actions">
        ${t.status!=='fixed' ? `
          <button class="btn btn-teal" onclick="markFixed('${t.id}')">✅ Mark Fixed</button>
          <button class="btn btn-outline" onclick="markWIP('${t.id}')">${t.status==='wip'?'↩ Reopen':'🔄 In Progress'}</button>
        ` : `<button class="btn btn-outline" onclick="reopenTicket('${t.id}')">↩ Reopen</button>`}
        <button class="btn btn-danger" onclick="deleteTicket('${t.id}')">🗑</button>
      </div>
    </div>`).join('');
}

function renderAllTickets() {
  const container = document.getElementById('all-tickets-list');
  const list = [...tickets].sort((a,b) => new Date(b.created) - new Date(a.created));
  if (!list.length) {
    container.innerHTML = `<div class="empty"><div class="empty-icon">🎫</div>No tickets yet. Use the 🎫 button on any page to add one.</div>`;
    return;
  }
  container.innerHTML = list.map(t => `
    <div class="ticket ${t.type}">
      <div class="ticket-icon">${TYPE_ICONS[t.type]||'📋'}</div>
      <div>
        <div class="ticket-id">${t.id}</div>
        <div class="ticket-text">${t.text}</div>
        <div class="ticket-meta">
          <span class="ticket-page">📍 ${t.page}</span>
          <span class="ticket-date">${new Date(t.created).toLocaleDateString('en-GB')}</span>
          <span class="badge badge-${t.status==='fixed'?'fixed':t.status==='wip'?'wip':'open'}">${t.status==='fixed'?'✅ Fixed':t.status==='wip'?'🔄 WIP':'🔴 Open'}</span>
        </div>
      </div>
      <div class="ticket-actions">
        ${t.status!=='fixed' ? `<button class="btn btn-teal" onclick="markFixed('${t.id}');renderAllTickets()">✅ Fixed</button>` : `<button class="btn btn-outline" onclick="reopenTicket('${t.id}');renderAllTickets()">↩ Reopen</button>`}
        <button class="btn btn-danger" onclick="deleteTicket('${t.id}');renderAllTickets()">🗑</button>
      </div>
    </div>`).join('');
}

function renderChangelog() {
  const container = document.getElementById('changelog-list');
  if (!changelog.length) {
    container.innerHTML = `<div class="empty"><div class="empty-icon">📦</div>No versions yet. Fix some tickets then click "Create Version".</div>`;
    return;
  }
  container.innerHTML = [...changelog].sort((a,b) => new Date(b.date) - new Date(a.date)).map(v => `
    <div class="version-block">
      <div class="version-hdr">
        <span class="version-tag">${v.version}</span>
        <span class="version-date">📅 ${new Date(v.date).toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'})}</span>
        <span class="version-count">${v.items.length} change${v.items.length!==1?'s':''}</span>
      </div>
      ${v.notes ? `<p style="font-size:13px;color:var(--text-muted);margin-bottom:12px;padding:10px 14px;background:var(--cream);border-radius:7px">${v.notes}</p>` : ''}
      ${v.items.map(item => `
        <div class="version-item">
          <span class="vi-icon">${TYPE_ICONS[item.type]||'📋'}</span>
          <span class="vi-text">${item.text}<span class="vi-page">${item.page}</span></span>
        </div>`).join('')}
    </div>`).join('');
}

function updateStats() {
  const open = tickets.filter(t=>t.type==='bug'&&t.status!=='fixed').length;
  const imp = tickets.filter(t=>t.type==='improvement'&&t.status!=='fixed').length;
  const ideas = tickets.filter(t=>t.type==='idea'&&t.status!=='fixed').length;
  const fixed = tickets.filter(t=>t.status==='fixed').length;
  document.getElementById('st-open').textContent = open;
  document.getElementById('st-improvements').textContent = imp;
  document.getElementById('st-ideas').textContent = ideas;
  document.getElementById('st-fixed').textContent = fixed;
}

function markFixed(id) {
  tickets = tickets.map(t => t.id===id ? {...t, status:'fixed', fixedAt: new Date().toISOString()} : t);
  saveData(); renderTickets('open');
}
function markWIP(id) {
  tickets = tickets.map(t => t.id===id ? {...t, status: t.status==='wip'?'open':'wip'} : t);
  saveData(); renderTickets('open');
}
function reopenTicket(id) {
  tickets = tickets.map(t => t.id===id ? {...t, status:'open', fixedAt:null} : t);
  saveData(); renderTickets('open');
}
function deleteTicket(id) {
  if (!confirm('Delete this ticket?')) return;
  tickets = tickets.filter(t => t.id!==id);
  saveData(); renderTickets('open');
}
function clearAllFixed() {
  if (!confirm('Remove all fixed tickets from the list?')) return;
  tickets = tickets.filter(t => t.status!=='fixed');
  saveData(); renderTickets('open');
}

function openVersionModal() {
  const fixed = tickets.filter(t=>t.status==='fixed');
  if (!fixed.length) { alert('No fixed tickets to include in a version. Mark some tickets as fixed first.'); return; }
  document.getElementById('v-number').value = '';
  document.getElementById('v-date').value = new Date().toISOString().slice(0,10);
  document.getElementById('v-notes').value = '';
  document.getElementById('modal-version').classList.add('open');
}
function closeVersionModal() {
  document.getElementById('modal-version').classList.remove('open');
}
function saveVersion() {
  const ver = document.getElementById('v-number').value.trim();
  if (!ver) { alert('Enter a version number'); return; }
  const fixed = tickets.filter(t=>t.status==='fixed');
  const version = {
    version: ver,
    date: document.getElementById('v-date').value,
    notes: document.getElementById('v-notes').value.trim(),
    items: fixed.map(t => ({type:t.type, text:t.text, page:t.page, id:t.id}))
  };
  changelog.unshift(version);
  // Update tickets with version number, mark as archived
  tickets = tickets.map(t => t.status==='fixed' ? {...t, status:'archived', versionTag:ver} : t);
  // Remove archived from main list
  tickets = tickets.filter(t => t.status !== 'archived');
  saveData();
  closeVersionModal();
  // Switch to changelog tab
  document.querySelectorAll('.tab')[2].click();
}

// Close modal on overlay click
document.getElementById('modal-version').addEventListener('click', function(e) {
  if (e.target===this) closeVersionModal();
});

// Init
renderTickets('open');
updateStats();
</script>
<script src="erp-nav.js"></script>
</body>
</html>
