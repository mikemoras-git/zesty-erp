<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Zesty ERP — Tickets</title>
<link rel="stylesheet" href="erp-style.css">
</head>
<body>
<div class="container">
  <div class="page-title-bar">
    <div><h1>Bug Tracker</h1><p>Internal bugs, improvements and ideas submitted via the 🎫 button</p></div>
    <div class="page-actions">
      <div class="sync-status"><span class="sync-dot" id="syncDot"></span><span>Connected</span></div>
      <button class="btn btn-outline btn-sm" onclick="exportCSV()">↓ Export</button>
    </div>
  </div>

  <div class="stats-bar">
    <div class="stat-card" onclick="setFilter('open')"><div class="stat-label">Open</div><div class="stat-value danger" id="st-open">—</div></div>
    <div class="stat-card" onclick="setFilter('wip')"><div class="stat-label">In Progress</div><div class="stat-value gold" id="st-wip">—</div></div>
    <div class="stat-card" onclick="setFilter('fixed')"><div class="stat-label">Fixed</div><div class="stat-value success" id="st-fixed">—</div></div>
    <div class="stat-card" onclick="setTypeFilter('bug')"><div class="stat-label">Bugs</div><div class="stat-value danger" id="st-bugs">—</div></div>
    <div class="stat-card" onclick="setTypeFilter('improvement')"><div class="stat-label">Improvements</div><div class="stat-value" style="color:var(--info)" id="st-improve">—</div></div>
    <div class="stat-card" onclick="setTypeFilter('idea')"><div class="stat-label">Ideas</div><div class="stat-value success" id="st-ideas">—</div></div>
  </div>

  <div class="filter-bar">
    <input type="search" id="q" placeholder="Search ticket text, page…" oninput="render()">
    <select id="fStatus" onchange="render()">
      <option value="">All statuses</option>
      <option value="open">Open</option>
      <option value="wip">In Progress</option>
      <option value="fixed">Fixed</option>
    </select>
    <select id="fType" onchange="render()">
      <option value="">All types</option>
      <option value="bug">Bug</option>
      <option value="improvement">Improvement</option>
      <option value="idea">Idea</option>
    </select>
    <div class="filter-spacer"></div>
  </div>

  <div class="table-wrap">
    <div class="table-header"><h3 id="tableCount">Tickets</h3></div>
    <table>
      <thead><tr>
        <th onclick="sortBy('type')">Type</th>
        <th onclick="sortBy('text')">Description</th>
        <th onclick="sortBy('page')">Page</th>
        <th onclick="sortBy('created_by')">Submitted By</th>
        <th onclick="sortBy('created_at')">Date</th>
        <th onclick="sortBy('status')">Status</th>
        <th style="width:120px"></th>
      </tr></thead>
      <tbody id="tBody"><tr class="empty-row"><td colspan="7"><div class="empty-icon">🎫</div><p>Loading tickets…</p></td></tr></tbody>
    </table>
    <div class="pagination" id="pagination"></div>
  </div>
</div>

<script src="erp-base.js"></script>
<script>
let tickets = [];
let sort = { field: 'created_at', dir: -1 };
let page = 1;
const PAGE = 25;

const SUPA_URL = 'https://whuytfjwdjjepayeiohj.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndodXl0Zmp3ZGpqZXBheWVpb2hqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyODQxMzQsImV4cCI6MjA4Nzg2MDEzNH0.pTDAqw_Cnzc9D3tJU-tU7Ch5qpapKmteiqI_ooSCufY';

async function loadTickets() {
  // Tickets use a flat schema (not the id+data wrapper), so load directly
  setSyncDot('syncing');
  try {
    const r = await fetch(`${SUPA_URL}/rest/v1/tickets?select=*&order=created_at.desc&limit=5000`, {
      headers: { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY }
    });
    if (r.ok) {
      tickets = await r.json();
      setSyncDot('ok');
    } else { throw new Error(); }
  } catch {
    setSyncDot('error');
    try { tickets = JSON.parse(localStorage.getItem('zesty_tickets')||'[]')||[]; } catch { tickets=[]; }
  }
  render();
}
loadTickets();

const TYPE_ICON = { bug:'🐛', improvement:'⚡', idea:'💡' };
const TYPE_BADGE = { bug:'b-inactive', improvement:'b-progress', idea:'b-active' };

function statusBadge(s) {
  if (s==='fixed') return '<span class="badge b-active">Fixed</span>';
  if (s==='wip') return '<span class="badge b-pending">WIP</span>';
  return '<span class="badge b-inactive">Open</span>';
}

function render() {
  const q = (document.getElementById('q').value||'').toLowerCase();
  const fStatus = document.getElementById('fStatus').value;
  const fType = document.getElementById('fType').value;
  let list = tickets.filter(t => {
    if (fStatus && t.status!==fStatus) return false;
    if (fType && t.type!==fType) return false;
    if (q && !((t.text||'')+(t.page||'')+(t.created_by||'')).toLowerCase().includes(q)) return false;
    return true;
  });
  list.sort((a,b)=>((a[sort.field]||'')<(b[sort.field]||'')?-sort.dir:sort.dir));

  const total = list.length;
  const pages = Math.ceil(total/PAGE)||1;
  if(page>pages)page=1;
  const slice = list.slice((page-1)*PAGE, page*PAGE);

  document.getElementById('st-open').textContent = tickets.filter(t=>t.status==='open').length;
  document.getElementById('st-wip').textContent = tickets.filter(t=>t.status==='wip').length;
  document.getElementById('st-fixed').textContent = tickets.filter(t=>t.status==='fixed').length;
  document.getElementById('st-bugs').textContent = tickets.filter(t=>t.type==='bug').length;
  document.getElementById('st-improve').textContent = tickets.filter(t=>t.type==='improvement').length;
  document.getElementById('st-ideas').textContent = tickets.filter(t=>t.type==='idea').length;
  document.getElementById('tableCount').textContent = `${total} Ticket${total!==1?'s':''}`;

  document.getElementById('tBody').innerHTML = !slice.length
    ? `<tr class="empty-row"><td colspan="7"><div class="empty-icon">🎉</div><p>No tickets!</p></td></tr>`
    : slice.map(t => `<tr>
        <td><span class="badge ${TYPE_BADGE[t.type]||'b-individual'}">${TYPE_ICON[t.type]||'📋'} ${t.type||'—'}</span></td>
        <td style="max-width:280px">${(t.text||'').slice(0,100)}${(t.text||'').length>100?'…':''}</td>
        <td style="font-size:11px;font-family:monospace;color:var(--teal)">${t.page||'—'}</td>
        <td style="font-size:12px">${t.created_by||'—'}</td>
        <td style="font-size:11px;color:var(--text-muted)">${t.created_at?new Date(t.created_at).toLocaleDateString('el-GR'):''}</td>
        <td>${statusBadge(t.status)}</td>
        <td>
          <div class="table-actions">
            ${t.status!=='wip'?`<button class="btn btn-outline btn-xs" onclick="setStatus('${t.id}','wip')">⚙️ WIP</button>`:''}
            ${t.status!=='fixed'?`<button class="btn btn-success btn-xs" onclick="setStatus('${t.id}','fixed')">✓ Fix</button>`:''}
            <button class="btn btn-danger btn-xs" onclick="delTicket('${t.id}')">🗑</button>
          </div>
        </td>
      </tr>`).join('');

  const pg = document.getElementById('pagination');
  if(pages<=1){pg.innerHTML='';return;}
  let h=`<span>${total} total</span><div class="pagination-spacer"></div>`;
  for(let i=1;i<=pages;i++){
    if(i===1||i===pages||Math.abs(i-page)<=1)h+=`<button class="page-btn ${i===page?'active':''}" onclick="page=${i};render()">${i}</button>`;
    else if(Math.abs(i-page)===2)h+='<span>…</span>';
  }
  pg.innerHTML=h;
}

function sortBy(f){if(sort.field===f)sort.dir*=-1;else{sort.field=f;sort.dir=1;}render();}
function setFilter(s){document.getElementById('fStatus').value=s;page=1;render();}
function setTypeFilter(t){document.getElementById('fType').value=t;page=1;render();}

async function setStatus(id, status) {
  const t = tickets.find(x=>x.id===id); if(!t)return;
  t.status = status;
  setSyncDot('syncing');
  try {
    await fetch(`${SUPA_URL}/rest/v1/tickets?id=eq.${encodeURIComponent(id)}`, {
      method:'PATCH', headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json'},
      body: JSON.stringify({status})
    });
    setSyncDot('ok');
  } catch { setSyncDot('error'); }
  render();
  showToast(`✓ Marked ${status}`, 'success');
}

async function delTicket(id) {
  const t=tickets.find(x=>x.id===id); if(!t)return;
  showConfirm('🗑️','Delete Ticket?','Delete this ticket?','btn-danger','Delete',async()=>{
    tickets=tickets.filter(x=>x.id!==id);
    setSyncDot('syncing');
    try {
      await fetch(`${SUPA_URL}/rest/v1/tickets?id=eq.${encodeURIComponent(id)}`,{method:'DELETE',headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY}});
      setSyncDot('ok');
    } catch { setSyncDot('error'); }
    render(); showToast('Deleted','error');
  });
}

function exportCSV() {
  const rows=[['ID','Type','Text','Page','By','Date','Status']];
  tickets.forEach(t=>rows.push([t.id||'',t.type||'',t.text||'',t.page||'',t.created_by||'',t.created_at||'',t.status||'']));
  const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);a.download='tickets.csv';a.click();
}
</script>
<script src="erp-nav.js"></script>
</body>
</html>
