<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zesty ERP - Employee Profile</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root{--teal:#1a7a6e;--teal-light:#23a090;--teal-dark:#115950;--gold:#c9a84c;--gold-light:#e8c97a;--cream:#f8f5f0;--white:#fff;--text:#1e2a28;--text-muted:#6b7e7b;--border:#d4e0de;--danger:#c0392b;--success:#27ae60;--archive:#8e6b23;--shadow:0 2px 16px rgba(26,122,110,.10);--shadow-lg:0 8px 40px rgba(26,122,110,.15)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);min-height:100vh}
header{background:linear-gradient(135deg,var(--teal-dark),var(--teal));padding:14px 28px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 12px rgba(0,0,0,.15);position:sticky;top:0;z-index:100;flex-wrap:wrap;gap:10px}
.logo{font-family:'DM Serif Display',serif;color:#fff;font-size:20px}
.logo span{color:var(--gold-light)}
.header-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;border:none;transition:all .18s}
.btn-outline{background:transparent;border:1px solid rgba(255,255,255,.3);color:var(--gold-light)}
.btn-outline:hover{background:rgba(255,255,255,.1)}
.btn-primary{background:var(--gold);color:var(--teal-dark);font-weight:600}
.btn-primary:hover{background:var(--gold-light)}
.btn-danger{background:var(--danger);color:#fff}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text-muted)}
.btn-ghost:hover{background:var(--border);color:var(--text)}
.btn-save{background:var(--teal);color:#fff}
.btn-save:hover{background:var(--teal-light)}
main{max-width:1200px;margin:0 auto;padding:28px 24px 100px}
.breadcrumb{font-size:13px;color:var(--text-muted);margin-bottom:20px}
.breadcrumb a{color:var(--teal);text-decoration:none}
.breadcrumb a:hover{text-decoration:underline}
.profile-layout{display:grid;grid-template-columns:300px 1fr;gap:24px;align-items:start}
/* LEFT CARD */
.profile-card{background:var(--white);border-radius:16px;border:1px solid var(--border);box-shadow:var(--shadow);padding:28px 24px;text-align:center;position:sticky;top:80px}
.avatar-lg{width:90px;height:90px;border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:700;margin:0 auto 16px}
.profile-name{font-family:'DM Serif Display',serif;font-size:22px;color:var(--teal-dark);margin-bottom:4px}
.profile-role{font-size:13px;color:var(--text-muted);margin-bottom:12px}
.profile-dept{display:inline-block;padding:4px 14px;border-radius:20px;background:#f0e8ff;color:#8e44ad;font-size:12px;font-weight:600;margin-bottom:16px}
.profile-meta{text-align:left;border-top:1px solid var(--border);padding-top:16px;display:flex;flex-direction:column;gap:10px}
.meta-row{display:flex;align-items:center;gap:10px;font-size:13px}
.meta-row .ic{width:20px;text-align:center;color:var(--text-muted)}
.badge{display:inline-block;padding:2px 9px;border-radius:12px;font-size:11px;font-weight:600}
.b-active{background:#e8f8f0;color:var(--success)}
.b-inactive{background:#fdf0ef;color:var(--danger)}
.b-leave{background:#e8f4f8;color:#2980b9}
/* LEAVE BALANCE in profile card */
.leave-summary{margin-top:16px;border-top:1px solid var(--border);padding-top:16px;text-align:left}
.leave-summary h4{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);margin-bottom:12px}
.leave-item{margin-bottom:10px}
.leave-item-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px}
.leave-item-name{font-size:12px;font-weight:500}
.leave-item-val{font-size:13px;font-weight:700;color:var(--teal)}
.leave-bar{height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.leave-bar-fill{height:100%;background:var(--teal);border-radius:3px;transition:width .4s}
.leave-item.sick .leave-item-val{color:#c0392b}
.leave-item.sick .leave-bar-fill{background:#c0392b}
.leave-item.hourly .leave-item-val{color:#d35400}
.leave-item.hourly .leave-bar-fill{background:#d35400}
/* RIGHT TABS */
.tabs-wrap{background:var(--white);border-radius:16px;border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden}
.tabs-header{display:flex;border-bottom:1px solid var(--border);background:var(--cream);overflow-x:auto}
.tab{padding:14px 22px;font-size:13px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;color:var(--text-muted);white-space:nowrap;transition:all .18s}
.tab:hover{color:var(--teal)}
.tab.active{color:var(--teal);border-bottom-color:var(--teal);background:var(--white)}
.tab-content{padding:28px;display:none}
.tab-content.active{display:block}
/* FORM */
.form-section{margin-bottom:28px}
.form-section-title{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--teal);padding-bottom:8px;border-bottom:1px solid var(--border);margin-bottom:16px}
.form-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.fg{display:flex;flex-direction:column;gap:6px}
.fg.full{grid-column:1/-1}
.fg.half{grid-column:span 2}
.fg label{font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em}
.fg input,.fg select,.fg textarea{padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:14px;background:var(--cream);outline:none;transition:border-color .18s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--teal-light);background:var(--white)}
.fg textarea{resize:vertical;min-height:80px}
.form-footer{display:flex;justify-content:flex-end;gap:10px;padding-top:16px;border-top:1px solid var(--border);margin-top:24px}
/* LEAVE LIST in profile */
.leave-list{display:flex;flex-direction:column;gap:8px}
.leave-entry{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--cream);border-radius:10px;border:1px solid var(--border);font-size:13px}
.le-type{min-width:90px;font-weight:600;color:var(--teal)}
.le-dates{flex:1;color:var(--text-muted)}
.le-days{font-weight:600}
.le-annual{color:var(--teal)}
.le-sick{color:var(--danger)}
.le-hourly{color:#d35400}
.toast{position:fixed;bottom:80px;right:20px;background:var(--teal-dark);color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;z-index:2000;transform:translateY(60px);opacity:0;transition:all .3s}
.toast.show{transform:translateY(0);opacity:1}
.toast.err{background:var(--danger)}
#loadingOverlay{position:fixed;inset:0;background:var(--cream);display:flex;align-items:center;justify-content:center;z-index:9000;font-size:14px;color:var(--text-muted)}
@media(max-width:900px){.profile-layout{grid-template-columns:1fr}.profile-card{position:static}.form-grid{grid-template-columns:1fr 1fr}}
@media(max-width:600px){.form-grid{grid-template-columns:1fr}}</style>

      };
      const _msal=new msal.PublicClientApplication(_msalConfig);
      const _loginRequest={scopes:['openid','profile','User.Read']};

      async function _ensureLogin(){
        await _msal.initialize();
        try{ await _msal.handleRedirectPromise(); }catch(e){}
        const accounts=_msal.getAllAccounts();
        if(accounts.length>0){
          const acct=accounts[0];
          if(acct.tenantId!=='9c30b606-6648-4777-a623-64867e43e54f'){
            document.documentElement.style.visibility='visible';

            return;
          }
          _showUserBadge(acct.name||acct.username);

          if(!hdr)return;

          badge.id='_azure_badge';
          badge.style.cssText='display:flex;align-items:center;gap:8px;margin-left:4px';

<div id="loadingOverlay">Loading profile...</div>
<header>
  <div class="logo">Zesty <span>ERP</span> &middot; Employee Profile</div>
  <div class="header-right">

</header>
<main>
  <div class="breadcrumb"><a href="employees.html">&#8592; Employee Directory</a> &rsaquo; <span id="breadcrumbName">Profile</span></div>
  <div class="profile-layout">
    <!-- LEFT: Profile Card -->
    <div>
      <div class="profile-card">
        <div class="avatar-lg" id="profileAvatar">?</div>
        <div class="profile-name" id="profileName">—</div>
        <div class="profile-role" id="profileRole">—</div>
        <div id="profileDept"></div>
        <div class="profile-meta">
          <div class="meta-row"><span class="ic">&#128222;</span><span id="pPhone">—</span></div>

          <div class="meta-row"><span class="ic">&#128197;</span><span id="pStart">—</span></div>

            </div>
            <div class="fg"><label>Gender</label>
              <select id="f_gender">

          </div>

        <div class="form-footer">

      <!-- CONTACT -->
      <div class="tab-content" id="tab-contact">

            <div class="fg"><label>Home Phone</label><input id="c_homephone" placeholder="Home telephone"></div>
            <div class="fg"><label>Work Email</label><input id="c_workemail" type="email" placeholder="work@company.com"></div>
            <div class="fg"><label>Personal Email</label><input id="c_email" type="email" placeholder="personal@email.com"></div>
            <div class="fg"></div>
            <div class="fg"><label>Address Street</label><input id="c_street" placeholder="Street address"></div>

          </div>

        <div class="form-footer">

          <button class="btn btn-save" onclick="saveSection('contact')">Save Contact Details</button>

      <!-- EMPLOYMENT -->
      <div class="tab-content" id="tab-employment">

            <div class="fg"><label>Start Date</label><input id="e_start" type="date"></div>

        <div class="form-footer">
          <button class="btn btn-ghost" onclick="location.href='employees.html'">Cancel</button>

        <div id="leaveHistoryContent">
          <div style="color:var(--text-muted);font-size:13px">Loading leave history...</div>
        </div>
      </div>
    </div>
  </div>
</main>

  async _fetch(method,table,body,query,ms){
    if(!this._ok())return{ok:false,data:null,err:'Not configured'};
    const ctrl=new AbortController(),t=setTimeout(()=>ctrl.abort(),ms||15000);

    }catch(e){clearTimeout(t);return{ok:false,data:null,err:e.name==='AbortError'?'Timeout':e.message}}
  },
  async loadAll(table){
    const r=await this._fetch('GET',table,null,'?select=id,data,updated_at&order=created_at.asc&limit=100000');
    if(!r.ok)return{ok:false,rows:null,err:r.err};
    const rows=(r.data||[]).map(row=>({id:row.id,...(row.data||{})}));
    return{ok:true,rows};
  },
  async upsertOne(table,record){
    const{id,...rest}=record;
    const rid=id||('rec_'+Date.now()+'_'+Math.random().toString(36).slice(2,6));
    const row={id:rid,data:rest,updated_at:new Date().toISOString()};
    const r=await this._fetch('POST',table,row,'?on_conflict=id');
    return{ok:r.ok,id:rid,err:r.err};
  },
  async upsertMany(table,records){
    if(!records.length)return{ok:true};
    const rows=records.map(({id,...rest})=>({id:id||('rec_'+Date.now()+'_'+Math.random().toString(36).slice(2,6)),data:rest,updated_at:new Date().toISOString()}));
    const size=200;
    for(let i=0;i<rows.length;i+=size){
      const r=await this._fetch('POST',table,rows.slice(i,i+size),'?on_conflict=id');
      if(!r.ok)return{ok:false,err:r.err};
    }
    return{ok:true};
  },
  async deleteOne(table,id){
    const r=await this._fetch('DELETE',table,null,'?id=eq.'+encodeURIComponent(id));
    return{ok:r.ok,err:r.err};
  },
  isConfigured(){return this._ok()}
};
const SyncStore={
  _pendingDeletes:{},
  async load(lsKey,table){
    const cached=this._getLocal(lsKey);
    const result=await DB.loadAll(table);
    if(result.ok&&result.rows!==null){
      const pending=this._pendingDeletes[table]||new Set();
      const rows=result.rows.filter(r=>!pending.has(r.id));
      localStorage.setItem(lsKey,JSON.stringify(rows));
      return{data:rows,fromCache:false,online:true};
    }
    return{data:cached,fromCache:true,online:false};
  },
  async saveOne(lsKey,table,record,all){
    localStorage.setItem(lsKey,JSON.stringify(all));
    const r=await DB.upsertOne(table,record);
    if(!r.ok)showSyncErr(r.err);
    return r;
  },
  async saveAll(lsKey,table,records){
    localStorage.setItem(lsKey,JSON.stringify(records));
    const r=await DB.upsertMany(table,records);
    if(!r.ok)showSyncErr(r.err);
    return r.ok;
  },
  async deleteOne(lsKey,table,id,all){
    if(!this._pendingDeletes[table])this._pendingDeletes[table]=new Set();
    this._pendingDeletes[table].add(id);
    localStorage.setItem(lsKey,JSON.stringify(all));
    const r=await DB.deleteOne(table,id);
    if(!r.ok){
      this._pendingDeletes[table].delete(id);
      showSyncErr('Delete failed: '+r.err);
      return{ok:false,err:r.err};
    }
    setTimeout(()=>{if(this._pendingDeletes[table])this._pendingDeletes[table].delete(id)},120000);
    return{ok:true};
  },
  _getLocal(key){try{return JSON.parse(localStorage.getItem(key)||'[]')||[]}catch{return[]}}
};
function startPoll(table,lsKey,ms,onData){
  let lastHash='';
  const poll=async()=>{
    const result=await DB.loadAll(table);
    if(!result.ok||!result.rows)return;
    const pending=SyncStore._pendingDeletes[table]||new Set();
    const rows=result.rows.filter(r=>!pending.has(r.id));
    const hash=rows.length+'|'+rows.map(r=>r.id).join(',');
    if(hash!==lastHash){lastHash=hash;localStorage.setItem(lsKey,JSON.stringify(rows));onData(rows)}
  };
  setInterval(poll,ms);
  return poll;
}

  b.textContent='⚠ Database offline — working in local mode. Click to retry.';

  b.textContent='Save error: '+err;b.style.display='block';
  clearTimeout(b._t);b._t=setTimeout(()=>b.style.display='none',6000);

let empId = null;
let emp = null;
let leaves = [];
let settings = {};

const COLORS = ['#1a7a6e','#2980b9','#8e44ad','#c0392b','#d35400','#16a085','#27ae60','#c9a84c'];
function avatarColor(s){let h=0;for(const c of s)h=(h*31+c.charCodeAt(0))&0xffffffff;return COLORS[Math.abs(h)%COLORS.length]}
function initials(e){return((e.firstName||'')[0]||'')+((e.lastName||'')[0]||'')}

async function init(){
  const params = new URLSearchParams(location.search);
  empId = params.get('id');
  const isNew = params.get('new') === '1';

  // Load settings (departments)
  const sResult = await SyncStore.load('zesty_settings','settings');
  if(sResult.online && sResult.data.length > 0){
    settings = sResult.data[0];
  }
  populateDeptDropdown();

  if(isNew){
    emp = { id: 'emp_'+Date.now()+'_'+Math.random().toString(36).slice(2,6) };
    empId = emp.id;
    document.getElementById('breadcrumbName').textContent = 'New Employee';
    document.getElementById('profileName').textContent = 'New Employee';
    document.getElementById('deactivateBtn').style.display = 'none';
    const ol = document.getElementById('loadingOverlay');
    if(ol){ol.style.opacity='0';ol.style.transition='opacity 0.3s';setTimeout(()=>ol.remove(),300)}
    showDbStatus(true);
    return;
  }

  if(!empId){ location.href='employees.html'; return; }

  // Load employees
  const eResult = await SyncStore.load('zesty_employees','employees');
  showDbStatus(eResult.online);
  const employees = eResult.data;
  emp = employees.find(e=>e.id===empId);
  if(!emp){ showToast('Employee not found','err'); setTimeout(()=>location.href='employees.html',1500); return; }

  // Load leaves for this employee
  const lResult = await SyncStore.load('zesty_leaves','leaves');
  leaves = lResult.data.filter(l=>l.employeeId===empId);

  renderProfile();
  fillForms();
  renderLeaveBalance();
  renderLeaveHistory();

  const ol = document.getElementById('loadingOverlay');
  if(ol){ol.style.opacity='0';ol.style.transition='opacity 0.3s';setTimeout(()=>ol.remove(),300)}

  // Poll for changes
  startPoll('employees','zesty_employees',30000,(rows)=>{
    const updated = rows.find(e=>e.id===empId);
    if(updated){ emp=updated; renderProfile(); renderLeaveBalance(); }
  });
  startPoll('leaves','zesty_leaves',30000,(rows)=>{
    leaves = rows.filter(l=>l.employeeId===empId);
    renderLeaveBalance();
    renderLeaveHistory();
  });
}

function populateDeptDropdown(){
  const sel = document.getElementById('e_dept');
  const depts = (settings.departments||['Management','Operations','Cleaning','Maintenance','Guest Relations','Finance','Marketing','Other']);
  sel.innerHTML = '<option value="">— Select —</option>' + depts.map(d=>'<option>'+d+'</option>').join('');
}

function renderProfile(){
  if(!emp) return;
  const name = ((emp.firstName||'')+' '+(emp.lastName||'')).trim()||'Unnamed';
  const col = avatarColor(name);
  document.getElementById('breadcrumbName').textContent = name;
  document.getElementById('profileName').textContent = name;
  document.getElementById('profileRole').textContent = emp.role||'No role set';
  document.getElementById('profileAvatar').textContent = initials(emp)||'?';
  document.getElementById('profileAvatar').style.background = col;
  document.getElementById('pPhone').textContent = emp.mobile||emp.phone||'—';
  document.getElementById('pEmail').textContent = emp.workEmail||emp.email||'—';
  document.getElementById('pStart').textContent = emp.startDate ? 'Since '+emp.startDate : '—';
  const STATUS = {active:'<span class="badge b-active">Active</span>',inactive:'<span class="badge b-inactive">Inactive</span>',on_leave:'<span class="badge b-leave">On Leave</span>'};
  document.getElementById('pStatus').innerHTML = STATUS[emp.status]||emp.status||'—';
  document.getElementById('profileDept').innerHTML = emp.department ? '<div class="profile-dept">'+emp.department+'</div>' : '';
  const db = document.getElementById('deactivateBtn');
  db.textContent = emp.status==='inactive' ? 'Re-activate' : 'Deactivate';
  db.style.display = 'inline-flex';
}

function fillForms(){
  if(!emp) return;
  const map = {
    f_fn:'firstName',f_ln:'lastName',f_dob:'dob',f_id:'idNum',f_tax:'taxNum',f_amka:'amka',
    f_marital:'maritalStatus',f_gender:'gender',f_nat:'nationality',f_notes:'notes',
    c_mobile:'mobile',c_workphone:'workPhone',c_homephone:'homePhone',
    c_workemail:'workEmail',c_email:'email',
    c_street:'street',c_city:'city',c_postal:'postalCode',c_country:'country',
    c_en:'emergencyName',c_ep:'emergencyPhone',c_er:'emergencyRelation',
    e_role:'role',e_dept:'department',e_type:'employmentType',e_status:'status',
    e_start:'startDate',e_end:'endDate',e_salary:'salary'
  };
  Object.entries(map).forEach(([fId,key])=>{
    const el=document.getElementById(fId);
    if(el) el.value=emp[key]||'';
  });
}

function collectSection(section){
  const maps = {
    personal:{f_fn:'firstName',f_ln:'lastName',f_dob:'dob',f_id:'idNum',f_tax:'taxNum',f_amka:'amka',f_marital:'maritalStatus',f_gender:'gender',f_nat:'nationality',f_notes:'notes'},
    contact:{c_mobile:'mobile',c_workphone:'workPhone',c_homephone:'homePhone',c_workemail:'workEmail',c_email:'email',c_street:'street',c_city:'city',c_postal:'postalCode',c_country:'country',c_en:'emergencyName',c_ep:'emergencyPhone',c_er:'emergencyRelation'},
    employment:{e_role:'role',e_dept:'department',e_type:'employmentType',e_status:'status',e_start:'startDate',e_end:'endDate',e_salary:'salary'}
  };
  const map = maps[section]||{};
  const data = {};
  Object.entries(map).forEach(([fId,key])=>{
    const el=document.getElementById(fId);
    if(el) data[key]=typeof el.value==='string'?el.value.trim():el.value;
  });
  return data;
}

async function saveSection(section){
  if(!emp) return;
  if(section==='personal'){
    const fn=document.getElementById('f_fn').value.trim();
    const ln=document.getElementById('f_ln').value.trim();
    if(!fn&&!ln){showToast('Please enter a name.','err');return}
  }
  if(section==='employment'){
    if(!document.getElementById('e_role').value.trim()){showToast('Please enter a job title.','err');return}
  }

  const updates = collectSection(section);
  Object.assign(emp, updates);
  emp.id = empId;

  // Load all employees, update this one, save
  const allResult = await SyncStore.load('zesty_employees','employees');
  let all = allResult.data;
  const idx = all.findIndex(e=>e.id===empId);
  if(idx!==-1) all[idx]=emp;
  else all.push(emp);

  const result = await SyncStore.saveOne('zesty_employees','employees',emp,all);
  if(result.ok!==false){
    showToast('Saved successfully');
    renderProfile();
    if(section==='employment') populateDeptDropdown();
    // Redirect to employee list if new
    const params = new URLSearchParams(location.search);
    if(params.get('new')==='1'){
      history.replaceState(null,'','employee-profile.html?id='+empId);
    }
  } else {
    showToast('Save failed','err');
  }
}

async function toggleStatus(){
  if(!emp) return;
  emp.status = emp.status==='inactive'?'active':'inactive';
  const allResult = await SyncStore.load('zesty_employees','employees');
  let all = allResult.data;
  const idx = all.findIndex(e=>e.id===empId);
  if(idx!==-1) all[idx]=emp;
  const result = await SyncStore.saveOne('zesty_employees','employees',emp,all);
  if(result.ok!==false){
    showToast(emp.status==='inactive'?'Employee deactivated':'Employee reactivated');
    renderProfile();
    document.getElementById('e_status').value = emp.status;
  }
}

function switchTab(name){
  document.querySelectorAll('.tab').forEach((t,i)=>{
    const tabs=['personal','contact','employment','leaves'];
    t.classList.toggle('active', tabs[i]===name);
  });
  document.querySelectorAll('.tab-content').forEach(c=>{
    c.classList.toggle('active', c.id==='tab-'+name);
  });
}

// LEAVE BALANCE
function renderLeaveBalance(){
  const el = document.getElementById('leaveBalanceSummary');
  const entitlements = settings.leaveEntitlements||{annual:20,sick:10,hourly:64};
  const used = calcUsed(leaves);

  const annualRem = (entitlements.annual||20) - (used.annual||0);
  const sickRem = (entitlements.sick||10) - (used.sick||0);
  const hourlyRem = (entitlements.hourly||64) - (used.hourly||0);

  el.innerHTML = [
    leaveBarHTML('Annual Leave', annualRem, entitlements.annual||20, ''),
    leaveBarHTML('Sick Leave', sickRem, entitlements.sick||10, 'sick'),
    leaveBarHTML('Hourly Time Off', hourlyRem+'h', entitlements.hourly||64, 'hourly', true)
  ].join('');
}

function leaveBarHTML(label, remaining, total, cls, isHours){
  const pct = total>0 ? Math.max(0,Math.min(100,(total-(isHours?(total-remaining):remaining))/total*100)) : 0;
  const val = isHours ? remaining+'h' : remaining;
  return '<div class="leave-item '+cls+'">'
    +'<div class="leave-item-top"><span class="leave-item-name">'+label+'</span><span class="leave-item-val">'+val+'</span></div>'
    +'<div class="leave-bar"><div class="leave-bar-fill" style="width:'+pct+'%"></div></div>'
    +'<div style="font-size:11px;color:var(--text-muted);margin-top:2px">of '+(isHours?total+'h':total+' days')+' entitlement</div>'
    +'</div>';
}

function calcUsed(leaveList){
  const used = {annual:0,sick:0,hourly:0};
  (leaveList||[]).forEach(l=>{
    if(l.leaveType==='annual') used.annual += parseFloat(l.days)||0;
    else if(l.leaveType==='sick') used.sick += parseFloat(l.days)||0;
    else if(l.leaveType==='hourly') used.hourly += parseFloat(l.hours)||0;
  });
  return used;
}

function renderLeaveHistory(){
  const el = document.getElementById('leaveHistoryContent');
  if(!leaves.length){
    el.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-muted)">No leave records found for this employee.</div>';
    return;
  }
  const sorted = [...leaves].sort((a,b)=>b.fromDate<a.fromDate?-1:1);
  el.innerHTML = '<div class="leave-list">'
    + sorted.map(l=>{
        const cls = l.leaveType==='sick'?'le-sick':l.leaveType==='hourly'?'le-hourly':'le-annual';
        const typeLabel = {annual:'Annual Leave',sick:'Sick Leave',hourly:'Hourly Time Off'}[l.leaveType]||l.leaveType;
        const duration = l.leaveType==='hourly'
          ? (l.hours||'?')+'h ('+l.fromDate+' '+l.fromTime+'-'+l.toTime+')'
          : (l.days||'?')+' day(s): '+l.fromDate+(l.toDate&&l.toDate!==l.fromDate?' - '+l.toDate:'');
        return '<div class="leave-entry">'
          +'<span class="le-type '+cls+'">'+typeLabel+'</span>'
          +'<span class="le-dates">'+duration+'</span>'
          +(l.notes?'<span style="color:var(--text-muted);font-size:12px">'+l.notes+'</span>':'')
          +'</div>';
      }).join('')
    +'</div>';
}

function showToast(msg,type){
  const t=document.getElementById('toast');t.textContent=msg;t.className='toast show'+(type==='err'?' err':'');
  clearTimeout(t._t);t._t=setTimeout(()=>t.className='toast',3000);
}

document.addEventListener('DOMContentLoaded', init);

</script>
