<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Zesty ERP — Onboarding</title>
<link rel="stylesheet" href="erp-style.css">
<style>
.pipeline{display:flex;gap:16px;overflow-x:auto;padding-bottom:12px;margin-bottom:24px}
.pipe-col{background:#fff;border:1px solid var(--border);border-radius:12px;min-width:220px;flex:1;overflow:hidden}
.pipe-header{padding:12px 16px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid var(--border)}
.pipe-body{padding:8px}
.pipe-card{background:var(--cream);border:1px solid var(--border);border-radius:8px;padding:11px 13px;margin-bottom:8px;cursor:pointer;transition:all .18s}
.pipe-card:hover{background:#f0faf8;border-color:var(--teal-light)}
.pipe-card:last-child{margin-bottom:0}
.pipe-card-name{font-size:13px;font-weight:600;color:var(--text)}
.pipe-card-sub{font-size:11px;color:var(--text-muted);margin-top:3px}
.pipe-card-date{font-size:10px;color:var(--text-muted);margin-top:5px}
.stage-contact .pipe-header{color:#2980b9;background:#e8f4f8}
.stage-visit .pipe-header{color:#e67e22;background:#fff3e0}
.stage-offer .pipe-header{color:#8e44ad;background:#f0e8ff}
.stage-agreement .pipe-header{color:#c9a84c;background:#fdf6e3}
.stage-setup .pipe-header{color:var(--teal);background:#f0faf8}
.stage-completed .pipe-header{color:var(--success);background:var(--success-light)}
.stage-declined .pipe-header{color:var(--danger);background:var(--danger-light)}
</style>
</head>
<body>
<div class="container">
  <div class="page-title-bar">
    <div><h1>Owner Onboarding</h1><p>Track new property owners through the onboarding pipeline</p></div>
    <div class="page-actions">
      <div class="sync-status"><span class="sync-dot" id="syncDot"></span><span>Connected</span></div>
      <select id="pipelineView" onchange="toggleView()" style="padding:7px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:'DM Sans',sans-serif;background:var(--cream)">
        <option value="pipeline">Pipeline View</option>
        <option value="table">Table View</option>
      </select>
      <button class="btn btn-primary" onclick="openAdd()">+ Add Lead</button>
    </div>
  </div>

  <div class="stats-bar">
    <div class="stat-card"><div class="stat-label">Active Leads</div><div class="stat-value gold" id="st-active">—</div></div>
    <div class="stat-card"><div class="stat-label">Agreements</div><div class="stat-value success" id="st-agreement">—</div></div>
    <div class="stat-card"><div class="stat-label">Setup</div><div class="stat-value" style="color:var(--teal)" id="st-setup">—</div></div>
    <div class="stat-card"><div class="stat-label">Completed</div><div class="stat-value" id="st-completed">—</div></div>
    <div class="stat-card"><div class="stat-label">Declined</div><div class="stat-value danger" id="st-declined">—</div></div>
  </div>

  <!-- PIPELINE VIEW -->
  <div id="pipelineDiv">
    <div class="pipeline" id="pipelineBoard"></div>
  </div>

  <!-- TABLE VIEW -->
  <div id="tableDiv" style="display:none">
    <div class="filter-bar">
      <input type="search" id="q" placeholder="Search name, property, contact…" oninput="render()">
      <select id="fStage" onchange="render()">
        <option value="">All stages</option>
        <option value="contact">Initial Contact</option>
        <option value="visit">Property Visit</option>
        <option value="offer">Offer Sent</option>
        <option value="agreement">Agreement</option>
        <option value="setup">Setup / Onboarding</option>
        <option value="completed">Completed</option>
        <option value="declined">Declined</option>
      </select>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>Owner / Lead</th>
          <th>Property</th>
          <th>Stage</th>
          <th>Contact Date</th>
          <th>Last Updated</th>
          <th>Notes</th>
          <th style="width:90px"></th>
        </tr></thead>
        <tbody id="tBody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- FORM MODAL -->
<div class="modal-overlay" id="formModal">
  <div class="modal" style="max-width:620px">
    <div class="modal-header">
      <h2 id="formTitle">Add Lead</h2>
      <button class="modal-close" onclick="closeModal('formModal')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="f_id">
      <div class="form-grid">
        <div class="form-group form-span-2"><label>Owner / Lead Name *</label><input id="f_name" placeholder="Full name"></div>
        <div class="form-group"><label>Phone</label><input id="f_phone" type="tel"></div>
        <div class="form-group"><label>Email</label><input id="f_email" type="email"></div>
        <div class="form-group form-span-2"><label>Property Address / Description</label><input id="f_property" placeholder="Address or brief description"></div>
        <div class="form-group"><label>Stage</label>
          <select id="f_stage">
            <option value="contact">Initial Contact</option>
            <option value="visit">Property Visit</option>
            <option value="offer">Offer Sent</option>
            <option value="agreement">Agreement</option>
            <option value="setup">Setup / Onboarding</option>
            <option value="completed">Completed</option>
            <option value="declined">Declined</option>
          </select>
        </div>
        <div class="form-group"><label>Contact Date</label><input type="date" id="f_contactDate"></div>
        <div class="form-group form-span-2"><label>Next Action</label><input id="f_nextAction" placeholder="What needs to happen next?"></div>
        <div class="form-group form-span-2"><label>Notes</label><textarea id="f_notes" rows="3"></textarea></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger btn-sm" id="fDeleteBtn" onclick="deleteCurrent()" style="display:none;margin-right:auto">🗑</button>
      <button class="btn btn-outline" onclick="closeModal('formModal')">Cancel</button>
      <button class="btn btn-primary" onclick="save()">Save Lead</button>
    </div>
  </div>
</div>

<script src="erp-base.js"></script>
<script>
let onboardings = [];
const STAGES = [
  { key:'contact',   label:'Initial Contact' },
  { key:'visit',     label:'Property Visit' },
  { key:'offer',     label:'Offer Sent' },
  { key:'agreement', label:'Agreement' },
  { key:'setup',     label:'Setup' },
  { key:'completed', label:'Completed' },
  { key:'declined',  label:'Declined' },
];

async function init() {
  const res = await SyncStore.load('zesty_onboardings', 'onboardings');
  onboardings = res.data;
  renderStats(); renderPipeline(); renderTable();
}
init();

function renderStats() {
  const active = onboardings.filter(o=>!['completed','declined'].includes(o.stage)).length;
  document.getElementById('st-active').textContent = active;
  document.getElementById('st-agreement').textContent = onboardings.filter(o=>o.stage==='agreement').length;
  document.getElementById('st-setup').textContent = onboardings.filter(o=>o.stage==='setup').length;
  document.getElementById('st-completed').textContent = onboardings.filter(o=>o.stage==='completed').length;
  document.getElementById('st-declined').textContent = onboardings.filter(o=>o.stage==='declined').length;
}

function renderPipeline() {
  const board = document.getElementById('pipelineBoard');
  board.innerHTML = STAGES.map(s => {
    const cards = onboardings.filter(o => o.stage === s.key);
    return `<div class="pipe-col stage-${s.key}">
      <div class="pipe-header">${s.label} <span style="margin-left:6px;opacity:.6">${cards.length}</span></div>
      <div class="pipe-body">
        ${cards.length ? cards.map(o => `<div class="pipe-card" onclick="editOnboarding('${o.id}')">
          <div class="pipe-card-name">${o.name||'—'}</div>
          ${o.property?`<div class="pipe-card-sub">${o.property.slice(0,40)}</div>`:''}
          ${o.nextAction?`<div class="pipe-card-sub" style="color:var(--teal)">→ ${o.nextAction.slice(0,40)}</div>`:''}
          <div class="pipe-card-date">${fmtDate(o.contactDate)||'—'}</div>
        </div>`).join('') : '<div style="padding:16px;text-align:center;font-size:12px;color:var(--text-muted)">Empty</div>'}
      </div>
    </div>`;
  }).join('');
}

function renderTable() {
  const q = (document.getElementById('q')?.value||'').toLowerCase();
  const fStage = document.getElementById('fStage')?.value||'';
  let list = onboardings.filter(o => {
    if (fStage && o.stage!==fStage) return false;
    if (q && !((o.name||'')+(o.property||'')+(o.phone||'')).toLowerCase().includes(q)) return false;
    return true;
  }).sort((a,b)=>((a.updatedAt||a.contactDate||'')<(b.updatedAt||b.contactDate||'')?1:-1));

  const STAGE_LABEL = Object.fromEntries(STAGES.map(s=>[s.key,s.label]));
  document.getElementById('tBody').innerHTML = !list.length
    ? `<tr class="empty-row"><td colspan="7"><div class="empty-icon">📋</div><p>No leads</p></td></tr>`
    : list.map(o=>`<tr>
        <td><strong>${o.name||'—'}</strong>${o.phone?`<br><small style="color:var(--text-muted)">${o.phone}</small>`:''}</td>
        <td style="font-size:12px">${o.property||'—'}</td>
        <td><span class="badge b-progress">${STAGE_LABEL[o.stage]||o.stage||'—'}</span></td>
        <td style="font-size:12px">${fmtDate(o.contactDate)}</td>
        <td style="font-size:11px;color:var(--text-muted)">${fmtDate(o.updatedAt)}</td>
        <td style="font-size:12px;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${o.notes||'—'}</td>
        <td><div class="table-actions">
          <button class="btn btn-teal btn-xs" onclick="editOnboarding('${o.id}')">✏️</button>
          <button class="btn btn-danger btn-xs" onclick="confirmDel('${o.id}')">🗑</button>
        </div></td>
      </tr>`).join('');
}

function toggleView() {
  const v = document.getElementById('pipelineView').value;
  document.getElementById('pipelineDiv').style.display = v==='pipeline'?'':'none';
  document.getElementById('tableDiv').style.display = v==='table'?'':'none';
}

function openAdd() { document.getElementById('formTitle').textContent='Add Lead'; document.getElementById('fDeleteBtn').style.display='none'; clearForm(); openModal('formModal'); }
function editOnboarding(id) {
  const o=onboardings.find(x=>x.id===id); if(!o)return;
  document.getElementById('formTitle').textContent='Edit Lead'; document.getElementById('fDeleteBtn').style.display='';
  ['id','name','phone','email','property','stage','contactDate','nextAction','notes'].forEach(f=>{const el=document.getElementById('f_'+f);if(el)el.value=o[f]||'';});
  openModal('formModal');
}
function clearForm() {
  ['id','name','phone','email','property','contactDate','nextAction','notes'].forEach(f=>{const el=document.getElementById('f_'+f);if(el)el.value='';});
  document.getElementById('f_stage').value='contact';
  document.getElementById('f_contactDate').value=new Date().toISOString().slice(0,10);
}

async function save() {
  const name=document.getElementById('f_name').value.trim();
  if(!name){showToast('Name required','error');return;}
  const id=document.getElementById('f_id').value||genId('onb');
  const record={id,updatedAt:new Date().toISOString()};
  ['name','phone','email','property','stage','contactDate','nextAction','notes'].forEach(f=>{record[f]=document.getElementById('f_'+f)?.value||'';});
  const existing=onboardings.find(o=>o.id===id);
  if(existing)Object.assign(existing,record);else onboardings.push(record);
  closeModal('formModal'); renderStats(); renderPipeline(); renderTable();
  await SyncStore.saveOne('zesty_onboardings','onboardings',record,onboardings);
  showToast('✓ Saved','success');
}

function deleteCurrent() { const id=document.getElementById('f_id').value; if(!id)return; closeModal('formModal'); confirmDel(id); }
function confirmDel(id) {
  const o=onboardings.find(x=>x.id===id); if(!o)return;
  showConfirm('🗑️','Delete Lead?',`Delete "${o.name}"?`,'btn-danger','Delete',async()=>{
    onboardings=onboardings.filter(x=>x.id!==id); await SyncStore.deleteOne('zesty_onboardings','onboardings',id,onboardings);
    renderStats(); renderPipeline(); renderTable(); showToast('Deleted','error');
  });
}
</script>
<script src="erp-nav.js"></script>
</body>
</html>
