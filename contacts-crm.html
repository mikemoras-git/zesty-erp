<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Zesty ERP — Contacts</title>
<link rel="stylesheet" href="erp-style.css">
</head>
<body>
<div class="container">
  <div class="page-title-bar">
    <div><h1>Contacts</h1><p>Suppliers, contractors, service providers and general contacts</p></div>
    <div class="page-actions">
      <div class="sync-status"><span class="sync-dot" id="syncDot"></span><span>Connected</span></div>
      <button class="btn btn-outline btn-sm" onclick="exportCSV()">↓ Export</button>
      <button class="btn btn-primary" onclick="openAdd()">+ Add Contact</button>
    </div>
  </div>

  <div class="stats-bar">
    <div class="stat-card"><div class="stat-label">Total</div><div class="stat-value" id="st-total">—</div></div>
    <div class="stat-card" onclick="setCategory('Supplier')"><div class="stat-label">Suppliers</div><div class="stat-value gold" id="st-supplier">—</div></div>
    <div class="stat-card" onclick="setCategory('Contractor')"><div class="stat-label">Contractors</div><div class="stat-value" style="color:var(--info)" id="st-contractor">—</div></div>
    <div class="stat-card" onclick="setCategory('Service')"><div class="stat-label">Services</div><div class="stat-value success" id="st-service">—</div></div>
  </div>

  <div class="filter-bar">
    <input type="search" id="q" placeholder="Search name, company, category…" oninput="render()">
    <select id="fCategory" onchange="render()">
      <option value="">All categories</option>
      <option value="Supplier">Supplier</option>
      <option value="Contractor">Contractor</option>
      <option value="Service">Service Provider</option>
      <option value="Authority">Authority / Office</option>
      <option value="Other">Other</option>
    </select>
    <div class="filter-spacer"></div>
    <label style="font-size:12px;color:var(--text-muted)"><input type="checkbox" id="showArch" onchange="render()"> Archived</label>
  </div>

  <div class="table-wrap">
    <div class="table-header"><h3 id="tableCount">Contacts</h3></div>
    <table>
      <thead><tr>
        <th onclick="sortBy('name')">Name / Company <span class="sa">↕</span></th>
        <th onclick="sortBy('category')">Category <span class="sa">↕</span></th>
        <th>Phone</th>
        <th>Email</th>
        <th>Specialty / Role</th>
        <th style="width:100px"></th>
      </tr></thead>
      <tbody id="tBody"><tr class="empty-row"><td colspan="6"><div class="empty-icon">📇</div><p>Loading contacts…</p></td></tr></tbody>
    </table>
    <div class="pagination" id="pagination"></div>
  </div>
</div>

<!-- FORM MODAL -->
<div class="modal-overlay" id="formModal">
  <div class="modal" style="max-width:620px">
    <div class="modal-header">
      <h2 id="formTitle">Add Contact</h2>
      <button class="modal-close" onclick="closeModal('formModal')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="f_id">
      <div class="form-grid">
        <div class="form-group form-span-2"><label>Name / Company *</label><input id="f_name" placeholder="Contact or company name"></div>
        <div class="form-group"><label>Category</label>
          <select id="f_category">
            <option value="Supplier">Supplier</option>
            <option value="Contractor">Contractor</option>
            <option value="Service">Service Provider</option>
            <option value="Authority">Authority / Office</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="form-group"><label>Specialty / Role</label><input id="f_specialty" placeholder="e.g. Plumber, Electrician"></div>
        <div class="form-group"><label>Phone</label><input id="f_phone" type="tel"></div>
        <div class="form-group"><label>Phone 2</label><input id="f_phone2" type="tel"></div>
        <div class="form-group"><label>Email</label><input id="f_email" type="email"></div>
        <div class="form-group"><label>Website</label><input id="f_website" type="url" placeholder="https://..."></div>
        <div class="form-group"><label>Tax Number</label><input id="f_taxNumber"></div>
        <div class="form-group"><label>Contact Person</label><input id="f_contactPerson" placeholder="Name of person to call"></div>
        <div class="form-group form-span-2"><label>Address</label><input id="f_address"></div>
        <div class="form-group form-span-2"><label>Notes</label><textarea id="f_notes" rows="3"></textarea></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger btn-sm" id="fDeleteBtn" onclick="deleteCurrent()" style="display:none;margin-right:auto">🗑 Delete</button>
      <button class="btn btn-outline" onclick="closeModal('formModal')">Cancel</button>
      <button class="btn btn-primary" onclick="save()">Save Contact</button>
    </div>
  </div>
</div>

<script src="erp-base.js"></script>
<script>
let contacts = [];
let sort = { field: 'name', dir: 1 };
let page = 1;
const PAGE = 25;

const CAT_BADGE = { Supplier:'b-pending', Contractor:'b-progress', Service:'b-active', Authority:'b-company', Other:'b-individual' };

async function init() {
  const res = await SyncStore.load('zesty_contacts', 'contacts');
  contacts = res.data;
  render();
  startPoll('contacts', 'zesty_contacts', 30000, rows => { contacts = rows; render(); });
}
init();

function render() {
  const q = (document.getElementById('q').value || '').toLowerCase();
  const fCat = document.getElementById('fCategory').value;
  const showArch = document.getElementById('showArch').checked;
  let list = contacts.filter(c => {
    if (!showArch && c.archived) return false;
    if (fCat && c.category !== fCat) return false;
    if (q && !((c.name||'')+(c.category||'')+(c.specialty||'')+(c.email||'')+(c.phone||'')).toLowerCase().includes(q)) return false;
    return true;
  });
  list.sort((a,b) => ((a[sort.field]||'').toLowerCase() < (b[sort.field]||'').toLowerCase() ? -sort.dir : sort.dir));

  const total = list.length;
  const pages = Math.ceil(total / PAGE) || 1;
  if (page > pages) page = 1;
  const slice = list.slice((page-1)*PAGE, page*PAGE);

  document.getElementById('st-total').textContent = contacts.filter(c=>!c.archived).length;
  document.getElementById('st-supplier').textContent = contacts.filter(c=>c.category==='Supplier').length;
  document.getElementById('st-contractor').textContent = contacts.filter(c=>c.category==='Contractor').length;
  document.getElementById('st-service').textContent = contacts.filter(c=>c.category==='Service').length;
  document.getElementById('tableCount').textContent = `${total} Contact${total!==1?'s':''}`;

  const tbody = document.getElementById('tBody');
  tbody.innerHTML = !slice.length ? `<tr class="empty-row"><td colspan="6"><div class="empty-icon">📇</div><p>No contacts found</p></td></tr>` :
    slice.map(c => `<tr class="${c.archived?'archived':''}">
      <td><strong>${c.name||'—'}</strong>${c.contactPerson?`<br><small style="color:var(--text-muted)">${c.contactPerson}</small>`:''}</td>
      <td><span class="badge ${CAT_BADGE[c.category]||'b-individual'}">${c.category||'—'}</span></td>
      <td style="font-size:12px">${c.phone||c.phone2||'—'}</td>
      <td style="font-size:12px">${c.email||'—'}</td>
      <td style="font-size:12px">${c.specialty||'—'}</td>
      <td><div class="table-actions">
        <button class="btn btn-teal btn-xs" onclick="edit('${c.id}')">✏️</button>
        <button class="btn btn-archive btn-xs" onclick="toggleArchive('${c.id}')">${c.archived?'↩':'📦'}</button>
        <button class="btn btn-danger btn-xs" onclick="confirmDel('${c.id}')">🗑</button>
      </div></td>
    </tr>`).join('');

  const pg = document.getElementById('pagination');
  if (pages <= 1) { pg.innerHTML=''; return; }
  let h = `<span>${total} total</span><div class="pagination-spacer"></div>`;
  for (let i=1;i<=pages;i++) {
    if(i===1||i===pages||Math.abs(i-page)<=1) h+=`<button class="page-btn ${i===page?'active':''}" onclick="page=${i};render()">${i}</button>`;
    else if(Math.abs(i-page)===2) h+='<span>…</span>';
  }
  pg.innerHTML=h;
}

function sortBy(f) { if(sort.field===f)sort.dir*=-1;else{sort.field=f;sort.dir=1;} render(); }
function setCategory(c) { document.getElementById('fCategory').value=c; page=1; render(); }

function openAdd() { document.getElementById('formTitle').textContent='Add Contact'; document.getElementById('fDeleteBtn').style.display='none'; clearForm(); openModal('formModal'); }
function edit(id) {
  const c = contacts.find(x=>x.id===id); if(!c) return;
  document.getElementById('formTitle').textContent='Edit Contact'; document.getElementById('fDeleteBtn').style.display='';
  ['id','name','category','specialty','phone','phone2','email','website','taxNumber','contactPerson','address','notes'].forEach(f=>{const el=document.getElementById('f_'+f);if(el)el.value=c[f]||'';});
  openModal('formModal');
}
function clearForm() {
  ['id','name','specialty','phone','phone2','email','website','taxNumber','contactPerson','address','notes'].forEach(f=>{const el=document.getElementById('f_'+f);if(el)el.value='';});
  document.getElementById('f_category').value='Supplier';
}

async function save() {
  const name = document.getElementById('f_name').value.trim();
  if(!name){showToast('Name is required','error');return;}
  const id = document.getElementById('f_id').value || genId('contact');
  const record = {id};
  ['name','category','specialty','phone','phone2','email','website','taxNumber','contactPerson','address','notes'].forEach(f=>{record[f]=document.getElementById('f_'+f)?.value||'';});
  const existing = contacts.find(c=>c.id===id);
  if(existing) Object.assign(existing,record); else contacts.push(record);
  closeModal('formModal'); render();
  await SyncStore.saveOne('zesty_contacts','contacts',record,contacts);
  showToast(existing?'✓ Contact updated':'✓ Contact added','success');
}

function deleteCurrent() { const id=document.getElementById('f_id').value; if(!id)return; closeModal('formModal'); confirmDel(id); }
function confirmDel(id) {
  const c=contacts.find(x=>x.id===id); if(!c)return;
  showConfirm('🗑️','Delete Contact?',`Delete "${c.name}"?`,'btn-danger','Delete',async()=>{
    contacts=contacts.filter(x=>x.id!==id);
    await SyncStore.deleteOne('zesty_contacts','contacts',id,contacts);
    render(); showToast('Deleted','error');
  });
}
async function toggleArchive(id) {
  const c=contacts.find(x=>x.id===id); if(!c)return;
  c.archived=!c.archived; render();
  await SyncStore.saveOne('zesty_contacts','contacts',c,contacts);
  showToast(c.archived?'📦 Archived':'↩ Restored','info');
}

function exportCSV() {
  const rows=[['Name','Category','Specialty','Phone','Email','Notes']];
  contacts.forEach(c=>rows.push([c.name||'',c.category||'',c.specialty||'',c.phone||'',c.email||'',c.notes||'']));
  const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a'); a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv); a.download='contacts_'+new Date().toISOString().slice(0,10)+'.csv'; a.click();
}
</script>
<script src="erp-nav.js"></script>
</body>
</html>
