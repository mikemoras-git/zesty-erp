<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Zesty ERP — Tasks</title>
<link rel="stylesheet" href="erp-style.css">
<style>
.priority-High{color:#c0392b;font-weight:700}
.priority-Medium{color:#e67e22;font-weight:600}
.priority-Low{color:#6b7e7b}
.subtask-list{list-style:none;margin-top:10px}
.subtask-item{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);font-size:13px}
.subtask-item:last-child{border:none}
.subtask-item input[type=checkbox]{width:15px;height:15px;cursor:pointer;accent-color:var(--teal)}
.subtask-item.done span{text-decoration:line-through;color:var(--text-muted)}
.progress-bar{height:5px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:4px}
.progress-fill{height:100%;background:var(--teal);border-radius:3px;transition:width .3s}
.row-expand{background:#f7fbfa !important}
.subtask-row td{padding:8px 14px 14px 44px !important;background:#f7fbfa}
</style>
</head>
<body>
<div class="container">
  <div class="page-title-bar">
    <div>
      <h1>Task Tracker</h1>
      <p>Internal tasks, assignments and to-dos across the team</p>
    </div>
    <div class="page-actions">
      <div class="sync-status"><span class="sync-dot" id="syncDot"></span><span>Connected</span></div>
      <button class="btn btn-outline btn-sm" onclick="exportCSV()">↓ Export</button>
      <button class="btn btn-primary" onclick="openAdd()">+ Add Task</button>
    </div>
  </div>

  <div class="stats-bar">
    <div class="stat-card" onclick="setFilter('status','Open')"><div class="stat-label">Open</div><div class="stat-value" style="color:var(--warning)" id="st-open">—</div></div>
    <div class="stat-card" onclick="setFilter('status','In Progress')"><div class="stat-label">In Progress</div><div class="stat-value" style="color:var(--info)" id="st-prog">—</div></div>
    <div class="stat-card" onclick="setFilter('status','Done')"><div class="stat-label">Done</div><div class="stat-value success" id="st-done">—</div></div>
    <div class="stat-card" onclick="setFilter('priority','High')"><div class="stat-label">High Priority</div><div class="stat-value danger" id="st-high">—</div></div>
    <div class="stat-card" onclick="clearFilter()"><div class="stat-label">Total</div><div class="stat-value" id="st-total">—</div></div>
  </div>

  <div class="filter-bar">
    <input type="search" id="q" placeholder="Search task title, assignee…" oninput="render()">
    <select id="fStatus" onchange="render()">
      <option value="">All statuses</option>
      <option value="Open">Open</option>
      <option value="In Progress">In Progress</option>
      <option value="Done">Done</option>
    </select>
    <select id="fPriority" onchange="render()">
      <option value="">All priorities</option>
      <option value="High">High</option>
      <option value="Medium">Medium</option>
      <option value="Low">Low</option>
    </select>
    <select id="fAssignee" onchange="render()"><option value="">All assignees</option></select>
    <div class="filter-spacer"></div>
    <label style="font-size:12px;color:var(--text-muted)"><input type="checkbox" id="showDone" onchange="render()"> Show done</label>
  </div>

  <div class="table-wrap">
    <div class="table-header"><h3 id="tableCount">Tasks</h3></div>
    <table>
      <thead><tr>
        <th style="width:28px"></th>
        <th onclick="sortBy('title')">Title <span class="sa" id="sa-title">↕</span></th>
        <th onclick="sortBy('priority')">Priority <span class="sa" id="sa-priority">↕</span></th>
        <th onclick="sortBy('assignee')">Assignee <span class="sa" id="sa-assignee">↕</span></th>
        <th onclick="sortBy('dueDate')">Due Date <span class="sa" id="sa-dueDate">↕</span></th>
        <th onclick="sortBy('status')">Status <span class="sa" id="sa-status">↕</span></th>
        <th style="width:110px"></th>
      </tr></thead>
      <tbody id="tBody"><tr class="empty-row"><td colspan="7"><div class="empty-icon">✅</div><p>Loading tasks…</p></td></tr></tbody>
    </table>
    <div class="pagination" id="pagination"></div>
  </div>
</div>

<!-- FORM MODAL -->
<div class="modal-overlay" id="formModal">
  <div class="modal" style="max-width:640px">
    <div class="modal-header">
      <h2 id="formTitle">Add Task</h2>
      <button class="modal-close" onclick="closeModal('formModal')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="f_id">
      <div class="form-grid">
        <div class="form-group form-span-2">
          <label>Task Title *</label>
          <input id="f_title" placeholder="What needs to be done?">
        </div>
        <div class="form-group">
          <label>Status</label>
          <select id="f_status">
            <option value="Open">Open</option>
            <option value="In Progress">In Progress</option>
            <option value="Done">Done</option>
          </select>
        </div>
        <div class="form-group">
          <label>Priority</label>
          <select id="f_priority">
            <option value="Medium">Medium</option>
            <option value="High">High</option>
            <option value="Low">Low</option>
          </select>
        </div>
        <div class="form-group">
          <label>Assignee</label>
          <input id="f_assignee" placeholder="Person responsible">
        </div>
        <div class="form-group">
          <label>Due Date</label>
          <input type="date" id="f_dueDate">
        </div>
        <div class="form-group form-span-2">
          <label>Description</label>
          <textarea id="f_description" rows="3" placeholder="Optional details…"></textarea>
        </div>
      </div>

      <!-- Subtasks -->
      <div style="margin-top:20px">
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text-muted);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)">Subtasks</div>
        <ul class="subtask-list" id="subtaskList"></ul>
        <div style="display:flex;gap:8px;margin-top:8px">
          <input id="newSubtask" placeholder="Add subtask…" style="flex:1;padding:7px 12px;border:1px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;outline:none" onkeydown="if(event.key==='Enter'){event.preventDefault();addSubtask()}">
          <button class="btn btn-outline btn-sm" onclick="addSubtask()">+ Add</button>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger btn-sm" id="fDeleteBtn" onclick="deleteCurrent()" style="display:none;margin-right:auto">🗑 Delete</button>
      <button class="btn btn-outline" onclick="closeModal('formModal')">Cancel</button>
      <button class="btn btn-primary" onclick="save()">Save Task</button>
    </div>
  </div>
</div>

<script src="erp-base.js"></script>
<script>
let tasks = [];
let sort = { field: 'dueDate', dir: 1 };
let page = 1;
const PAGE = 25;
let subtasks = [];
let expandedId = null;

async function init() {
  const res = await SyncStore.load('zesty_tasks', 'tasks');
  tasks = res.data;
  populateAssignees();
  render();
  startPoll('tasks', 'zesty_tasks', 30000, rows => { tasks = rows; populateAssignees(); render(); });
}
init();

function populateAssignees() {
  const sel = document.getElementById('fAssignee');
  const cur = sel.value;
  const names = [...new Set(tasks.map(t => t.assignee).filter(Boolean))].sort();
  sel.innerHTML = '<option value="">All assignees</option>' + names.map(n => `<option value="${n}">${n}</option>`).join('');
  sel.value = cur;
}

function statusBadge(s) {
  if (s === 'Done') return `<span class="badge b-active">Done</span>`;
  if (s === 'In Progress') return `<span class="badge b-progress">In Progress</span>`;
  return `<span class="badge b-pending">Open</span>`;
}

function isOverdue(t) {
  return t.dueDate && t.status !== 'Done' && new Date(t.dueDate) < new Date();
}

function render() {
  const q = (document.getElementById('q').value || '').toLowerCase();
  const fStatus = document.getElementById('fStatus').value;
  const fPriority = document.getElementById('fPriority').value;
  const fAssignee = document.getElementById('fAssignee').value;
  const showDone = document.getElementById('showDone').checked;

  let list = tasks.filter(t => {
    if (!showDone && t.status === 'Done') return false;
    if (fStatus && t.status !== fStatus) return false;
    if (fPriority && t.priority !== fPriority) return false;
    if (fAssignee && t.assignee !== fAssignee) return false;
    if (q && !((t.title || '') + ' ' + (t.assignee || '') + ' ' + (t.description || '')).toLowerCase().includes(q)) return false;
    return true;
  });

  list.sort((a, b) => {
    let av = a[sort.field] || '', bv = b[sort.field] || '';
    // Priority sort order
    if (sort.field === 'priority') {
      const order = { High: 0, Medium: 1, Low: 2 };
      av = order[av] ?? 1; bv = order[bv] ?? 1;
      return (av - bv) * sort.dir;
    }
    return (av < bv ? -1 : av > bv ? 1 : 0) * sort.dir;
  });

  const total = list.length;
  const pages = Math.ceil(total / PAGE) || 1;
  if (page > pages) page = 1;
  const slice = list.slice((page - 1) * PAGE, page * PAGE);

  // Stats
  document.getElementById('st-open').textContent = tasks.filter(t => t.status === 'Open').length;
  document.getElementById('st-prog').textContent = tasks.filter(t => t.status === 'In Progress').length;
  document.getElementById('st-done').textContent = tasks.filter(t => t.status === 'Done').length;
  document.getElementById('st-high').textContent = tasks.filter(t => t.priority === 'High' && t.status !== 'Done').length;
  document.getElementById('st-total').textContent = tasks.length;
  document.getElementById('tableCount').textContent = `${total} Task${total !== 1 ? 's' : ''}`;

  const tbody = document.getElementById('tBody');
  if (!slice.length) {
    tbody.innerHTML = `<tr class="empty-row"><td colspan="7"><div class="empty-icon">✅</div><p>No tasks found</p></td></tr>`;
  } else {
    const rows = [];
    slice.forEach(t => {
      const overdue = isOverdue(t);
      const subs = t.subtasks || [];
      const subDone = subs.filter(s => s.done).length;
      const hasExpand = expandedId === t.id;
      rows.push(`<tr class="${hasExpand ? 'row-expand' : ''}">
        <td style="padding:0 0 0 12px;width:28px">
          ${subs.length ? `<button style="background:none;border:none;cursor:pointer;font-size:13px;padding:4px" onclick="toggleExpand('${t.id}')">${hasExpand ? '▼' : '▶'}</button>` : ''}
        </td>
        <td>
          <div style="font-weight:500">${t.title || '—'}</div>
          ${t.description ? `<div style="font-size:11px;color:var(--text-muted);margin-top:2px">${t.description.slice(0,60)}${t.description.length > 60 ? '…' : ''}</div>` : ''}
          ${subs.length ? `<div style="margin-top:4px;font-size:10px;color:var(--text-muted)">${subDone}/${subs.length} subtasks
            <div class="progress-bar" style="width:100px"><div class="progress-fill" style="width:${subs.length ? Math.round(subDone/subs.length*100) : 0}%"></div></div>
          </div>` : ''}
        </td>
        <td><span class="priority-${t.priority || 'Medium'}">${t.priority || 'Medium'}</span></td>
        <td style="font-size:12px">${t.assignee || '—'}</td>
        <td style="font-size:12px;${overdue ? 'color:var(--danger);font-weight:600' : ''}">${fmtDate(t.dueDate)}${overdue ? ' ⚠' : ''}</td>
        <td>${statusBadge(t.status)}</td>
        <td>
          <div class="table-actions">
            <button class="btn btn-teal btn-xs" onclick="editTask('${t.id}')">✏️</button>
            ${t.status !== 'Done' ? `<button class="btn btn-success btn-xs" onclick="markDone('${t.id}')">✓</button>` : ''}
            <button class="btn btn-danger btn-xs" onclick="confirmDel('${t.id}')">🗑</button>
          </div>
        </td>
      </tr>`);
      // Expanded subtask row
      if (hasExpand && subs.length) {
        rows.push(`<tr class="subtask-row"><td colspan="7">
          <ul class="subtask-list">
            ${subs.map((s, i) => `<li class="subtask-item ${s.done ? 'done' : ''}">
              <input type="checkbox" ${s.done ? 'checked' : ''} onchange="toggleSubDone('${t.id}', ${i})">
              <span>${s.text}</span>
            </li>`).join('')}
          </ul>
        </td></tr>`);
      }
    });
    tbody.innerHTML = rows.join('');
  }

  // Pagination
  const pg = document.getElementById('pagination');
  if (pages <= 1) { pg.innerHTML = ''; return; }
  let h = `<span>${total} total</span><div class="pagination-spacer"></div>`;
  for (let i = 1; i <= pages; i++) {
    if (i === 1 || i === pages || Math.abs(i - page) <= 1) h += `<button class="page-btn ${i === page ? 'active' : ''}" onclick="page=${i};render()">${i}</button>`;
    else if (Math.abs(i - page) === 2) h += '<span>…</span>';
  }
  pg.innerHTML = h;
}

function sortBy(f) {
  if (sort.field === f) sort.dir *= -1; else { sort.field = f; sort.dir = 1; }
  render();
}
function setFilter(k, v) {
  if (k === 'status') document.getElementById('fStatus').value = v;
  if (k === 'priority') document.getElementById('fPriority').value = v;
  page = 1; render();
}
function clearFilter() {
  document.getElementById('fStatus').value = '';
  document.getElementById('fPriority').value = '';
  document.getElementById('fAssignee').value = '';
  document.getElementById('q').value = '';
  page = 1; render();
}

function toggleExpand(id) {
  expandedId = expandedId === id ? null : id;
  render();
}

async function toggleSubDone(taskId, idx) {
  const t = tasks.find(x => x.id === taskId);
  if (!t || !t.subtasks) return;
  t.subtasks[idx].done = !t.subtasks[idx].done;
  render();
  await SyncStore.saveOne('zesty_tasks', 'tasks', t, tasks);
}

async function markDone(id) {
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  t.status = 'Done';
  render();
  await SyncStore.saveOne('zesty_tasks', 'tasks', t, tasks);
  showToast('✓ Task marked done', 'success');
}

// ── FORM ──
function openAdd() {
  document.getElementById('formTitle').textContent = 'Add Task';
  document.getElementById('fDeleteBtn').style.display = 'none';
  clearForm();
  openModal('formModal');
}

function editTask(id) {
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  document.getElementById('formTitle').textContent = 'Edit Task';
  document.getElementById('fDeleteBtn').style.display = '';
  document.getElementById('f_id').value = t.id;
  document.getElementById('f_title').value = t.title || '';
  document.getElementById('f_status').value = t.status || 'Open';
  document.getElementById('f_priority').value = t.priority || 'Medium';
  document.getElementById('f_assignee').value = t.assignee || '';
  document.getElementById('f_dueDate').value = t.dueDate || '';
  document.getElementById('f_description').value = t.description || '';
  subtasks = (t.subtasks || []).map(s => ({ ...s }));
  renderSubtaskForm();
  openModal('formModal');
}

function clearForm() {
  document.getElementById('f_id').value = '';
  document.getElementById('f_title').value = '';
  document.getElementById('f_status').value = 'Open';
  document.getElementById('f_priority').value = 'Medium';
  document.getElementById('f_assignee').value = '';
  document.getElementById('f_dueDate').value = '';
  document.getElementById('f_description').value = '';
  subtasks = [];
  renderSubtaskForm();
}

function renderSubtaskForm() {
  document.getElementById('subtaskList').innerHTML = subtasks.map((s, i) =>
    `<li class="subtask-item ${s.done ? 'done' : ''}">
      <input type="checkbox" ${s.done ? 'checked' : ''} onchange="subtasks[${i}].done=this.checked;renderSubtaskForm()">
      <span style="flex:1">${s.text}</span>
      <button style="background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:13px" onclick="subtasks.splice(${i},1);renderSubtaskForm()">✕</button>
    </li>`
  ).join('');
}

function addSubtask() {
  const inp = document.getElementById('newSubtask');
  const text = inp.value.trim();
  if (!text) return;
  subtasks.push({ text, done: false });
  inp.value = '';
  renderSubtaskForm();
}

async function save() {
  const title = document.getElementById('f_title').value.trim();
  if (!title) { showToast('Task title is required', 'error'); return; }
  const id = document.getElementById('f_id').value || genId('task');
  const record = {
    id,
    title,
    status: document.getElementById('f_status').value,
    priority: document.getElementById('f_priority').value,
    assignee: document.getElementById('f_assignee').value,
    dueDate: document.getElementById('f_dueDate').value,
    description: document.getElementById('f_description').value,
    subtasks: subtasks.slice(),
    updatedAt: new Date().toISOString()
  };
  if (!record.createdAt) record.createdAt = record.updatedAt;
  const existing = tasks.find(t => t.id === id);
  if (existing) Object.assign(existing, record); else tasks.push(record);
  closeModal('formModal');
  populateAssignees();
  render();
  await SyncStore.saveOne('zesty_tasks', 'tasks', record, tasks);
  showToast(existing ? '✓ Task updated' : '✓ Task created', 'success');
}

function deleteCurrent() {
  const id = document.getElementById('f_id').value;
  if (!id) return;
  closeModal('formModal');
  confirmDel(id);
}

function confirmDel(id) {
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  showConfirm('🗑️', 'Delete Task?', `Delete "${t.title}"? This cannot be undone.`, 'btn-danger', 'Delete', async () => {
    tasks = tasks.filter(x => x.id !== id);
    await SyncStore.deleteOne('zesty_tasks', 'tasks', id, tasks);
    render();
    showToast('Task deleted', 'error');
  });
}

function exportCSV() {
  const rows = [['Title', 'Status', 'Priority', 'Assignee', 'Due Date', 'Description']];
  tasks.forEach(t => rows.push([t.title || '', t.status || '', t.priority || '', t.assignee || '', t.dueDate || '', t.description || '']));
  const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = 'tasks_' + new Date().toISOString().slice(0, 10) + '.csv';
  a.click();
}
</script>
<script src="erp-nav.js"></script>
</body>
</html>
