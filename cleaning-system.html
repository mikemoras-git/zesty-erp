<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Zesty ERP — Cleaning</title>
<link rel="stylesheet" href="erp-style.css">
<style>
.cleaner-chip{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;background:var(--cream);border:1px solid var(--border);border-radius:20px;font-size:12px;margin:2px;cursor:pointer;transition:all .15s}
.cleaner-chip:hover,.cleaner-chip.selected{background:var(--teal);color:#fff;border-color:var(--teal)}
.shift-indicator{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:4px}
.shift-morning{background:#f39c12}
.shift-afternoon{background:#3498db}
.shift-full{background:#27ae60}
.cleaning-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:10px;transition:all .18s}
.cleaning-card:hover{box-shadow:var(--shadow);border-color:var(--teal-light)}
.cleaning-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.cleaning-card-prop{font-weight:600;font-size:14px}
.cleaning-card-date{font-size:12px;color:var(--text-muted)}
.cleaning-card-body{display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:12px}
.cc-field label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);display:block;margin-bottom:2px}
</style>
</head>
<body>
<div class="container">
  <div class="page-title-bar">
    <div><h1>Cleaning System</h1><p>Schedule and track property cleaning assignments and staff</p></div>
    <div class="page-actions">
      <div class="sync-status"><span class="sync-dot" id="syncDot"></span><span>Connected</span></div>
      <button class="btn btn-outline btn-sm" onclick="exportCSV()">↓ Export</button>
      <button class="btn btn-primary" onclick="openAdd()">+ New Assignment</button>
    </div>
  </div>

  <div class="stats-bar">
    <div class="stat-card" onclick="setFilter('Scheduled')"><div class="stat-label">Scheduled</div><div class="stat-value gold" id="st-sched">—</div></div>
    <div class="stat-card" onclick="setFilter('In Progress')"><div class="stat-label">In Progress</div><div class="stat-value" style="color:var(--info)" id="st-prog">—</div></div>
    <div class="stat-card" onclick="setFilter('Done')"><div class="stat-label">Done</div><div class="stat-value success" id="st-done">—</div></div>
    <div class="stat-card" onclick="clearFilter()"><div class="stat-label">Active Staff</div><div class="stat-value" id="st-staff">—</div></div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('assignments',this)">Assignments</button>
    <button class="tab" onclick="switchTab('staff',this)">Cleaning Staff</button>
  </div>

  <!-- ASSIGNMENTS -->
  <div id="tab-assignments">
    <div class="filter-bar">
      <input type="search" id="q" placeholder="Search property, cleaner…" oninput="render()">
      <input type="date" id="fDate" onchange="render()">
      <select id="fStatus" onchange="render()">
        <option value="">All statuses</option>
        <option value="Scheduled">Scheduled</option>
        <option value="In Progress">In Progress</option>
        <option value="Done">Done</option>
        <option value="Cancelled">Cancelled</option>
      </select>
      <select id="fCleaner" onchange="render()"><option value="">All cleaners</option></select>
      <div class="filter-spacer"></div>
    </div>

    <div class="table-wrap">
      <div class="table-header"><h3 id="tableCount">Assignments</h3></div>
      <table>
        <thead><tr>
          <th onclick="sortBy('date')">Date <span class="sa">↕</span></th>
          <th onclick="sortBy('propertyName')">Property</th>
          <th>Assigned To</th>
          <th>Shift</th>
          <th onclick="sortBy('type')">Type</th>
          <th onclick="sortBy('status')">Status</th>
          <th>Notes</th>
          <th style="width:110px"></th>
        </tr></thead>
        <tbody id="tBody"><tr class="empty-row"><td colspan="8"><div class="empty-icon">🧹</div><p>Loading…</p></td></tr></tbody>
      </table>
      <div class="pagination" id="pagination"></div>
    </div>
  </div>

  <!-- STAFF -->
  <div id="tab-staff" style="display:none">
    <div style="display:flex;justify-content:flex-end;margin-bottom:16px">
      <button class="btn btn-primary" onclick="openAddStaff()">+ Add Cleaner</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>Name</th><th>Phone</th><th>Zone</th><th>Status</th><th style="width:80px"></th>
        </tr></thead>
        <tbody id="staffBody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- ASSIGNMENT MODAL -->
<div class="modal-overlay" id="formModal">
  <div class="modal" style="max-width:620px">
    <div class="modal-header">
      <h2 id="formTitle">New Assignment</h2>
      <button class="modal-close" onclick="closeModal('formModal')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="f_id">
      <div class="form-grid">
        <div class="form-group"><label>Date *</label><input type="date" id="f_date"></div>
        <div class="form-group"><label>Status</label>
          <select id="f_status">
            <option value="Scheduled">Scheduled</option>
            <option value="In Progress">In Progress</option>
            <option value="Done">Done</option>
            <option value="Cancelled">Cancelled</option>
          </select>
        </div>
        <div class="form-group form-span-2"><label>Property</label>
          <select id="f_propertyId" onchange="fillPropName()"><option value="">— Select Property —</option></select>
        </div>
        <div class="form-group form-span-2"><label>Assigned To</label>
          <select id="f_cleanerId" onchange="fillCleanerName()"><option value="">— Select Cleaner —</option></select>
        </div>
        <div class="form-group"><label>Shift</label>
          <select id="f_shift">
            <option value="Morning">Morning</option>
            <option value="Afternoon">Afternoon</option>
            <option value="Full Day">Full Day</option>
          </select>
        </div>
        <div class="form-group"><label>Type</label>
          <select id="f_type">
            <option value="Checkout">Checkout Clean</option>
            <option value="Deep Clean">Deep Clean</option>
            <option value="Standard">Standard</option>
            <option value="Pre-Arrival">Pre-Arrival</option>
            <option value="Post-Maintenance">Post-Maintenance</option>
          </select>
        </div>
        <div class="form-group"><label>Duration (hrs)</label><input type="number" id="f_hours" step="0.5" min="0.5" placeholder="2"></div>
        <div class="form-group"><label>Pay Rate (€/hr)</label><input type="number" id="f_rate" step="0.01" min="0" placeholder="8.00"></div>
        <div class="form-group form-span-2"><label>Notes</label><textarea id="f_notes" rows="2"></textarea></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger btn-sm" id="fDeleteBtn" onclick="deleteCurrent()" style="display:none;margin-right:auto">🗑</button>
      <button class="btn btn-outline" onclick="closeModal('formModal')">Cancel</button>
      <button class="btn btn-primary" onclick="save()">Save</button>
    </div>
  </div>
</div>

<!-- STAFF MODAL -->
<div class="modal-overlay" id="staffModal">
  <div class="modal" style="max-width:500px">
    <div class="modal-header">
      <h2 id="staffFormTitle">Add Cleaner</h2>
      <button class="modal-close" onclick="closeModal('staffModal')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="fs_id">
      <div class="form-grid">
        <div class="form-group"><label>First Name *</label><input id="fs_firstName"></div>
        <div class="form-group"><label>Last Name *</label><input id="fs_lastName"></div>
        <div class="form-group"><label>Phone</label><input id="fs_phone" type="tel"></div>
        <div class="form-group"><label>Zone</label><input id="fs_zone" placeholder="e.g. North, South"></div>
        <div class="form-group"><label>Status</label>
          <select id="fs_status"><option value="Active">Active</option><option value="Inactive">Inactive</option></select>
        </div>
        <div class="form-group"><label>Pay Rate (€/hr)</label><input type="number" id="fs_rate" step="0.01"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger btn-sm" id="fsDeleteBtn" onclick="deleteStaff()" style="display:none;margin-right:auto">🗑</button>
      <button class="btn btn-outline" onclick="closeModal('staffModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveStaff()">Save</button>
    </div>
  </div>
</div>

<script src="erp-base.js"></script>
<script>
let assignments = [], cleaners = [], propsList = [];
let sort = { field: 'date', dir: -1 };
let page = 1;
const PAGE = 20;

async function init() {
  const [aRes, cRes, pRes] = await Promise.all([
    SyncStore.load('zesty_cleaning', 'cleaning'),
    SyncStore.load('zesty_staff', 'staff'),
    SyncStore.load('zesty_properties', 'properties')
  ]);
  assignments = aRes.data;
  cleaners = cRes.data;
  propsList = pRes.data;
  populateSelects();
  render();
  renderStaff();
}
init();

function populateSelects() {
  const pSel = document.getElementById('f_propertyId');
  pSel.innerHTML = '<option value="">— Select Property —</option>' +
    propsList.filter(p=>!p.archived).sort((a,b)=>(a.name||'')<(b.name||'')?-1:1)
      .map(p=>`<option value="${p.id}">${p.name}</option>`).join('');

  const cSel = document.getElementById('f_cleanerId');
  const fSel = document.getElementById('fCleaner');
  const activeCl = cleaners.filter(c=>!c.archived&&c.status!=='Inactive');
  const opts = activeCl.map(c=>`<option value="${c.id}">${(c.firstName||'')+' '+(c.lastName||'')}</option>`).join('');
  cSel.innerHTML = '<option value="">— Select Cleaner —</option>' + opts;
  fSel.innerHTML = '<option value="">All cleaners</option>' + opts;
}

function fillPropName() {
  const id=document.getElementById('f_propertyId').value;
  const p=propsList.find(x=>x.id===id);
  if(p) document.getElementById('f_propertyName') && (document.getElementById('f_propertyName').value=p.name);
}
function fillCleanerName() {
  const id=document.getElementById('f_cleanerId').value;
  const c=cleaners.find(x=>x.id===id);
  if(c) document.getElementById('f_cleanerName') && (document.getElementById('f_cleanerName').value=((c.firstName||'')+' '+(c.lastName||'')).trim());
}

function switchTab(tab, btn) {
  document.getElementById('tab-assignments').style.display = tab==='assignments'?'':'none';
  document.getElementById('tab-staff').style.display = tab==='staff'?'':'none';
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
}

const SHIFT_DOT = { Morning:'shift-morning', Afternoon:'shift-afternoon', 'Full Day':'shift-full' };
function statusBadge(s){
  if(s==='Done')return '<span class="badge b-active">Done</span>';
  if(s==='In Progress')return '<span class="badge b-progress">In Progress</span>';
  if(s==='Cancelled')return '<span class="badge b-inactive">Cancelled</span>';
  return '<span class="badge b-pending">Scheduled</span>';
}

function render() {
  const q=(document.getElementById('q').value||'').toLowerCase();
  const fStatus=document.getElementById('fStatus').value;
  const fDate=document.getElementById('fDate').value;
  const fCleaner=document.getElementById('fCleaner').value;
  let list=assignments.filter(a=>{
    if(fStatus&&a.status!==fStatus)return false;
    if(fDate&&a.date!==fDate)return false;
    if(fCleaner&&a.cleanerId!==fCleaner)return false;
    if(q&&!((a.propertyName||'')+(a.cleanerName||'')).toLowerCase().includes(q))return false;
    return true;
  });
  list.sort((a,b)=>((a[sort.field]||'')<(b[sort.field]||'')?-sort.dir:sort.dir));

  const total=list.length;
  const pages=Math.ceil(total/PAGE)||1;
  if(page>pages)page=1;
  const slice=list.slice((page-1)*PAGE,page*PAGE);

  document.getElementById('st-sched').textContent=assignments.filter(a=>a.status==='Scheduled').length;
  document.getElementById('st-prog').textContent=assignments.filter(a=>a.status==='In Progress').length;
  document.getElementById('st-done').textContent=assignments.filter(a=>a.status==='Done').length;
  document.getElementById('st-staff').textContent=cleaners.filter(c=>!c.archived&&c.status!=='Inactive').length;
  document.getElementById('tableCount').textContent=`${total} Assignment${total!==1?'s':''}`;

  document.getElementById('tBody').innerHTML=!slice.length
    ?`<tr class="empty-row"><td colspan="8"><div class="empty-icon">🧹</div><p>No assignments</p></td></tr>`
    :slice.map(a=>`<tr>
        <td style="font-weight:500">${fmtDate(a.date)}</td>
        <td><strong>${a.propertyName||'—'}</strong></td>
        <td style="font-size:12px">${a.cleanerName||'—'}</td>
        <td><span class="shift-indicator ${SHIFT_DOT[a.shift]||''}"></span>${a.shift||'—'}</td>
        <td><span class="badge b-individual">${a.type||'—'}</span></td>
        <td>${statusBadge(a.status)}</td>
        <td style="font-size:11px;color:var(--text-muted);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${a.notes||'—'}</td>
        <td><div class="table-actions">
          ${a.status!=='Done'?`<button class="btn btn-success btn-xs" onclick="markDone('${a.id}')">✓</button>`:''}
          <button class="btn btn-teal btn-xs" onclick="edit('${a.id}')">✏️</button>
          <button class="btn btn-danger btn-xs" onclick="confirmDel('${a.id}')">🗑</button>
        </div></td>
      </tr>`).join('');

  const pg=document.getElementById('pagination');
  if(pages<=1){pg.innerHTML='';return;}
  let h=`<span>${total} total</span><div class="pagination-spacer"></div>`;
  for(let i=1;i<=pages;i++){
    if(i===1||i===pages||Math.abs(i-page)<=1)h+=`<button class="page-btn ${i===page?'active':''}" onclick="page=${i};render()">${i}</button>`;
    else if(Math.abs(i-page)===2)h+='<span>…</span>';
  }
  pg.innerHTML=h;
}

function setFilter(s){document.getElementById('fStatus').value=s;page=1;render();}
function clearFilter(){document.getElementById('fStatus').value='';document.getElementById('fDate').value='';document.getElementById('fCleaner').value='';page=1;render();}
function sortBy(f){if(sort.field===f)sort.dir*=-1;else{sort.field=f;sort.dir=1;}render();}

function openAdd(){document.getElementById('formTitle').textContent='New Assignment';document.getElementById('fDeleteBtn').style.display='none';clearForm();document.getElementById('f_date').value=new Date().toISOString().slice(0,10);openModal('formModal');}
function edit(id){
  const a=assignments.find(x=>x.id===id);if(!a)return;
  document.getElementById('formTitle').textContent='Edit Assignment';document.getElementById('fDeleteBtn').style.display='';
  ['id','date','status','propertyId','cleanerId','shift','type','hours','rate','notes'].forEach(f=>{const el=document.getElementById('f_'+f);if(el)el.value=a[f]||'';});
  openModal('formModal');
}
function clearForm(){
  ['id','hours','rate','notes'].forEach(f=>{const el=document.getElementById('f_'+f);if(el)el.value='';});
  document.getElementById('f_date').value='';
  document.getElementById('f_status').value='Scheduled';
  document.getElementById('f_propertyId').value='';
  document.getElementById('f_cleanerId').value='';
  document.getElementById('f_shift').value='Morning';
  document.getElementById('f_type').value='Checkout';
}

async function save(){
  const date=document.getElementById('f_date').value;
  if(!date){showToast('Date required','error');return;}
  const id=document.getElementById('f_id').value||genId('clean');
  const pId=document.getElementById('f_propertyId').value;
  const cId=document.getElementById('f_cleanerId').value;
  const p=propsList.find(x=>x.id===pId);
  const c=cleaners.find(x=>x.id===cId);
  const record={id,
    date,
    status:document.getElementById('f_status').value,
    propertyId:pId, propertyName:p?p.name:'',
    cleanerId:cId, cleanerName:c?((c.firstName||'')+' '+(c.lastName||'')).trim():'',
    shift:document.getElementById('f_shift').value,
    type:document.getElementById('f_type').value,
    hours:document.getElementById('f_hours').value,
    rate:document.getElementById('f_rate').value,
    notes:document.getElementById('f_notes').value
  };
  const existing=assignments.find(a=>a.id===id);
  if(existing)Object.assign(existing,record);else assignments.push(record);
  closeModal('formModal');render();
  await SyncStore.saveOne('zesty_cleaning','cleaning',record,assignments);
  showToast('✓ Saved','success');
}

async function markDone(id){const a=assignments.find(x=>x.id===id);if(!a)return;a.status='Done';render();await SyncStore.saveOne('zesty_cleaning','cleaning',a,assignments);showToast('✓ Done','success');}

function deleteCurrent(){const id=document.getElementById('f_id').value;if(!id)return;closeModal('formModal');confirmDel(id);}
function confirmDel(id){
  const a=assignments.find(x=>x.id===id);if(!a)return;
  showConfirm('🗑️','Delete?','Delete this assignment?','btn-danger','Delete',async()=>{
    assignments=assignments.filter(x=>x.id!==id);await SyncStore.deleteOne('zesty_cleaning','cleaning',id,assignments);render();showToast('Deleted','error');
  });
}

// ── STAFF ──
function renderStaff(){
  document.getElementById('staffBody').innerHTML=!cleaners.length
    ?`<tr class="empty-row"><td colspan="5"><p>No cleaners added</p></td></tr>`
    :cleaners.map(c=>`<tr class="${c.archived?'archived':''}">
        <td><strong>${(c.firstName||'')+' '+(c.lastName||'')}</strong></td>
        <td style="font-size:12px">${c.phone||'—'}</td>
        <td style="font-size:12px">${c.zone||'—'}</td>
        <td><span class="badge ${c.status==='Active'?'b-active':'b-inactive'}">${c.status||'Active'}</span></td>
        <td><div class="table-actions">
          <button class="btn btn-teal btn-xs" onclick="editStaff('${c.id}')">✏️</button>
          <button class="btn btn-danger btn-xs" onclick="confirmDelStaff('${c.id}')">🗑</button>
        </div></td>
      </tr>`).join('');
}

function openAddStaff(){document.getElementById('staffFormTitle').textContent='Add Cleaner';document.getElementById('fsDeleteBtn').style.display='none';['id','firstName','lastName','phone','zone','rate'].forEach(f=>{const el=document.getElementById('fs_'+f);if(el)el.value='';});document.getElementById('fs_status').value='Active';openModal('staffModal');}
function editStaff(id){
  const c=cleaners.find(x=>x.id===id);if(!c)return;
  document.getElementById('staffFormTitle').textContent='Edit Cleaner';document.getElementById('fsDeleteBtn').style.display='';
  ['id','firstName','lastName','phone','zone','status','rate'].forEach(f=>{const el=document.getElementById('fs_'+f);if(el)el.value=c[f]||'';});
  openModal('staffModal');
}

async function saveStaff(){
  const fn=document.getElementById('fs_firstName').value.trim();
  const ln=document.getElementById('fs_lastName').value.trim();
  if(!fn&&!ln){showToast('Name required','error');return;}
  const id=document.getElementById('fs_id').value||genId('cleaner');
  const record={id};
  ['firstName','lastName','phone','zone','status','rate'].forEach(f=>{record[f]=document.getElementById('fs_'+f)?.value||'';});
  const existing=cleaners.find(c=>c.id===id);
  if(existing)Object.assign(existing,record);else cleaners.push(record);
  closeModal('staffModal');populateSelects();renderStaff();
  await SyncStore.saveOne('zesty_staff','staff',record,cleaners);
  showToast('✓ Saved','success');
}

function deleteStaff(){const id=document.getElementById('fs_id').value;if(!id)return;closeModal('staffModal');confirmDelStaff(id);}
function confirmDelStaff(id){
  const c=cleaners.find(x=>x.id===id);if(!c)return;
  showConfirm('🗑️','Delete Cleaner?',`Delete ${(c.firstName||'')+' '+(c.lastName||'')}?`,'btn-danger','Delete',async()=>{
    cleaners=cleaners.filter(x=>x.id!==id);await SyncStore.deleteOne('zesty_staff','staff',id,cleaners);populateSelects();renderStaff();showToast('Deleted','error');
  });
}

function exportCSV(){
  const rows=[['Date','Property','Cleaner','Shift','Type','Status','Hours','Notes']];
  assignments.forEach(a=>rows.push([a.date||'',a.propertyName||'',a.cleanerName||'',a.shift||'',a.type||'',a.status||'',a.hours||'',a.notes||'']));
  const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);a.download='cleaning_'+new Date().toISOString().slice(0,10)+'.csv';a.click();
}
</script>
<script src="erp-nav.js"></script>
</body>
</html>
