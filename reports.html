<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Zesty ERP — Reports</title>
<link rel="stylesheet" href="erp-style.css">
<style>
.report-subnav{display:flex;gap:4px;margin-bottom:24px;border-bottom:2px solid var(--border);flex-wrap:wrap}
.report-tab{padding:10px 20px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text-muted);border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .18s;background:transparent;border-top:none;border-left:none;border-right:none;font-family:'DM Sans',sans-serif;white-space:nowrap}
.report-tab:hover{color:var(--teal)}
.report-tab.active{color:var(--teal);border-bottom-color:var(--teal);font-weight:600}
.report-panel{display:none}
.report-panel.active{display:block}
.rpt-wrap{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-top:18px}
.rpt-section{padding:20px 24px;border-bottom:1px solid var(--border)}
.rpt-section:last-child{border-bottom:none}
.rpt-section-title{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:500;color:var(--teal-dark);margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.rpt-table{width:100%;border-collapse:collapse;font-size:13px}
.rpt-table th{padding:8px 11px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);background:var(--cream);border-bottom:1px solid var(--border);white-space:nowrap}
.rpt-table td{padding:9px 11px;border-bottom:1px solid var(--border);vertical-align:middle}
.rpt-table tr:last-child td{border-bottom:none}
.rpt-table tfoot td{font-weight:700;background:var(--cream)}
.rpt-table tbody tr:hover{background:#f0faf8}
.src-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.src-airbnb{background:#FFD700;color:#333}
.src-booking{background:#003580;color:#fff}
.src-zesty{background:#23a090;color:#fff}
.src-vrbo{background:#1B468F;color:#fff}
.src-direct{background:#eafaf1;color:#27ae60}
.src-other{background:var(--cream-dark);color:var(--text-muted)}
.sum-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.sum-row.subtotal{border-top:2px solid var(--teal);border-bottom:none;margin-top:4px;padding-top:10px;font-weight:700}
.sum-row.payable{border-top:3px solid var(--teal-dark);margin-top:8px;padding-top:12px;font-weight:700;font-size:17px;color:var(--teal-dark)}
.sum-label{color:var(--text-muted)}
.sum-val{font-weight:600}
.channel-row{display:flex;align-items:center;gap:10px;margin-bottom:7px}
.channel-track{flex:1;height:8px;background:var(--cream-dark);border-radius:4px;overflow:hidden}
.channel-fill{height:100%;border-radius:4px}
@media print{
  /* Hide all navigation and browser chrome */
  #z-sidebar,#z-hamburger,#z-ticket-fab,#z-overlay,#z-ticket-overlay,
  .report-subnav,.page-title-bar,.filter-bar,.no-print,
  .rpt-scroll-wrap > *::-webkit-scrollbar { display:none!important }

  html,body { 
    overflow:visible!important; 
    margin:0!important; 
    padding:0!important;
    background:#fff!important;
    -webkit-print-color-adjust:exact;
    print-color-adjust:exact;
  }
  
  .container { 
    padding:0!important; 
    max-width:100%!important; 
    margin:0!important;
    overflow:visible!important;
  }
  
  .rpt-wrap { 
    box-shadow:none!important; 
    border:1px solid #ccc!important;
    margin:0!important;
    overflow:visible!important;
  }
  
  /* Compact sections */
  .rpt-section { padding:6px 10px!important; }
  
  /* Teal header - print in color */
  .rpt-section[style*="gradient"] { 
    -webkit-print-color-adjust:exact!important; 
    print-color-adjust:exact!important;
    padding:10px 14px!important;
  }
  
  /* Compact tables */
  .rpt-table { font-size:8.5px!important; width:100%!important; }
  .rpt-table th { padding:3px 5px!important; font-size:7.5px!important; }
  .rpt-table td { padding:3px 5px!important; }
  
  /* Scroll wrappers become visible */
  .rpt-scroll-wrap, div[style*="overflow-x"] { 
    overflow:visible!important; 
    max-width:100%!important;
  }
  
  /* Summary */
  .summary-grid { display:grid!important; grid-template-columns:1fr 1fr!important; }
  .sum-row { padding:4px 0!important; font-size:11px!important; }
  .sum-row.payable { font-size:14px!important; }
  
  /* Section title */
  .rpt-section-title { font-size:11px!important; margin-bottom:6px!important; padding-bottom:4px!important; }

  /* Avoid page breaks inside tables */
  table { page-break-inside:avoid!important; }
  .rpt-section { page-break-inside:avoid!important; }
  tr { page-break-inside:avoid!important; }
  
  /* Source badges in color */
  .src-badge { -webkit-print-color-adjust:exact!important; print-color-adjust:exact!important; }

  @page { 
    margin:8mm; 
    size:A4 landscape; 
  }
}

</style>
<script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>
<script>
(function(){
  const cfg={auth:{clientId:'0938023f-cbbf-45f1-a71d-b18c95745ea6',authority:'https://login.microsoftonline.com/9c30b606-6648-4777-a623-64867e43e54f',redirectUri:window.location.href.split('#')[0].split('?')[0]},cache:{cacheLocation:'sessionStorage'}};
  const app=new msal.PublicClientApplication(cfg);
  (async()=>{
    await app.initialize();
    try{const r=await app.handleRedirectPromise();if(r?.account)window._erpUserName=r.account.name;}catch(e){}
    const accs=app.getAllAccounts();
    if(!accs.length){await app.loginRedirect({scopes:['User.Read']});return;}
    window._erpUserName=accs[0].name||accs[0].username;
    window._azureLogout=()=>app.logoutRedirect({account:accs[0]});
    const b=document.createElement('div');b.id='_azure_badge';b.innerHTML='<span>👤 '+window._erpUserName+'</span>';document.body.appendChild(b);
  })();
})();
</script>
</head>
<body>
<div class="container">

  <div class="page-title-bar">
    <div><h1>Reports</h1><p>Owner statements, occupancy and financial reports</p></div>
    <div class="page-actions">
      <div class="sync-status"><span class="sync-dot" id="syncDot"></span><span>Connected</span></div>
      <button class="btn btn-teal no-print" onclick="window.print()">🖨 Print / PDF</button>
      <button class="btn btn-primary no-print" id="finaliseBtn" onclick="finaliseStatement()" style="display:none">✓ Finalise &amp; Record</button>
    </div>
  </div>

  <div class="report-subnav">
    <button class="report-tab active" onclick="showTab('owner',this)">📄 Owner Statement</button>
    <button class="report-tab" onclick="showTab('occupancy',this)">📊 Occupancy</button>
    <button class="report-tab" onclick="showTab('history',this);loadHistory()">💼 Statement History</button>
    <button class="report-tab" onclick="showTab('period',this)">📊 Period Report</button>
  </div>

  <!-- ═══ OWNER STATEMENT ═══ -->
  <div class="report-panel active" id="panel-owner">
    <div class="filter-bar">
      <select id="s-prop" style="min-width:220px" onchange="onPropChange()"><option value="">— Select Property —</option></select>
      <input type="month" id="s-month">
      <button class="btn btn-primary" onclick="generateOwner()">Generate</button>
      <div class="filter-spacer"></div>
      <span id="s-owner-lbl" style="font-size:12px;color:var(--text-muted)"></span>
    </div>
    <div id="owner-out">
      <div style="text-align:center;padding:70px;color:var(--text-muted)">
        <div style="font-size:40px;margin-bottom:14px">📄</div>
        <div>Select a property and month then click Generate</div>
      </div>
    </div>
  </div>

  <!-- ═══ OCCUPANCY ═══ -->
  <div class="report-panel" id="panel-occupancy">
    <div class="filter-bar">
      <label style="font-size:12px;color:var(--text-muted)">From</label>
      <input type="date" id="occ-from">
      <label style="font-size:12px;color:var(--text-muted)">To</label>
      <input type="date" id="occ-to">
      <button class="btn btn-primary" onclick="generateOccupancy()">Generate</button>
    </div>
    <div id="occ-out">
      <div style="text-align:center;padding:70px;color:var(--text-muted)">
        <div style="font-size:40px;margin-bottom:14px">📊</div>
        <div>Select date range then click Generate</div>
      </div>
    </div>
  </div>

  <!-- ═══ STATEMENT HISTORY ═══ -->
  <div class="report-panel" id="panel-history">
    <div class="filter-bar" style="flex-wrap:wrap;gap:10px;margin-bottom:18px">
      <select id="h-owner" onchange="loadHistory()" style="min-width:200px">
        <option value="">All Owners</option>
      </select>
      <select id="h-year" onchange="loadHistory()">
        <option value="">All Years</option>
      </select>
      <button onclick="loadHistory()" class="btn btn-outline btn-sm">🔄 Refresh</button>
      <div style="margin-left:auto;font-size:12px;color:var(--text-muted)" id="h-summary-line"></div>
    </div>
    <!-- Status count pills -->
    <div style="display:flex;gap:12px;margin-bottom:18px;flex-wrap:wrap">
      <div style="background:#f0f0f0;border-radius:20px;padding:6px 16px;font-size:13px">📝 Draft: <strong id="h-count-draft">0</strong></div>
      <div style="background:#fef3e8;border-radius:20px;padding:6px 16px;font-size:13px">🔍 Under Review: <strong id="h-count-review">0</strong></div>
      <div style="background:#edfaf3;border-radius:20px;padding:6px 16px;font-size:13px">✅ Sent: <strong id="h-count-sent">0</strong></div>
    </div>
    <!-- Stats cards (populated by loadHistory) -->
    <div id="h-stats-cards"></div>
    <!-- Statement list -->
    <div id="h-list" style="border:1px solid var(--border);border-radius:10px;overflow:hidden;background:#fff">
      <div style="padding:20px;text-align:center;color:var(--text-muted)">Loading…</div>
    </div>
  </div>

  <!-- ═══ PERIOD REPORT ═══ -->
  <div class="report-panel" id="panel-period">
    <div class="filter-bar" style="flex-wrap:wrap;gap:10px;margin-bottom:18px">
      <select id="p-prop" style="min-width:200px" onchange="">
        <option value="">All Properties</option>
      </select>
      <select id="p-preset" onchange="applyPeriodPreset()">
        <option value="">Custom Range</option>
        <option value="ytd">Year to Date (YTD)</option>
        <option value="lastyear">Last Full Year</option>
        <option value="q1">Q1 (Jan–Mar)</option>
        <option value="q2">Q2 (Apr–Jun)</option>
        <option value="q3">Q3 (Jul–Sep)</option>
        <option value="q4">Q4 (Oct–Dec)</option>
        <option value="summer">Summer (May–Oct)</option>
        <option value="last30">Last 30 Days</option>
        <option value="last90">Last 90 Days</option>
      </select>
      <div style="display:flex;align-items:center;gap:6px">
        <label style="font-size:12px;color:var(--text-muted)">From</label>
        <input type="date" id="p-from" style="padding:6px 10px;border:1px solid var(--border);border-radius:7px;font-family:'DM Sans',sans-serif">
        <label style="font-size:12px;color:var(--text-muted)">To</label>
        <input type="date" id="p-to" style="padding:6px 10px;border:1px solid var(--border);border-radius:7px;font-family:'DM Sans',sans-serif">
      </div>
      <button class="btn btn-teal" onclick="generatePeriodReport()">Generate Report</button>
      <button class="btn btn-print no-print" onclick="window.print()">🖨 Print</button>
    </div>
    <div id="period-out"></div>
  </div>

</div><!-- /container -->
<script src="erp-base.js"></script>
<script src="reports-main.js"></script>
<script src="erp-nav.js">

</script>
<script src="reports-extra.js"></script>


<!-- ══ EDIT BOOKING MODAL ══ -->
<div class="modal-overlay" id="editBookingModal">
  <div class="modal" style="max-width:540px">
    <div class="modal-header">
      <h2>Edit Booking</h2>
      <button class="modal-close" onclick="closeModal('editBookingModal')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="eb-idx">
      <div class="form-grid">
        <div class="form-group form-span-2">
          <label>Guest Name</label>
          <input type="text" id="eb-guest" placeholder="Guest name">
        </div>
        <div class="form-group">
          <label>Check-in</label>
          <input type="date" id="eb-checkin">
        </div>
        <div class="form-group">
          <label>Check-out</label>
          <input type="date" id="eb-checkout">
        </div>
        <div class="form-group">
          <label>Nights</label>
          <input type="number" id="eb-nights" min="1" step="1">
        </div>
        <div class="form-group">
          <label>Source / Channel</label>
          <select id="eb-source" style="width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px">
            <option value="Airbnb">Airbnb</option>
            <option value="Booking.com">Booking.com</option>
            <option value="VRBO">VRBO</option>
            <option value="Manual">Manual / Direct</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label>Total Rent (€)</label>
          <input type="number" id="eb-rent" min="0" step="0.01" placeholder="0.00">
        </div>
        <div class="form-group">
          <label>Taxes &amp; Fees (€)</label>
          <input type="number" id="eb-taxfees" min="0" step="0.01" placeholder="0.00">
        </div>
        <div class="form-group">
          <label>OTA Commission (€)</label>
          <input type="number" id="eb-ota" min="0" step="0.01" placeholder="0.00">
        </div>
        <div class="form-group">
          <label>Zesty Commission (€) <small style="color:var(--text-muted)">(leave blank to auto-calculate)</small></label>
          <input type="number" id="eb-zesty" min="0" step="0.01" placeholder="Auto">
        </div>
        <div class="form-group form-span-2">
          <label>Note</label>
          <input type="text" id="eb-note" placeholder="Internal note for this row...">
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button id="eb-del-btn" class="btn btn-danger btn-sm" onclick="deleteManualRow(parseInt(document.getElementById('eb-idx').value))" style="margin-right:auto;display:none">🗑 Remove</button>
      <button class="btn btn-outline" onclick="closeModal('editBookingModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveManualBooking()">💾 Save</button>
    </div>
  </div>
</div>

</body>
</html>
