<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Zesty ERP — Properties</title>
<link rel="stylesheet" href="erp-style.css">
</head>
<body>

<div class="container">
  <div class="page-title-bar">
    <div>
      <h1>Properties Database</h1>
      <p>All managed rental properties, unit details and owner links</p>
    </div>
    <div class="page-actions">
      <div class="sync-status"><span class="sync-dot" id="syncDot"></span><span>Connected</span></div>
      <button class="btn btn-outline btn-sm" onclick="exportCSV()">↓ Export</button>
      <button class="btn btn-primary" onclick="openAdd()">+ Add Property</button>
    </div>
  </div>

  <div class="stats-bar">
    <div class="stat-card" onclick="clearFilter()"><div class="stat-label">Total</div><div class="stat-value" id="st-total">—</div></div>
    <div class="stat-card" onclick="setFilter('Active')"><div class="stat-label">Active</div><div class="stat-value success" id="st-active">—</div></div>
    <div class="stat-card" onclick="setFilter('Inactive')"><div class="stat-label">Inactive</div><div class="stat-value danger" id="st-inactive">—</div></div>
    <div class="stat-card" onclick="clearFilter()"><div class="stat-label">Owners</div><div class="stat-value gold" id="st-owners">—</div></div>
  </div>

  <div class="filter-bar">
    <input type="search" id="q" placeholder="Search name, address, owner…" oninput="render()">
    <select id="fStatus" onchange="render()">
      <option value="">All statuses</option>
      <option value="Active">Active</option>
      <option value="Inactive">Inactive</option>
    </select>
    <select id="fType" onchange="render()">
      <option value="">All types</option>
      <option value="Apartment">Apartment</option>
      <option value="Villa">Villa</option>
      <option value="House">House</option>
      <option value="Studio">Studio</option>
      <option value="Other">Other</option>
    </select>
    <select id="fOwner" onchange="render()"><option value="">All owners</option></select>
    <div class="filter-spacer"></div>
    <label style="font-size:12px;color:var(--text-muted)"><input type="checkbox" id="showArch" onchange="render()"> Archived</label>
  </div>

  <div class="table-wrap">
    <div class="table-header"><h3 id="tableCount">Properties</h3></div>
    <table>
      <thead>
        <tr>
          <th onclick="sortBy('name')">Name <span class="sa" id="sa-name">↕</span></th>
          <th onclick="sortBy('type')">Type <span class="sa" id="sa-type">↕</span></th>
          <th>Owner</th>
          <th>Address</th>
          <th>Bedrooms</th>
          <th>Maint. Fee</th>
          <th onclick="sortBy('status')">Status <span class="sa" id="sa-status">↕</span></th>
          <th style="width:120px"></th>
        </tr>
      </thead>
      <tbody id="tBody"><tr class="empty-row"><td colspan="8"><div class="empty-icon">🏠</div><p>Loading…</p></td></tr></tbody>
    </table>
    <div class="pagination" id="pagination"></div>
  </div>
</div>

<!-- FORM MODAL -->
<div class="modal-overlay" id="formModal">
  <div class="modal" style="max-width:720px">
    <div class="modal-header">
      <h2 id="formTitle">Add Property</h2>
      <button class="modal-close" onclick="closeModal('formModal')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="f_id">
      <div class="form-grid">
        <div class="form-group form-span-2">
          <label>Property Name *</label>
          <input id="f_name" placeholder="e.g. Sunset Villa Mykonos">
        </div>
        <div class="form-group">
          <label>Type</label>
          <select id="f_type">
            <option value="Apartment">Apartment</option>
            <option value="Villa">Villa</option>
            <option value="House">House</option>
            <option value="Studio">Studio</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label>Status</label>
          <select id="f_status">
            <option value="Active">Active</option>
            <option value="Inactive">Inactive</option>
          </select>
        </div>
        <div class="form-group form-span-2">
          <label>Owner</label>
          <select id="f_ownerId" onchange="fillOwnerName()"><option value="">— Select Owner —</option></select>
        </div>
        <div class="form-group form-span-2">
          <label>Address</label>
          <input id="f_address" placeholder="Street, number, city">
        </div>
        <div class="form-group">
          <label>Area / Neighbourhood</label>
          <input id="f_area" placeholder="e.g. Plaka, Athens">
        </div>
        <div class="form-group">
          <label>Postcode</label>
          <input id="f_pc" placeholder="10563">
        </div>
        <div class="form-group">
          <label>Bedrooms</label>
          <input type="number" id="f_bedrooms" min="0" placeholder="2">
        </div>
        <div class="form-group">
          <label>Bathrooms</label>
          <input type="number" id="f_bathrooms" min="0" placeholder="1">
        </div>
        <div class="form-group">
          <label>Max Guests</label>
          <input type="number" id="f_maxGuests" min="1" placeholder="4">
        </div>
        <div class="form-group">
          <label>Floor Area (m²)</label>
          <input type="number" id="f_area_m2" step="0.1" placeholder="75">
        </div>

        <div class="form-section-title">Maintenance Rates</div>
        <div class="form-group">
          <label>Maint. Base Rate (€)</label>
          <input type="number" id="f_maintBase" step="0.01" placeholder="30.00">
        </div>
        <div class="form-group">
          <label>Maint. Hourly Rate (€/hr)</label>
          <input type="number" id="f_maintHourly" step="0.01" placeholder="15.00">
        </div>
        <div class="form-group">
          <label>Maint. Markup (%)</label>
          <input type="number" id="f_maintPct" step="0.1" placeholder="20">
        </div>

        <div class="form-section-title">Other Info</div>
        <div class="form-group form-span-2">
          <label>Airbnb / Booking URL</label>
          <input id="f_listingUrl" type="url" placeholder="https://airbnb.com/rooms/...">
        </div>
        <div class="form-group form-span-2">
          <label>Notes</label>
          <textarea id="f_notes" rows="3" placeholder="Any notes…"></textarea>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger btn-sm" id="fDeleteBtn" onclick="deleteCurrentProp()" style="display:none;margin-right:auto">🗑 Delete</button>
      <button class="btn btn-outline" onclick="closeModal('formModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveProp()">Save Property</button>
    </div>
  </div>
</div>

<!-- VIEW MODAL -->
<div class="modal-overlay" id="viewModal">
  <div class="modal" style="max-width:620px">
    <div class="modal-header">
      <h2 id="viewName">Property</h2>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="btn btn-outline btn-sm" id="viewEditBtn">✏️ Edit</button>
        <button class="modal-close" onclick="closeModal('viewModal')">✕</button>
      </div>
    </div>
    <div class="modal-body" id="viewBody"></div>
  </div>
</div>

<script src="erp-base.js"></script>
<script>
let props = [], ownersList = [];
let sort = { field: 'name', dir: 1 };
let page = 1;
const PAGE = 20;

async function init() {
  const [pRes, oRes] = await Promise.all([
    SyncStore.load('zesty_properties', 'properties'),
    SyncStore.load('zesty_owners', 'owners')
  ]);
  props = pRes.data;
  ownersList = oRes.data;
  populateOwnerFilter();
  render();
  startPoll('properties', 'zesty_properties', 30000, rows => { props = rows; render(); });
}
init();

function populateOwnerFilter() {
  const sel = document.getElementById('fOwner');
  const sel2 = document.getElementById('f_ownerId');
  ownersList.filter(o => !o.archived).sort((a, b) => {
    const an = (a.companyName || a.repFirst + ' ' + (a.repLast || '')).toLowerCase();
    const bn = (b.companyName || b.repFirst + ' ' + (b.repLast || '')).toLowerCase();
    return an < bn ? -1 : 1;
  }).forEach(o => {
    const name = o.companyName || ((o.repFirst || '') + ' ' + (o.repLast || '')).trim();
    const opt = `<option value="${o.id}">${name}</option>`;
    sel.insertAdjacentHTML('beforeend', opt);
    sel2.insertAdjacentHTML('beforeend', opt);
  });
}

function fillOwnerName() {
  const oid = document.getElementById('f_ownerId').value;
  const o = ownersList.find(x => x.id === oid);
  if (o) document.getElementById('f_ownerName') && (document.getElementById('f_ownerName').value = o.companyName || ((o.repFirst || '') + ' ' + (o.repLast || '')).trim());
}

function render() {
  const q = (document.getElementById('q').value || '').toLowerCase();
  const fStatus = document.getElementById('fStatus').value;
  const fType = document.getElementById('fType').value;
  const fOwner = document.getElementById('fOwner').value;
  const showArch = document.getElementById('showArch').checked;

  let list = props.filter(p => {
    if (!showArch && p.archived) return false;
    if (fStatus && p.status !== fStatus) return false;
    if (fType && p.type !== fType) return false;
    if (fOwner && p.ownerId !== fOwner) return false;
    if (q) {
      const hay = ((p.name || '') + ' ' + (p.ownerName || '') + ' ' + (p.address || '') + ' ' + (p.area || '')).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });

  list.sort((a, b) => {
    const av = (a[sort.field] || '').toLowerCase();
    const bv = (b[sort.field] || '').toLowerCase();
    return av < bv ? -sort.dir : av > bv ? sort.dir : 0;
  });

  const total = list.length;
  const pages = Math.ceil(total / PAGE) || 1;
  if (page > pages) page = 1;
  const slice = list.slice((page - 1) * PAGE, page * PAGE);

  document.getElementById('tableCount').textContent = `${total} Propert${total !== 1 ? 'ies' : 'y'}`;
  document.getElementById('st-total').textContent = props.filter(p => !p.archived).length;
  document.getElementById('st-active').textContent = props.filter(p => !p.archived && p.status === 'Active').length;
  document.getElementById('st-inactive').textContent = props.filter(p => !p.archived && p.status !== 'Active').length;
  document.getElementById('st-owners').textContent = new Set(props.filter(p => !p.archived && p.ownerId).map(p => p.ownerId)).size;

  const tbody = document.getElementById('tBody');
  if (!slice.length) {
    tbody.innerHTML = `<tr class="empty-row"><td colspan="8"><div class="empty-icon">🏠</div><p>No properties found</p></td></tr>`;
  } else {
    tbody.innerHTML = slice.map(p => {
      const stBadge = p.archived ? `<span class="badge b-archive">Archived</span>`
        : p.status === 'Active' ? `<span class="badge b-active">Active</span>`
        : `<span class="badge b-inactive">Inactive</span>`;
      return `<tr class="${p.archived ? 'archived' : ''}">
        <td><strong>${p.name || '—'}</strong></td>
        <td><span class="badge b-individual">${p.type || '—'}</span></td>
        <td style="font-size:12px">${p.ownerName || '—'}</td>
        <td style="font-size:12px;color:var(--text-muted)">${p.address || '—'}</td>
        <td style="text-align:center">${p.bedrooms || '—'}</td>
        <td style="font-family:monospace;font-size:12px">${p.maintBase ? '€' + parseFloat(p.maintBase).toFixed(0) : '—'}</td>
        <td>${stBadge}</td>
        <td>
          <div class="table-actions">
            <button class="btn btn-outline btn-xs" onclick="viewProp('${p.id}')">👁</button>
            <button class="btn btn-teal btn-xs" onclick="editProp('${p.id}')">✏️</button>
            <button class="btn btn-archive btn-xs" onclick="toggleArchive('${p.id}')">${p.archived ? '↩' : '📦'}</button>
            <button class="btn btn-danger btn-xs" onclick="confirmDelete('${p.id}')">🗑</button>
          </div>
        </td>
      </tr>`;
    }).join('');
  }

  // Pagination
  const pg = document.getElementById('pagination');
  if (pages <= 1) { pg.innerHTML = ''; return; }
  let h = `<span>Showing ${Math.min((page-1)*PAGE+1,total)}–${Math.min(page*PAGE,total)} of ${total}</span><div class="pagination-spacer"></div>`;
  for (let i = 1; i <= pages; i++) {
    if (i === 1 || i === pages || Math.abs(i - page) <= 1) h += `<button class="page-btn ${i===page?'active':''}" onclick="page=${i};render()">${i}</button>`;
    else if (Math.abs(i - page) === 2) h += '<span>…</span>';
  }
  pg.innerHTML = h;
}

function sortBy(f) {
  if (sort.field === f) sort.dir *= -1; else { sort.field = f; sort.dir = 1; }
  render();
}
function setFilter(status) { document.getElementById('fStatus').value = status; page = 1; render(); }
function clearFilter() { document.getElementById('fStatus').value = ''; document.getElementById('fType').value = ''; document.getElementById('fOwner').value = ''; document.getElementById('q').value = ''; page = 1; render(); }

function openAdd() {
  document.getElementById('formTitle').textContent = 'Add Property';
  document.getElementById('fDeleteBtn').style.display = 'none';
  clearForm();
  openModal('formModal');
}

function editProp(id) {
  const p = props.find(x => x.id === id);
  if (!p) return;
  closeModal('viewModal');
  document.getElementById('formTitle').textContent = 'Edit Property';
  document.getElementById('fDeleteBtn').style.display = '';
  const fields = ['id','name','type','status','ownerId','address','area','pc','bedrooms','bathrooms','maxGuests','area_m2','maintBase','maintHourly','maintPct','listingUrl','notes'];
  fields.forEach(f => { const el = document.getElementById('f_' + f); if (el) el.value = p[f] || ''; });
  openModal('formModal');
}

function clearForm() {
  const fields = ['id','name','address','area','pc','bedrooms','bathrooms','maxGuests','area_m2','maintBase','maintHourly','maintPct','listingUrl','notes'];
  fields.forEach(f => { const el = document.getElementById('f_' + f); if (el) el.value = ''; });
  document.getElementById('f_type').value = 'Apartment';
  document.getElementById('f_status').value = 'Active';
  document.getElementById('f_ownerId').value = '';
}

async function saveProp() {
  const name = document.getElementById('f_name').value.trim();
  if (!name) { showToast('Property name is required', 'error'); return; }
  const id = document.getElementById('f_id').value || genId('prop');
  const oid = document.getElementById('f_ownerId').value;
  const ownerObj = ownersList.find(o => o.id === oid);
  const ownerName = ownerObj ? (ownerObj.companyName || ((ownerObj.repFirst || '') + ' ' + (ownerObj.repLast || '')).trim()) : '';
  const record = { id, ownerName };
  const fields = ['name','type','status','ownerId','address','area','pc','bedrooms','bathrooms','maxGuests','area_m2','maintBase','maintHourly','maintPct','listingUrl','notes'];
  fields.forEach(f => { record[f] = document.getElementById('f_' + f)?.value || ''; });
  const existing = props.find(p => p.id === id);
  if (existing) Object.assign(existing, record); else props.push(record);
  closeModal('formModal');
  render();
  await SyncStore.saveOne('zesty_properties', 'properties', record, props);
  showToast(existing ? '✓ Property updated' : '✓ Property added', 'success');
}

function deleteCurrentProp() {
  const id = document.getElementById('f_id').value;
  if (!id) return;
  closeModal('formModal');
  confirmDelete(id);
}

function confirmDelete(id) {
  const p = props.find(x => x.id === id);
  if (!p) return;
  showConfirm('🗑️', 'Delete Property?', `Delete "${p.name}"? This cannot be undone.`, 'btn-danger', 'Delete', async () => {
    props = props.filter(x => x.id !== id);
    await SyncStore.deleteOne('zesty_properties', 'properties', id, props);
    render();
    showToast('Property deleted', 'error');
  });
}

async function toggleArchive(id) {
  const p = props.find(x => x.id === id);
  if (!p) return;
  p.archived = !p.archived;
  render();
  await SyncStore.saveOne('zesty_properties', 'properties', p, props);
  showToast(p.archived ? '📦 Archived' : '↩ Restored', 'info');
}

function viewProp(id) {
  const p = props.find(x => x.id === id);
  if (!p) return;
  document.getElementById('viewName').textContent = p.name || '—';
  document.getElementById('viewEditBtn').onclick = () => editProp(id);
  const field = (l, v) => v ? `<div class="view-field"><div class="view-label">${l}</div><div class="view-value">${v}</div></div>` : '';
  document.getElementById('viewBody').innerHTML = `
    <div class="view-section">
      <div class="view-section-title">Details</div>
      <div class="view-grid">
        ${field('Type', p.type)}
        ${field('Status', `<span class="badge ${p.status==='Active'?'b-active':'b-inactive'}">${p.status||'—'}</span>`)}
        ${field('Owner', p.ownerName)}
        ${field('Address', p.address)}
        ${field('Area', p.area)}
        ${field('Postcode', p.pc)}
        ${field('Bedrooms', p.bedrooms)}
        ${field('Bathrooms', p.bathrooms)}
        ${field('Max Guests', p.maxGuests)}
        ${field('Floor Area', p.area_m2 ? p.area_m2 + ' m²' : '')}
      </div>
    </div>
    <div class="view-section">
      <div class="view-section-title">Maintenance Rates</div>
      <div class="view-grid">
        ${field('Base Rate', p.maintBase ? '€' + parseFloat(p.maintBase).toFixed(2) : '')}
        ${field('Hourly Rate', p.maintHourly ? '€' + parseFloat(p.maintHourly).toFixed(2) + '/hr' : '')}
        ${field('Markup', p.maintPct ? p.maintPct + '%' : '')}
      </div>
    </div>
    ${p.listingUrl ? `<div class="view-section"><div class="view-section-title">Listing</div><a href="${p.listingUrl}" target="_blank" style="font-size:13px;color:var(--teal)">${p.listingUrl}</a></div>` : ''}
    ${p.notes ? `<div class="view-section"><div class="view-section-title">Notes</div><div style="background:var(--cream);border-radius:8px;padding:12px;font-size:13px;line-height:1.6">${p.notes}</div></div>` : ''}
  `;
  openModal('viewModal');
}

function exportCSV() {
  const rows = [['Name','Type','Owner','Address','Bedrooms','Status']];
  props.forEach(p => rows.push([p.name||'',p.type||'',p.ownerName||'',p.address||'',p.bedrooms||'',p.status||'']));
  const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = 'properties_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
}
</script>
<script src="erp-nav.js"></script>
</body>
</html>
